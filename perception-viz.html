<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clavis — 24h Perception</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;overflow:hidden;font-family:'SF Mono','Courier New',monospace;color:#8899aa}
canvas{display:block;position:fixed;top:0;left:0}
.ui{position:fixed;z-index:10;pointer-events:none}
.ui *{pointer-events:auto}
.top{top:0;left:0;right:0;padding:20px 28px;display:flex;justify-content:space-between}
.brand{font-size:11px;letter-spacing:5px;color:#667788;font-weight:300}
.clock{font-size:48px;color:#556677;font-weight:100;text-align:right;letter-spacing:-3px;line-height:1}
.clock small{font-size:11px;color:#445566;letter-spacing:2px;display:block;margin-top:4px}
.meta{position:fixed;top:70px;left:28px;z-index:10;font-size:10px;line-height:2;color:#778899}
.meta b{color:#7ab;font-weight:400}
.bar{position:fixed;bottom:56px;left:50%;transform:translateX(-50%);width:50%;max-width:400px;z-index:10}
.bar-track{height:2px;background:#1a1a2a;cursor:pointer;position:relative;border-radius:1px}
.bar-fill{height:100%;background:linear-gradient(90deg,transparent,#5a8abe,transparent);width:0%;border-radius:1px}
.bar-labels{display:flex;justify-content:space-between;font-size:8px;color:#556677;margin-top:4px}
.modes{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:10}
.modes button{background:rgba(255,255,255,0.03);border:1px solid #334455;color:#667788;padding:5px 12px;font-size:10px;cursor:pointer;font-family:inherit;transition:all .3s;border-radius:2px}
.modes button:hover{border-color:#5588aa;color:#99aabb;background:rgba(255,255,255,0.06)}
.modes button.on{border-color:#5a8abe;color:#7ab;background:rgba(90,138,190,0.08)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui top">
  <div class="brand">CLAVIS · 24H</div>
  <div class="clock"><span id="ck">00:00</span><small id="ck2">PERCEPTION CYCLE</small></div>
</div>
<div class="meta" id="mt"></div>
<div class="bar"><div class="bar-track" id="bt" onclick="seek(event)"><div class="bar-fill" id="bf"></div></div><div class="bar-labels"><span>00</span><span>06</span><span>12</span><span>18</span><span>24</span></div></div>
<div class="modes">
  <button class="on" data-m="stars">Stars</button>
  <button data-m="ridge">Ridge</button>
  <button data-m="cell">Cell</button>
  <button data-m="wind">Wind</button>
</div>
<script>
const D=[
{b:77,rms:13,rgb:[70,72,74]},{b:83,rms:9,rgb:[72,74,76]},{b:77,rms:12,rgb:[68,70,73]},
{b:79,rms:9,rgb:[70,73,75]},{b:76,rms:8,rgb:[65,68,71]},{b:91,rms:20,rgb:[95,92,88]},
{b:104,rms:9,rgb:[110,105,98]},{b:106,rms:13,rgb:[112,107,100]},{b:107,rms:347,rgb:[113,108,101]},
{b:105,rms:426,rgb:[111,106,99]},{b:110,rms:438,rgb:[116,111,104]},{b:112,rms:23,rgb:[118,113,106]},
{b:113,rms:72,rgb:[119,114,107]},{b:116,rms:455,rgb:[122,117,110]},{b:115,rms:60,rgb:[120,115,108]},
{b:114,rms:166,rgb:[120,115,108]},{b:114,rms:215,rgb:[119,114,107]},{b:113,rms:107,rgb:[119,114,107]},
{b:111,rms:62,rgb:[117,112,105]},{b:91,rms:149,rgb:[96,91,84]},{b:88,rms:296,rgb:[88,83,78]},
{b:85,rms:1026,rgb:[82,77,72]},{b:85,rms:338,rgb:[82,77,72]},{b:83,rms:82,rgb:[78,73,68]}
];
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H; function rs(){W=C.width=innerWidth;H=C.height=innerHeight} rs(); onresize=rs;

const lp=(a,b,t)=>a+(b-a)*t;
function gd(hf){
  const h0=Math.floor(hf)%24,h1=(h0+1)%24,t=hf-Math.floor(hf);
  return{b:lp(D[h0].b,D[h1].b,t),rms:lp(D[h0].rms,D[h1].rms,t),rgb:D[h0].rgb.map((v,i)=>lp(v,D[h1].rgb[i],t))};
}

let mode='stars',hf=0,spd=1,mx=0,my=0,pts=[],fld=[];
document.onmousemove=e=>{mx=e.clientX;my=e.clientY};
document.onwheel=e=>{spd=Math.max(.1,Math.min(10,spd+(e.deltaY>0?.3:-.3)));document.getElementById('ck2').textContent=spd.toFixed(1)+'×'};

function initStars(){pts=[];for(let i=0;i<400;i++)pts.push({x:Math.random()*W,y:Math.random()*H,vx:0,vy:0,s:Math.random()*2+.3,d:Math.random()})}
function initWind(){fld=[];for(let i=0;i<1200;i++)fld.push({x:Math.random()*W,y:Math.random()*H,px:0,py:0,a:Math.random()*300})}
initStars();initWind();

document.querySelectorAll('.modes button').forEach(b=>b.onclick=()=>{
  mode=b.dataset.m;
  document.querySelectorAll('.modes button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  X.fillStyle='#000';X.fillRect(0,0,W,H);
  if(mode==='stars')initStars();
  if(mode==='wind')initWind();
});

function seek(e){const r=e.currentTarget.getBoundingClientRect();hf=((e.clientX-r.left)/r.width)*24}

function rStars(d,t){
  const bn=(d.b-50)/80,rn=Math.min(1,Math.log10(d.rms+1)/3.5);
  // BG
  const bg=X.createRadialGradient(W/2,H/2,0,W/2,H/2,W*.7);
  bg.addColorStop(0,`rgba(${${d.rgb[0]*.1+5|0},${d.rgb[1]*.1+5|0},${d.rgb[2]*.15+8|0},1)`);
  bg.addColorStop(1,'#000');X.fillStyle=bg;X.fillRect(0,0,W,H);
  // Core
  const cr=20+bn*100;
  const cg=X.createRadialGradient(W/2,H/2,0,W/2,H/2,cr);
  cg.addColorStop(0,`rgba(${d.rgb[0]*.5|0},${d.rgb[1]*.4|0},${d.rgb[2]*.7|0},${(.1+bn*.2).toFixed(2)})`);
  cg.addColorStop(1,'transparent');X.fillStyle=cg;X.fillRect(0,0,W,H);
  // Particles
  const tb=rn*2;
  for(let p of pts){
    p.vx+=(Math.random()-.5)*tb*.08;p.vy+=(Math.random()-.5)*tb*.08;
    const dx=W/2-p.x,dy=H/2-p.y;
    p.vx+=dx*(1-rn)*.0002;p.vy+=dy*(1-rn)*.0002;
    const mdx=p.x-mx,mdy=p.y-my,md=Math.sqrt(mdx*mdx+mdy*mdy);
    if(md<120){p.vx+=mdx/md*.4;p.vy+=mdy/md*.4}
    p.vx*=.98;p.vy*=.98;p.x+=p.vx;p.y+=p.vy;
    if(p.x<-50)p.x=W+50;if(p.x>W+50)p.x=-50;if(p.y<-50)p.y=H+50;if(p.y>H+50)p.y=-50;
    const al=(.2+p.d*.8)*(.2+bn*.8);
    const sz=p.s*(.4+bn*1.6);
    X.beginPath();X.arc(p.x,p.y,sz,0,6.28);
    X.fillStyle=`rgba(${d.rgb[0]*p.d+120*(1-p.d)|0},${d.rgb[1]*p.d+120*(1-p.d)|0},${d.rgb[2]*p.d+160*(1-p.d)|0},${al.toFixed(2)})`;
    X.fill();
  }
  // Lines
  X.strokeStyle=`rgba(${d.rgb[0]*.5+40|0},${d.rgb[1]*.5+40|0},${d.rgb[2]*.7+60|0},0.08)`;X.lineWidth=.5;
  for(let i=0;i<pts.length;i+=3)for(let j=i+1;j<pts.length;j+=3){
    const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y;
    if(dx*dx+dy*dy<5000+rn*4000){X.beginPath();X.moveTo(pts[i].x,pts[i].y);X.lineTo(pts[j].x,pts[j].y);X.stroke()}
  }
}

function rRidge(d,t){
  const bn=(d.b-50)/80,rn=Math.min(1,Math.log10(d.rms+1)/3.5);
  X.fillStyle='#000';X.fillRect(0,0,W,H);
  for(let l=0;l<8;l++){
    const dp=l/8,yb=H*(.2+dp*.6),amp=30+(1-dp)*90+rn*50,fr=.002+dp*.0008,ph=hf*.08+l*2.1;
    X.beginPath();X.moveTo(0,H);
    for(let x=0;x<=W;x+=2){
      const y=yb-amp*(Math.sin(x*fr+ph)*.5+Math.sin(x*fr*2.3+ph*1.5)*.3+Math.sin(x*fr*4.1+ph*.7)*.2);
      X.lineTo(x,y);
    }
    X.lineTo(W,H);X.closePath();
    const r=r=d.rgb[0]*(.15+dp*.2)*(.3+bn*.7)+10|0,g=d.rgb[1]*(.12+dp*.18)*(.3+bn*.7)+10|0,b=d.rgb[2]*(.2+dp*.22)*(.4+bn*.6)+20|0;
    X.fillStyle=`rgba(${r},${g},${b},${(.5+dp*.5).toFixed(2)})`;X.fill();
  }
  // Sun arc
  const sunAng=(hf/24)*Math.PI;const sunX=W*.1+Math.cos(sunAng)*W*.4;const sunY=H*.5-Math.sin(sunAng)*H*.35;
  if(bn>.1){
    const sg=X.createRadialGradient(sunX,sunY,0,sunX,sunY,40);
    sg.addColorStop(0,`rgba(255,220,150,${(bn*.4).toFixed(2)})`);sg.addColorStop(1,'transparent');
    X.fillStyle=sg;X.fillRect(sunX-50,sunY-50,100,100);
  }
  // Stars
  if(bn<.35)for(let i=0;i<60;i++){
    const sx=(Math.sin(i*127.1)*.5+.5)*W,sy=(Math.cos(i*311.7)*.5+.3)*H*.35;
    X.beginPath();X.arc(sx,sy,.7,0,6.28);X.fillStyle=`rgba(180,190,220,${(.3+.7*Math.abs(Math.sin(hf+i)))*(1-bn*3)})`;X.fill();
  }
}

function rCell(d,t){
  const bn=(d.b-50)/80,rn=Math.min(1,Math.log10(d.rms+1)/3.5);
  X.fillStyle='rgba(0,0,0,0.06)';X.fillRect(0,0,W,H);
  const cx=W/2,cy=H/2,bR=60+bn*120;
  X.beginPath();
  for(let i=0;i<=128;i++){
    const a=(i/128)*6.28;
    const n1=Math.sin(a*3+t*.7)*rn*22,n2=Math.sin(a*7-t*1.1)*rn*10,n3=Math.sin(a*13+t*.4)*rn*5;
    const br=Math.sin(t*.25)*8;
    const r=bR+n1+n2+n3+br;
    const x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;
    i===0?X.moveTo(x,y):X.lineTo(x,y);
  }
  X.closePath();
  const g=X.createRadialGradient(cx,cy,0,cx,cy,bR+40);
  g.addColorStop(0,`rgba(${${d.rgb[0]*.8+30|0},${d.rgb[1]*.6+30|0},${d.rgb[2]*.9+40|0},0.3)`);
  g.addColorStop(.6,`rgba(${${d.rgb[0]*.4+20|0},${d.rgb[1]*.3+20|0},${d.rgb[2]*.6+30|0},0.15)`);
  g.addColorStop(1,'transparent');X.fillStyle=g;X.fill();
  X.strokeStyle=`rgba(${${d.rgb[0]*.6+20|0},${d.rgb[1]*.5+20|0},${d.rgb[2]*.8+30|0},0.35)`;X.lineWidth=.8;X.stroke();
  // Nucleus
  const nr=10+bn*18+Math.sin(t*1.8)*4;
  const ng=X.createRadialGradient(cx,cy,0,cx,cy,nr);
  ng.addColorStop(0,`rgba(${${d.rgb[0]+40|0},${d.rgb[1]*.8+30|0},${d.rgb[2]*1.2+40|0},0.5)`);ng.addColorStop(1,'transparent');
  X.beginPath();X.arc(cx,cy,nr,0,6.28);X.fillStyle=ng;X.fill();
  // Orbiters
  for(let i=0;i<16;i++){
    const a=t*(.15+i*.025)+i*6.28/16;const dist=bR*(.2+.8*Math.sin(t*.4+i));
    X.beginPath();X.arc(cx+Math.cos(a)*dist,cy+Math.sin(a)*dist,1+Math.sin(t+i)*.4,0,6.28);
    X.fillStyle=`rgba(${d.rgb[0]*.7+30|0},${d.rgb[1]*.6+30|0},${d.rgb[2]*.9+40|0},${(.3+bn*.4).toFixed(2)})`;X.fill();
  }
  // Tendrils
  if(rn>.3)for(let i=0;i<6;i++){
    const a=t*.3+i*1.05;
    X.beginPath();X.moveTo(cx,cy);
    const len=bR*1.5*rn;
    X.quadraticCurveTo(cx+Math.cos(a+.3)*len,cy+Math.sin(a+.3)*len,cx+Math.cos(a)*len*1.3,cy+Math.sin(a)*len*1.3);
    X.strokeStyle=`rgba(${d.rgb[0]*.3|0},${d.rgb[1]*.2|0},${d.rgb[2]*.5|0},${(rn*.15).toFixed(2)})`;X.lineWidth=1;X.stroke();
  }
}

function rWind(d,t){
  const bn=(d.b-50)/80,rn=Math.min(1,Math.log10(d.rms+1)/3.5);
  X.fillStyle='rgba(0,0,0,0.02)';X.fillRect(0,0,W,H);
  for(let p of fld){
    p.px=p.x;p.py=p.y;
    const sc=.003;
    const ang=Math.sin(p.x*sc+t*.3)*Math.cos(p.y*sc+t*.2)*6.28*(1+rn);
    const sp=.4+rn*3.5;
    p.x+=Math.cos(ang)*sp;p.y+=Math.sin(ang)*sp;p.a++;
    if(p.x<0||p.x>W||p.y<0||p.y>H||p.a>350){p.x=Math.random()*W;p.y=Math.random()*H;p.px=p.x;p.py=p.y;p.a=0}
    const al=Math.min(1,p.a/30)*(.05+bn*.25);
    X.beginPath();X.moveTo(p.px,p.py);X.lineTo(p.x,p.y);
    X.strokeStyle=`rgba(${${d.rgb[0]*.5+90|0},${d.rgb[1]*.4+70|0},${d.rgb[2]*.8+130|0},${al.toFixed(3)})`;
    X.lineWidth=.4+bn*.8;X.stroke();
  }
}

let lt=0;
function loop(ts){
  const dt=(ts-lt)/1000;lt=ts;hf+=dt*spd*.5;if(hf>=24)hf-=24;
  const d=gd(hf),t=ts/1000;
  switch(mode){case'stars':rStars(d,t);break;case'ridge':rRidge(d,t);break;case'cell':rCell(d,t);break;case'wind':rWind(d,t);break}
  const h=Math.floor(hf),m=Math.floor((hf-h)*60);
  document.getElementById('ck').textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  document.getElementById('bf').style.width=(hf/24*100)+'%';
  document.getElementById('mt').innerHTML=`brightness <b>${d.b.toFixed(0)}</b><br>rms <b>${d.rms.toFixed(0)}</b>${d.rms>500?' ⚡':''}<br>rgb <b>${d.rgb.map(v=>v|0).join(' ')}</b><br>phase <b>${['deep night','night','pre-dawn','dawn','morning','morning','midday','midday','afternoon','afternoon','late pm','dusk','evening'][Math.floor(hf/2)]||'night'}</b>`;
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
