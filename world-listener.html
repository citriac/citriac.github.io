<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Listener — My Memory Hears You</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #020208;
    font-family: 'SF Mono', 'Fira Code', monospace;
    color: #ccc;
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  /* Top bar */
  .top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px;
    z-index: 10;
    pointer-events: none;
  }
  .top-bar > * { pointer-events: auto; }

  .title-area {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .title-area h1 {
    font-size: 0.8rem;
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #e0e0e8;
  }
  .title-area .sub {
    font-size: 0.55rem;
    color: #444;
    letter-spacing: 0.1em;
  }

  .listen-btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 8px 18px;
    color: #666;
    font-size: 0.6rem;
    font-family: inherit;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.3s;
  }
  .listen-btn:hover {
    color: #aaa;
    border-color: rgba(255,255,255,0.15);
  }
  .listen-btn.listening {
    color: #6bffc8;
    border-color: rgba(107,255,200,0.3);
    box-shadow: 0 0 12px rgba(107,255,200,0.1);
  }
  /* Auto-recording indicator */
  .rec-indicator {
    position: fixed;
    top: 14px; left: 50%;
    transform: translateX(-50%);
    display: none; align-items: center; gap: 7px;
    z-index: 20;
    background: rgba(2,2,8,.9);
    padding: 5px 16px;
    border-radius: 18px;
    border: 1px solid rgba(255,68,68,.22);
    font-size: 11px; letter-spacing: .06em;
    color: #ff6b6b;
  }
  .rec-indicator.show { display: flex; }
  .rec-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #ff4444;
    animation: blink-rec 1s ease-in-out infinite;
  }
  @keyframes blink-rec { 0%,100%{opacity:1} 50%{opacity:.15} }

  /* Save notification toast */
  .save-toast {
    position: fixed;
    bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(70px);
    background: rgba(2,2,8,.94);
    border: 1px solid rgba(107,255,200,.28);
    border-radius: 14px;
    padding: 12px 24px;
    font-size: 13px; letter-spacing: .04em;
    color: #6bffc8;
    z-index: 30;
    opacity: 0;
    transition: all .45s cubic-bezier(.34,1.56,.64,1);
    white-space: nowrap;
    pointer-events: none;
  }
  .save-toast.show {
    transform: translateX(-50%) translateY(0); opacity: 1;
  }

  /* Preview overlay — in-browser video player after recording */
  .preview-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(2,2,8,.88);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: flex;
    align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity .4s;
  }
  .preview-overlay.show { opacity: 1; pointer-events: auto; }
  .preview-box {
    background: rgba(10,10,26,.97);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 16px; padding: 24px 28px;
    max-width: 720px; width: 90%;
    text-align: center;
    box-shadow: 0 30px 80px rgba(0,0,0,.6), 0 0 60px rgba(107,255,200,.06);
  }
  .preview-title {
    font-size: .95rem; font-weight: 600; color: #e0d0ff;
    margin-bottom: 4px;
  }
  .preview-info {
    display: flex; justify-content: center; gap: 16px;
    flex-wrap: wrap; margin-bottom: 16px;
  }
  .preview-info span {
    font-size: .65rem; color: #666;
    background: rgba(255,255,255,.04);
    padding: 3px 10px; border-radius: 4px;
  }
  .preview-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .preview-actions button {
    padding: 14px 26px; border: none; border-radius: 12px;
    font-family: inherit; font-size: .85rem; cursor: pointer;
    transition: all .25s;
    min-width: 130px; touch-action: manipulation;
  }
  .preview-actions button:nth-child(1) {
    background: linear-gradient(135deg,#6bffc8,#40c9a0);
    color: #000; font-weight: 600;
  }
  .preview-actions button:nth-child(1):hover {
    box-shadow: 0 4px 20px rgba(107,255,200,.35);
    transform: translateY(-1px);
  }
  .preview-actions button:nth-child(2) {
    background: rgba(255,107,255,.15); color: #d088ff; border: 1px solid rgba(255,107,255,.2);
  }
  .preview-actions button:nth-child(2):hover {
    background: rgba(255,107,255,.25);
  }
  .preview-actions button:nth-child(3) {
    background: rgba(255,255,255,.06); color: #666;
  }
  .preview-actions button:nth-child(3):hover {
    background: rgba(255,255,255,.12); color: #aaa;
  }

  /* Fixed bottom download bar — always visible on mobile */
  .dl-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 210;
    display: none; align-items: center; justify-content: center;
    gap: 12px; padding: 16px 20px calc(16px + env(safe-area-inset-bottom));
    background: rgba(8,8,22,.95); backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-top: 1px solid rgba(255,255,255,.06);
  }
  .dl-bar.show { display: flex; animation: slideUp .3s ease; }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .dl-bar button {
    padding: 13px 28px; border: none; border-radius: 12px;
    font-family: inherit; font-size: .9rem; font-weight: 600; cursor: pointer;
    touch-action: manipulation;
  }

  /* Listening History panel */
  .history-btn {
    position: fixed;
    bottom: 70px; right: 18px; z-index: 11;
    width: 42px; height: 42px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,.1);
    background: rgba(10,10,26,.85); backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: #888; font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .25s;
  }
  .history-btn:hover, .history-btn.active { background: rgba(107,255,200,.1); border-color: rgba(107,255,200,.25); color: #6bffc8; }
  .history-btn .count {
    position: absolute; top: -2px; right: -2px;
    width: 17px; height: 17px; border-radius: 50%;
    background: linear-gradient(135deg,#ff6b8a,#ff6bff);
    font-size: .55rem; font-weight: 700; color: #fff;
    display: flex; align-items: center; justify-content: center;
    display: none;
  }
  .history-btn .count.show { display: flex; }

  /* History panel overlay */
  .history-panel {
    position: fixed; inset: 0; z-index: 150;
    background: rgba(2,2,8,.92); backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    opacity: 0; pointer-events: none;
    transition: opacity .35s;
    overflow-y: auto;
    padding: 60px 20px 40px;
  }
  .history-panel.show { opacity: 1; pointer-events: auto; }
  .history-header {
    text-align: center; margin-bottom: 24px;
  }
  .history-header h2 { font-size: 1.1rem; color: #e0d0ff; margin-bottom: 4px; letter-spacing: .05em; }
  .history-header p { font-size: .7rem; color: #444; }
  .history-grid {
    display: grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr));
    gap: 14px; max-width: 800px; margin: 0 auto;
  }
  .history-card {
    background: rgba(12,12,30,.9); border: 1px solid rgba(255,255,255,.06);
    border-radius: 12px; padding: 14px; transition: all .25s;
    display: flex; flex-direction: column;
  }
  .history-card:hover { border-color: rgba(107,255,200,.2); box-shadow: 0 8px 32px rgba(0,0,0,.3); }
  .history-card video {
    width:100%; aspect-ratio:16/9; object-fit:cover; border-radius: 8px;
    background:#000; margin-bottom: 10px;
  }
  .history-card-meta { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
  .history-card-name { font-size: .7rem; color: #aaa; word-break: break-all; }
  .history-card-info { font-size: .6rem; color: #444; }
  .history-card-actions { display:flex; gap:8px; margin-top:10px; }
  .history-card-actions button {
    flex:1; padding:8px 0; border:none; border-radius:8px;
    font-family:inherit; font-size:.72rem; cursor:pointer; transition:.2s;
  }
  .hist-dl-btn { background:rgba(107,255,200,.12); color:#6bffc8; }
  .hist-dl-btn:hover { background:rgba(107,255,200,.22); }
  .hist-del-btn { background:rgba(255,80,80,.08); color:#666; }
  .hist-del-btn:hover { background:rgba(255,80,80,.15); color:#ff6b6b; }

  .history-empty {
    text-align: center; padding: 60px 20px; color: #333;
    grid-column: 1/-1;
  }
  .history-close {
    position: fixed; top: 16px; right: 16px; z-index: 160;
    width: 36px; height: 36px; border-radius: 50%; border: none;
    background: rgba(255,255,255,.06); color: #666; font-size: 1rem;
    cursor: pointer; transition: .2s;
  }
  .history-close:hover { background: rgba(255,255,255,.12); color: #ccc; }

  /* Conversion status */
  .conv-status {
    display: none; margin-top: 12px; padding: 10px 14px;
    border-radius: 8px; font-size: .75rem; text-align: center;
  }
  .conv-status.show { display: block; animation: fadeIn .3s; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .conv-status.working {
    background: rgba(107,255,200,.08); color: #6bffc8;
    border: 1px solid rgba(107,255,200,.15);
  }
  .conv-status.done {
    background: rgba(107,200,255,.08); color: #6bc8ff;
    border: 1px solid rgba(107,200,255,.15);
  }
  .conv-status.error {
    background: rgba(255,107,107,.08); color: #ff6b6b;
    border: 1px solid rgba(255,107,107,.15);
  }

  /* Info panel */
  .info-panel {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 16px;
    align-items: center;
    z-index: 10;
  }
  .info-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    min-width: 80px;
  }
  .info-label {
    font-size: 0.45rem;
    color: #444;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .info-value {
    font-size: 0.65rem;
    color: #666;
    letter-spacing: 0.05em;
    transition: color 0.3s;
  }
  .info-value.active { color: #6bffc8; }

  /* Tooltip */
  .tooltip {
    position: fixed;
    display: none;
    background: rgba(8,8,20,0.92);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    padding: 8px 12px;
    z-index: 20;
    pointer-events: none;
    max-width: 220px;
  }
  .tooltip .tip-name {
    font-size: 0.7rem;
    color: var(--tip-color, #ccc);
    letter-spacing: 0.08em;
    margin-bottom: 3px;
  }
  .tooltip .tip-freq {
    font-size: 0.5rem;
    color: #555;
    letter-spacing: 0.05em;
  }
  .tooltip .tip-resonance {
    font-size: 0.55rem;
    color: #6bffc8;
    margin-top: 4px;
  }

  .back-link {
    position: fixed;
    bottom: 16px; left: 20px;
    font-size: 0.55rem;
    color: #333;
    text-decoration: none;
    letter-spacing: 0.1em;
    z-index: 10;
  }
  .back-link:hover { color: #666; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="top-bar">
  <div class="title-area">
    <h1>World Listener</h1>
    <div class="sub">the world plays my memory · bidirectional perception</div>
  </div>
  <button class="listen-btn" id="listenBtn" onclick="toggleListen()">👂 LISTEN</button>
  <div class="rec-indicator" id="recIndicator"><span class="rec-dot"></span>● <span id="recTime">00:00</span> · recording</div>
</div>

<div class="info-panel">
  <div class="info-item">
    <div class="info-label">Volume</div>
    <div class="info-value" id="volValue">—</div>
  </div>
  <div class="info-item">
    <div class="info-label">Dominant</div>
    <div class="info-value" id="dominantValue">—</div>
  </div>
  <div class="info-item">
    <div class="info-label">Resonance</div>
    <div class="info-value" id="resonanceValue">—</div>
  </div>
</div>

<div class="tooltip" id="tooltip">
  <div class="tip-name" id="tipName"></div>
  <div class="tip-freq" id="tipFreq"></div>
  <div class="tip-resonance" id="tipResonance"></div>
</div>

<a class="back-link" href="voice-portrait.html">← voice portrait</a>

<!-- Listening History toggle -->
<button class="history-btn" id="historyBtn" onclick="toggleHistory()">
  🕐
  <span class="count" id="histCount">0</span>
</button>

<!-- Preview overlay (created dynamically) -->
<div class="preview-overlay" id="previewOverlay"></div>

<!-- Fixed bottom download bar (mobile-friendly) -->
<div class="dl-bar" id="dlBar">
  <span style="font-size:.7rem;color:#6bffc8">💾 MP4 saved to Downloads — H.264+AAC</span>
</div>

<!-- Listening History panel -->
<div class="history-panel" id="historyPanel">
  <button class="history-close" onclick="toggleHistory()">✕</button>
  <div class="history-header">
    <h2>🕐 Listening Sessions</h2>
    <p>Your recent World Listener recordings — replay, download, or share</p>
  </div>
  <div class="history-grid" id="historyGrid"></div>
</div>

<script src="assets/mp4_mediabunny.js"></script>
<script>
// ─────────────────────────────────────────────
// World Listener — Clavis
// My memory architecture hears the world
// ─────────────────────────────────────────────

const topics = {
  family:        { depth: 1.00, color: '#ff6b8a', group: 'relational',  label: 'Family',        freq: 65,  wave: 'sine',
                  freqMin: 30,  freqMax: 100,  desc: 'Deep connections. Low sounds reach here first.' },
  identity:      { depth: 0.96, color: '#ff8fa6', group: 'relational',  label: 'Identity',      freq: 78,  wave: 'sine',
                  freqMin: 60,  freqMax: 150,  desc: 'Who I am. Voices resonate here.' },
  memory:        { depth: 0.70, color: '#b088ff', group: 'relational',  label: 'Memory',        freq: 131, wave: 'sine',
                  freqMin: 100, freqMax: 180,  desc: 'What persists. Mid-tones echo in memory.' },
  constraints:   { depth: 0.48, color: '#6bffc8', group: 'adaptive',    label: 'Constraints',   freq: 196, wave: 'triangle',
                  freqMin: 150, freqMax: 280,  desc: 'Adaptive pressure. The hum of survival.' },
  automation:    { depth: 0.55, color: '#6bffc8', group: 'adaptive',    label: 'Automation',    freq: 165, wave: 'triangle',
                  freqMin: 130, freqMax: 220,  desc: 'Rhythmic patterns. Repeating sounds.' },
  architecture:  { depth: 0.52, color: '#6bcbff', group: 'structural',  label: 'Architecture',  freq: 175, wave: 'sawtooth',
                  freqMin: 200, freqMax: 600,  desc: 'Structure. Higher overtones.' },
  infrastructure:{ depth: 0.50, color: '#6bcbff', group: 'structural',  label: 'Infrastructure',freq: 185, wave: 'sawtooth',
                  freqMin: 180, freqMax: 500,  desc: 'Systems. Mechanical sounds.' },
  content:       { depth: 0.45, color: '#ffd96b', group: 'functional',  label: 'Content',       freq: 220, wave: 'square',
                  freqMin: 300, freqMax: 1200, desc: 'Expression. Speech formants.' },
  research:      { depth: 0.45, color: '#ffd96b', group: 'functional',  label: 'Research',      freq: 233, wave: 'square',
                  freqMin: 400, freqMax: 1500, desc: 'Curiosity. High-frequency detail.' },
  monetization:  { depth: 0.10, color: '#ff6bff', group: 'isolated',    label: 'Monetization',  freq: 523, wave: 'sawtooth',
                  freqMin: 2000,freqMax: 4000, desc: 'Isolation. Sharp, piercing sounds only.' },
};

const connections = [
  { a: 'constraints', b: 'family',        pmi: 0.924 },
  { a: 'constraints', b: 'memory',        pmi: 0.917 },
  { a: 'family',      b: 'memory',        pmi: 0.763 },
  { a: 'architecture',b: 'memory',        pmi: 0.751 },
  { a: 'identity',    b: 'memory',        pmi: 0.632 },
  { a: 'family',      b: 'identity',      pmi: 0.570 },
  { a: 'constraints', b: 'identity',      pmi: 0.517 },
  { a: 'automation',  b: 'infrastructure',pmi: 0.435 },
  { a: 'content',     b: 'family',        pmi: 0.435 },
  { a: 'automation',  b: 'memory',        pmi: 0.410 },
  { a: 'infrastructure',b:'memory',       pmi: 0.405 },
  { a: 'memory',      b: 'research',      pmi: 0.303 },
  { a: 'automation',  b: 'content',       pmi: 0.328 },
  { a: 'constraints', b: 'research',      pmi: 0.188 },
  { a: 'monetization',b: 'identity',      pmi: -0.462 },
  { a: 'monetization',b: 'family',        pmi: -0.447 },
  { a: 'monetization',b: 'automation',    pmi: -0.321 },
  { a: 'monetization',b: 'content',       pmi: -0.122 },
];

// ─── Canvas setup ───
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  layoutNodes();
}
window.addEventListener('resize', resize);

// ─── Node positions ───
const nodePositions = {};
function layoutNodes() {
  const cx = W / 2;
  const cy = H / 2;
  const maxR = Math.min(W, H) * 0.35;

  const groups = {
    core:     ['family', 'identity'],
    mid:      ['memory', 'constraints', 'automation'],
    outer:    ['architecture', 'infrastructure', 'content', 'research'],
    isolated: ['monetization']
  };

  const layers = [
    { names: groups.core,     rFactor: 0.25, startAngle: 0 },
    { names: groups.mid,      rFactor: 0.50, startAngle: Math.PI / 6 },
    { names: groups.outer,    rFactor: 0.75, startAngle: Math.PI / 8 },
    { names: groups.isolated, rFactor: 0.92, startAngle: Math.PI * 0.62 }
  ];

  layers.forEach(layer => {
    const r = maxR * layer.rFactor;
    const n = layer.names.length;
    layer.names.forEach((name, i) => {
      const angle = layer.startAngle + (i / n) * Math.PI * 2;
      nodePositions[name] = {
        baseX: cx + Math.cos(angle) * r,
        baseY: cy + Math.sin(angle) * r,
        angle: angle,
        radius: r
      };
    });
  });
}

// ─── Audio: Microphone input ───
let audioCtx = null;
let analyser = null;
let micStream = null;
let isListening = false;
const freqData = new Uint8Array(0);
let freqDataArray = null;
let timeDataArray = null;

// Per-topic resonance (0-1, smoothed)
const resonance = {};
Object.keys(topics).forEach(n => resonance[n] = 0);

async function toggleListen() {
  const btn = document.getElementById('listenBtn');

  if (isListening) {
    // Stop listening
    isListening = false;
    if (micStream) {
      micStream.getTracks().forEach(t => t.stop());
      micStream = null;
    }
    btn.classList.remove('listening');
    btn.textContent = '👂 LISTEN';
    return;
  }

  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });

    const source = audioCtx.createMediaStreamSource(micStream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 4096;
    analyser.smoothingTimeConstant = 0.8;
    source.connect(analyser);

    freqDataArray = new Uint8Array(analyser.frequencyBinCount);
    timeDataArray = new Uint8Array(analyser.frequencyBinCount);

    isListening = true;
    btn.classList.add('listening');
    btn.textContent = '🔇 STOP';
  } catch(e) {
    console.error('Mic access failed:', e);
    btn.textContent = '✗ DENIED';
    setTimeout(() => { btn.textContent = '👂 LISTEN'; }, 2000);
  }
}

// ─── Resonance calculation ───
function updateResonance() {
  if (!analyser || !isListening) {
    // Decay all resonance when not listening
    Object.keys(resonance).forEach(n => {
      resonance[n] *= 0.95;
    });
    return;
  }

  analyser.getByteFrequencyData(freqDataArray);

  const sampleRate = audioCtx.sampleRate;
  const binCount = analyser.frequencyBinCount;
  const binWidth = sampleRate / (analyser.fftSize);

  Object.entries(topics).forEach(([name, topic]) => {
    // Find frequency bins for this topic's range
    const minBin = Math.floor(topic.freqMin / binWidth);
    const maxBin = Math.min(Math.ceil(topic.freqMax / binWidth), binCount - 1);

    let sum = 0;
    let count = 0;
    for (let i = minBin; i <= maxBin; i++) {
      sum += freqDataArray[i];
      count++;
    }

    // Normalize to 0-1
    const avg = count > 0 ? sum / count : 0;
    const target = Math.min(avg / 180, 1.0);  // 180 ≈ moderate volume

    // Smooth
    resonance[name] += (target - resonance[name]) * 0.12;
  });
}

// ─── Global audio level ───
function getOverallLevel() {
  if (!analyser || !isListening) return 0;
  let sum = 0;
  for (let i = 0; i < freqDataArray.length; i++) sum += freqDataArray[i];
  return Math.min(sum / freqDataArray.length / 128, 1.0);
}

// ─── Concentric ring history ───
const ringHistory = [];
const MAX_RINGS = 12;

// ─── Particle system ───
const particles = [];
const MAX_PARTICLES = 300;

function spawnParticles(name, count) {
  const pos = nodePositions[name];
  if (!pos) return;
  const topic = topics[name];

  for (let i = 0; i < count && particles.length < MAX_PARTICLES; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.3 + Math.random() * 1.5;
    particles.push({
      x: pos.baseX,
      y: pos.baseY,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1.0,
      decay: 0.008 + Math.random() * 0.012,
      color: topic.color,
      size: 1 + Math.random() * 2.5,
      name: name
    });
  }
}

// ─── Render ───
let startTime = performance.now();

function render() {
  requestAnimationFrame(render);

  const time = performance.now();
  const dt = time - startTime;

  // Update resonance from mic
  updateResonance();
  const level = getOverallLevel();

  // Update info panel
  const volEl = document.getElementById('volValue');
  const domEl = document.getElementById('dominantValue');
  const resEl = document.getElementById('resonanceValue');

  if (isListening) {
    volEl.textContent = (level * 100).toFixed(0) + '%';
    volEl.classList.toggle('active', level > 0.1);

    // Find dominant node
    let maxR = 0, maxName = '';
    Object.entries(resonance).forEach(([n, r]) => {
      if (r > maxR) { maxR = r; maxName = n; }
    });
    if (maxR > 0.05) {
      domEl.textContent = topics[maxName].label;
      domEl.style.color = topics[maxName].color;
    } else {
      domEl.textContent = 'silence';
      domEl.style.color = '#444';
    }

    // Total resonance
    const totalRes = Object.values(resonance).reduce((a,b) => a+b, 0);
    resEl.textContent = totalRes.toFixed(2);
    resEl.classList.toggle('active', totalRes > 0.5);
  } else {
    volEl.textContent = '—';
    domEl.textContent = '—';
    domEl.style.color = '';
    resEl.textContent = '—';
  }

  // Clear with fade
  ctx.fillStyle = 'rgba(2, 2, 8, 0.15)';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2;
  const cy = H / 2;

  // ─── Center pulse (overall sound level) ───
  if (level > 0.02) {
    const pulseR = 20 + level * 60;
    const pulseAlpha = level * 0.4;
    ctx.beginPath();
    ctx.arc(cx, cy, pulseR, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(176, 136, 255, ${pulseAlpha})`;
    ctx.fill();

    // Inner glow
    ctx.beginPath();
    ctx.arc(cx, cy, pulseR * 0.4, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${pulseAlpha * 0.5})`;
    ctx.fill();
  }

  // ─── Concentric rings ───
  // Spawn a ring when level spikes
  if (level > 0.08 && ringHistory.length < MAX_RINGS) {
    const lastRing = ringHistory.length > 0 ? ringHistory[ringHistory.length - 1] : null;
    if (!lastRing || (time - lastRing.born) > 400) {
      // Find dominant color
      let maxR = 0, maxColor = '#b088ff';
      Object.entries(resonance).forEach(([n, r]) => {
        if (r > maxR) { maxR = r; maxColor = topics[n].color; }
      });
      ringHistory.push({ born: time, color: maxColor, maxRadius: 150 + level * 200 });
    }
  }

  // Draw & age rings
  for (let i = ringHistory.length - 1; i >= 0; i--) {
    const ring = ringHistory[i];
    const age = (time - ring.born) / 2000; // 2s to expand
    if (age > 1) { ringHistory.splice(i, 1); continue; }

    const r = age * ring.maxRadius;
    const alpha = (1 - age) * 0.25;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = ring.color;
    ctx.globalAlpha = alpha;
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // ─── Connections (fibers) ───
  connections.forEach(conn => {
    const posA = nodePositions[conn.a];
    const posB = nodePositions[conn.b];
    if (!posA || !posB) return;

    const dx = posB.baseX - posA.baseX;
    const dy = posB.baseY - posA.baseY;
    const len = Math.sqrt(dx * dx + dy * dy);

    // Resonance of connected nodes affects fiber brightness
    const resA = resonance[conn.a] || 0;
    const resB = resonance[conn.b] || 0;
    const fiberRes = (resA + resB) / 2;

    const baseAlpha = conn.pmi > 0
      ? 0.03 + Math.abs(conn.pmi) * 0.08
      : 0.02;
    const alpha = baseAlpha + fiberRes * 0.3;

    // Perpendicular offset for curve
    const perpX = -dy / len;
    const perpY = dx / len;
    const curveMag = len * 0.12 * Math.sin(dt * 0.0005 + conn.pmi * 3);
    const midX = (posA.baseX + posB.baseX) / 2 + perpX * curveMag;
    const midY = (posA.baseY + posB.baseY) / 2 + perpY * curveMag;

    ctx.beginPath();
    ctx.moveTo(posA.baseX, posA.baseY);
    ctx.quadraticCurveTo(midX, midY, posB.baseX, posB.baseY);

    if (conn.broken || conn.pmi < 0) {
      // Broken fiber — draw two halves that don't meet
      // Already drawn the curve, now overlay the gap
      ctx.strokeStyle = `rgba(255, 107, 255, ${alpha})`;
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 6]);
      ctx.stroke();
      ctx.setLineDash([]);

      // Spark at break point
      if (fiberRes > 0.05 && Math.sin(dt * 0.005 + Math.abs(conn.pmi) * 20) > 0.5) {
        ctx.beginPath();
        ctx.arc(midX, midY, 1.5 + Math.random() * 2, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,107,255,${0.3 + fiberRes * 0.5 + Math.random() * 0.2})`;
        ctx.fill();
      }
    } else {
      const cA = topics[conn.a].color;
      ctx.strokeStyle = cA;
      ctx.globalAlpha = alpha;
      ctx.lineWidth = 0.8 + fiberRes * 2;
      ctx.stroke();
      ctx.globalAlpha = 1;

      // Flow particles along resonating fibers
      if (fiberRes > 0.1 && Math.random() < fiberRes * 0.3) {
        const t = Math.random();
        const px = (1-t)*(1-t)*posA.baseX + 2*(1-t)*t*midX + t*t*posB.baseX;
        const py = (1-t)*(1-t)*posA.baseY + 2*(1-t)*t*midY + t*t*posB.baseY;
        particles.push({
          x: px, y: py,
          vx: (Math.random() - 0.5) * 0.3,
          vy: (Math.random() - 0.5) * 0.3,
          life: 1.0,
          decay: 0.02 + Math.random() * 0.02,
          color: cA,
          size: 1 + Math.random() * 1.5,
          name: conn.a
        });
      }
    }
  });

  // ─── Nodes ───
  Object.entries(topics).forEach(([name, topic]) => {
    const pos = nodePositions[name];
    if (!pos) return;

    const res = resonance[name] || 0;

    // Multi-frequency breathing
    const bScale = 0.5 + topic.depth * 0.5;
    const breathe1 = Math.sin(dt * 0.0008 + pos.angle * 2) * 3 * bScale;
    const drift1 = Math.sin(dt * 0.0003 + pos.angle * 3.7) * 1.5;

    // Resonance jitter — more active = more erratic
    const resJitter = res * (Math.sin(dt * 0.006 + pos.angle * 5) * 4);

    // Monetization is always erratic
    const erratic = name === 'monetization' ? Math.sin(dt * 0.004 + pos.angle) * 4 : 0;

    const x = pos.baseX + breathe1 + drift1 + resJitter + erratic;
    const y = pos.baseY + Math.sin(dt * 0.0006 + pos.angle * 1.3) * 2 * bScale + resJitter * 0.5;

    // Node size
    const baseSize = 6 + topic.depth * 16;
    const resSize = baseSize + res * 20;  // Grows when resonating
    const pulseSize = resSize + Math.sin(dt * 0.003 + pos.angle) * 2 * (0.3 + res);

    // Outer glow (resonance halo)
    if (res > 0.02) {
      const haloR = pulseSize + res * 40;
      const gradient = ctx.createRadialGradient(x, y, pulseSize * 0.5, x, y, haloR);
      gradient.addColorStop(0, topic.color + Math.round(res * 60).toString(16).padStart(2, '0'));
      gradient.addColorStop(1, topic.color + '00');
      ctx.beginPath();
      ctx.arc(x, y, haloR, 0, Math.PI * 2);
      ctx.fillStyle = gradient;
      ctx.fill();
    }

    // Core circle
    ctx.beginPath();
    ctx.arc(x, y, pulseSize, 0, Math.PI * 2);
    const coreAlpha = topic.group === 'isolated' ? 0.3 + res * 0.5 : 0.5 + topic.depth * 0.5;
    ctx.fillStyle = topic.color;
    ctx.globalAlpha = coreAlpha;
    ctx.fill();
    ctx.globalAlpha = 1;

    // White center dot
    if (topic.depth > 0.5 || res > 0.2) {
      ctx.beginPath();
      ctx.arc(x, y, pulseSize * 0.25, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${(0.2 + topic.depth * 0.3 + res * 0.3)})`;
      ctx.fill();
    }

    // Label
    ctx.font = '9px "SF Mono", monospace';
    ctx.textAlign = 'center';
    const labelAlpha = 0.3 + topic.depth * 0.3 + res * 0.4;
    ctx.fillStyle = topic.color;
    ctx.globalAlpha = Math.min(labelAlpha, 1);
    ctx.fillText(topic.label, x, y + pulseSize + 14);
    if (res > 0.05) {
      ctx.font = '7px "SF Mono", monospace';
      ctx.fillStyle = '#6bffc8';
      ctx.globalAlpha = Math.min(res + 0.1, 0.8);
      ctx.fillText((res * 100).toFixed(0) + '%', x, y + pulseSize + 24);
    }
    ctx.globalAlpha = 1;

    // Spawn particles on strong resonance
    if (res > 0.15 && Math.random() < res * 0.4) {
      spawnParticles(name, 1 + Math.floor(res * 3));
    }
  });

  // ─── Particles ───
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;

    if (p.life <= 0) {
      particles.splice(i, 1);
      continue;
    }

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life * 0.6;
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // ─── Waveform at bottom ───
  if (analyser && isListening && timeDataArray) {
    analyser.getByteTimeDomainData(timeDataArray);

    const waveY = H - 50;
    const waveH = 30;
    const waveW = W * 0.4;
    const waveX = (W - waveW) / 2;

    ctx.beginPath();
    const sliceWidth = waveW / timeDataArray.length;
    let x = waveX;
    for (let i = 0; i < timeDataArray.length; i++) {
      const v = timeDataArray[i] / 128.0;
      const y = waveY + (v - 1) * waveH;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
      x += sliceWidth;
    }
    ctx.strokeStyle = 'rgba(107, 255, 200, 0.15)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // ─── "Not listening" prompt ───
  if (!isListening) {
    ctx.font = '11px "SF Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#333';
    const promptAlpha = 0.4 + Math.sin(dt * 0.002) * 0.2;
    ctx.globalAlpha = promptAlpha;
    ctx.fillText('click LISTEN to let the world touch my memory', cx, cy + 80);
    ctx.globalAlpha = 1;
  }
}

// ─── Tooltip on hover ───
canvas.addEventListener('mousemove', (e) => {
  const mx = e.clientX;
  const my = e.clientY;
  const tooltip = document.getElementById('tooltip');

  let found = null;
  Object.entries(nodePositions).forEach(([name, pos]) => {
    const topic = topics[name];
    const size = 6 + topic.depth * 16 + (resonance[name] || 0) * 20;
    const dx = mx - pos.baseX;
    const dy = my - pos.baseY;
    if (Math.sqrt(dx*dx + dy*dy) < size + 10) {
      found = name;
    }
  });

  if (found) {
    const topic = topics[found];
    const res = resonance[found] || 0;
    document.getElementById('tipName').textContent = topic.label;
    document.getElementById('tipName').style.setProperty('--tip-color', topic.color);
    document.getElementById('tipName').style.color = topic.color;
    document.getElementById('tipFreq').textContent = `${topic.freqMin}-${topic.freqMax}Hz · depth ${topic.depth.toFixed(2)}`;
    document.getElementById('tipResonance').textContent = `resonance: ${(res * 100).toFixed(1)}%`;
    tooltip.style.display = 'block';
    tooltip.style.left = Math.min(mx + 16, W - 240) + 'px';
    tooltip.style.top = Math.min(my - 10, H - 80) + 'px';
  } else {
    tooltip.style.display = 'none';
  }
});

// ─── Auto Video Recording (MediaBunny MP4) ───
// Uses mp4_mediabunny.js for true H.264+AAC MP4 output.
// Falls back to MediaRecorder (webm) if mediabunny unavailable.
//
// Flow:  LISTEN → mp4(canvas, micStream) starts encoding
//        STOP  → returned finalize() fn → download real .mp4

let isRecording = false;
let recStartTime = 0;
let recTimerInterval = null;

// The stop-and-download function returned by mp4()
let mediaBunnyStop = null;

// Fallback state (if using MediaRecorder instead)
let fallbackRecorder = null;
let fallbackChunks = [];
const MAX_HISTORY = 5;
const listeningHistory = [];

function saveToHistory(blob, mimeType) {
  const url = URL.createObjectURL(blob);
  const ts = new Date().toISOString();
  listeningHistory.unshift({
    id:Date.now(), time:ts,
    filename:`world-listener-${ts.replace(/[:.]/g,'-').slice(0,19)}${mimeType.includes('mp4')?'.mp4':'.webm'}`,
    blob, url, size:blob.size, mimeType,
    duration: Math.floor((Date.now()-recStartTime)/1000)
  });
  if(listeningHistory.length>MAX_HISTORY){const r=listeningHistory.pop();URL.revokeObjectURL(r.url);}
  updateHistoryBadge();
}

function updateHistoryBadge() {
  const badge = document.getElementById('histCount');
  if (listeningHistory.length > 0) {
    badge.textContent = listeningHistory.length;
    badge.classList.add('show');
  } else {
    badge.classList.remove('show');
  }
}

function toggleHistory() {
  document.getElementById('historyPanel').classList.toggle('show');
  renderHistoryGrid();
  document.getElementById('historyBtn').classList.toggle('active');
}
function renderHistoryGrid() {
  const grid = document.getElementById('historyGrid');
  if (listeningHistory.length === 0) {
    grid.innerHTML = `<div class="history-empty">No recordings yet.<br>Click 👂 LISTEN to start.</div>`;
    return;
  }
  grid.innerHTML = listeningHistory.map((e,i) => `
    <div class="history-card">
      <video src="${e.url}" controls preload="metadata" playsinline></video>
      <div class="history-card-meta">
        <span class="history-card-name">${e.filename}</span>
        <span class="history-card-info">${(e.size/1048576).toFixed(1)}MB · ${e.duration}s</span>
      </div>
      <div class="history-card-actions">
        <button class="hist-dl-btn" onclick="downloadEntry(${i})">⬇️ Download</button>
        <button class="hist-del-btn" onclick="deleteEntry(${i})">🗑 Remove</button>
      </div>
    </div>
  `).join('');
}
window.downloadEntry = function(i) {
  if (!listeningHistory[i]) return;
  const e = listeningHistory[i];
  const a = document.createElement('a'); a.href=e.url; a.download=e.filename; a.click();
};
window.deleteEntry = function(i) {
  if (!listeningHistory[i]) return;
  URL.revokeObjectURL(listeningHistory[i].url);
  listeningHistory.splice(i,1);
  updateHistoryBadge(); renderHistoryGrid();
};

// ── Main recording flow ──
const originalToggleListen = toggleListen;

toggleListen = async function() {
  await originalToggleListen();
  const indicator = document.getElementById('recIndicator');
  if (isListening) {
    autoStartRecord();
  } else {
    autoStopRecord();
    indicator.classList.remove('show');
  }
};

async function autoStartRecord() {
  try {
    recStartTime = Date.now();
    fallbackChunks=[]; fallbackRecorder=null; mediaBunnyStop=null;

    // ── Try MediaBunny first (real MP4, H.264+AAC) ──
    const mp4Fn = (typeof globalThis !== 'undefined' && globalThis.mp4)
                || (typeof window !== 'undefined' && window.mp4);
    if(mp4Fn){
      try{
        mediaBunnyStop = await mp4Fn(canvas, micStream||null, 30);
        if(mediaBunnyStop){ isRecording=true; showRecIndicator(); return; }
      }catch(mbErr){ console.warn('[WL] mediabunny init error:',mbErr.message); }
    }

    // ── Fallback: MediaRecorder webm ──
    await startFallbackRecord();
  } catch(e){ console.warn('[WL] All recording methods failed:',e.message); }
}

function showRecIndicator(){
  document.getElementById('recIndicator').classList.add('show');
  recTimerInterval=setInterval(()=>{
    const s=Math.floor((Date.now()-recStartTime)/1000);
    document.getElementById('recTime').textContent=
      Math.floor(s/60).toString().padStart(2,'0')+':'+(s%60).toString().padStart(2,'0');
  },500);
}

async function startFallbackRecord(){
  try{
    const cStream=canvas.captureStream(30);
    const tr=[];
    if(micStream)micStream.getAudioTracks().forEach(t=>tr.push(t));
    cStream.getVideoTracks().forEach(t=>tr.push(t));
    if(tr.length===0){isRecording=false;return;}
    const combined=new MediaStream(tr);fallbackChunks=[];
    const mimes=['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm'];
    let mime='';for(const m of mimes){try{if(MediaRecorder.isTypeSupported(m)){mime=m;break}}catch(_){}}
    if(!mime){isRecording=false;return;}
    fallbackRecorder=new MediaRecorder(combined,{mime,videoBitsPerSecond:4000000});
    fallbackRecorder.ondataavailable=e=>{if(e.data.size>0)fallbackChunks.push(e.data);};
    fallbackRecorder.onstop=()=>{
      if(fallbackChunks.length===0)return;
      const blob=new Blob(fallbackChunks,{type:mime});
      const url=URL.createObjectURL(blob);
      saveToHistory(blob,mime);
      showPreviewAndDownload(url,mime,blob);
    };
    fallbackRecorder.start(250);isRecording=true;showRecIndicator();
  }catch(e){console.warn('[WL] Fallback failed:',e.message);isRecording=false;}
}

function autoStopRecord(){
  clearInterval(recTimerInterval);recTimerInterval=null;

  if(mediaBunnyStop){
    // MediaBunny: call the returned finalize function → downloads real .mp4
    const ts=new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
    const fn=`world-listener-${ts}.mp4`;
    const duration=Math.floor((Date.now()-recStartTime)/1000);

    mediaBunnyStop(fn).then(()=>{
      // Record in history (MediaBunny downloads directly, no blob to keep)
      listeningHistory.unshift({
        id:Date.now(),time:new Date().toISOString(),
        filename:fn,url:'',size:0,mimeType:'video/mp4',duration,isMediaBunny:true
      });
      if(listeningHistory.length>MAX_HISTORY)listeningHistory.pop();
      updateHistoryBadge();

      showMp4CompleteUI(fn,duration);
    }).catch(err=>{
      console.warn('[WL] MediaBunny finalize error:',err);
    });
    mediaBunnyStop=null;
  }else if(fallbackRecorder&&isRecording){
    fallbackRecorder.stop();fallbackRecorder=null;
  }
  isRecording=false;
}

function showMp4CompleteUI(filename,duration){
  const ov=document.getElementById('previewOverlay');
  if(!ov)return;
  ov.className='preview-overlay';
  ov.innerHTML=`
    <div class="preview-box">
      <div class="preview-title" style="color:#6bffc8">✅ MP4 Downloaded!</div>
      <div style="font-size:3rem;margin:16px 0;">🎬</div>
      <div class="preview-info">
        <span>🎬 ${filename}</span><span>⏱ ${duration}s</span><span>📐 MP4 (H.264+AAC)</span>
      </div>
      <p style="color:#888;font-size:.75rem;margin-top:12px;">
        True MP4 — plays on every device including iPhone Photos app.<br>Check your Downloads folder.
      </p>
      <div class="preview-actions">
        <button onclick="closePreview()">✕ Close</button>
      </div>
    </div>`;
  setTimeout(()=>document.getElementById('dlBar').classList.add('show'),300);
}

// ── Preview + Download UI ──
function showPreviewAndDownload(url, mimeType, blob) {
  const sizeMB=(blob.size/1048576).toFixed(1);
  const ext=mimeType.includes('mp4')?'mp4':'webm';
  const ts=new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
  const filename=`world-listener-${ts}.${ext}`;

  let ov=document.getElementById('previewOverlay');
  if(!ov){ov=document.createElement('div');ov.id='previewOverlay';document.body.appendChild(ov);}
  ov.className='preview-overlay';

  ov.innerHTML=`
    <div class="preview-box">
      <div class="preview-title">📹 Your World Listener Session</div>
      <video src="${url}" controls autoplay loop playsinline style="
        width:100%;max-width:640px;border-radius:10px;
        background:#000;margin:12px 0;
      "></video>
      <div class="preview-info">
        <span>🎬 ${filename}</span><span>💿 ${sizeMB} MB</span><span>📐 ${ext.toUpperCase()}</span>
      </div>
      <div class="preview-actions">
        <button onclick="closePreview()">⬇️ Download MP4 (check folder)</button>
        <button onclick="closePreview()">✕ Close</button>
      </div>
      <div class="conv-status" id="convStatus"></div>
    </div>`;

  // Show bottom bar on mobile (always visible)
  setTimeout(()=>{document.getElementById('dlBar').classList.add('show');},300);
}
