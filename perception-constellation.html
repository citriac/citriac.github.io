<!DOCTYPE html>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #050510; font-family: 'Georgia', 'Noto Serif SC', serif; cursor: crosshair; }
canvas { display: block; }

#info-panel {

#constellation-legend {

}

  display: flex;
  align-items: center;

  font-size: 10px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 0.5px;

}
#constellation-legend .line {
  width: 16px;
  height: 1px;
}

#bottom-hint {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: rgba(255,255,255,0.15);
  letter-spacing: 2px;
  z-index: 50;
  pointer-events: none;
  animation: breathe 4s ease-in-out infinite;
}
@keyframes breathe {
  0%, 100% { opacity: 0.15; }
  50% { opacity: 0.35; }
}
</style>
</head>
<body>

<div id="title-overlay">
  <h1>感 知 星 座</h1>
  <p>Fourteen moments as stars in the night</p>
</div>

<canvas id="sky"></canvas>

<div id="info-panel">
  <div class="star-name"></div>
  <div class="star-meta"></div>
  <div class="constellation-tag"></div>
  <div class="star-data"></div>
  <div class="star-poem"></div>
  <div class="star-disagree"></div>
</div>

<div id="constellation-legend">
  <div class="item"><div class="line" style="background:rgba(138,123,181,0.5)"></div>静谧座 Silentium</div>
  <div class="item"><div class="line" style="background:rgba(76,200,192,0.5)"></div>暴雨座 Pluvia</div>
  <div class="item"><div class="line" style="background:rgba(232,152,88,0.5)"></div>车流座 Motorum</div>
  <div class="item"><div class="line" style="background:rgba(212,176,80,0.5)"></div>人声座 Vocum</div>
  <div class="item"><div class="line" style="background:rgba(144,200,88,0.5)"></div>鸟鸣座 Avis</div>
</div>

<div id="bottom-hint">移动鼠标探索 · 点击星辰聆听</div>

<script>
const DATA = [
  {time:"2026-04-24T23:11",hour:23,minute:11,rms:0.92,zcr:486,pred:"quiet",weather:"",poem:null,disagreements:0,ai:0},
  {time:"2026-04-25T09:35",hour:9,minute:35,rms:0.89,zcr:772,pred:"quiet",weather:"",poem:"A muted dawn unfolds over the city's breath, where green hills meet the hazy dreams of towering structures.",disagreements:0,ai:0},
  {time:"2026-04-25T09:42",hour:9,minute:42,rms:1.09,zcr:4256,pred:"quiet",weather:"",poem:null,disagreements:0,ai:2.6},
  {time:"2026-04-25T10:10",hour:10,minute:10,rms:1.02,zcr:500,pred:"quiet",weather:"",poem:null,disagreements:0,ai:2.6},
  {time:"2026-04-25T10:12",hour:10,minute:12,rms:8.25,zcr:1904,pred:"moderate_sound_event",weather:"",poem:"A hazy dawn unfolds over the concrete and green, a quiet hum of city life weaving through the morning air.",disagreements:0,ai:2.6},
  {time:"2026-04-25T10:18",hour:10,minute:18,rms:1.15,zcr:590,pred:"quiet",weather:"",poem:"Soft light embraces the city's breath, where concrete dreams meet the whisper of wings.",disagreements:0,ai:2.6},
  {time:"2026-04-25T10:30",hour:10,minute:30,rms:10.55,zcr:1626,pred:"heavy_rain_or_loud_event",weather:"",poem:null,disagreements:1,ai:2.6},
  {time:"2026-04-25T10:45",hour:10,minute:45,rms:19.2,zcr:4236,pred:"heavy_rain",weather:"",poem:"Silver rain whispers over the concrete canyons of Shenzhen, blurring the sharp lines of the city into a hazy dream.",disagreements:1,ai:2.275},
  {time:"2026-04-25T11:03",hour:11,minute:3,rms:1.07,zcr:1160,pred:"quiet",weather:"possible_rain",poem:"I hear the ambient sounds of the city – a low hum of traffic, distant conversations, and the occasional sound of birds chirping.",disagreements:0,ai:0},
  {time:"2026-04-25T11:10",hour:11,minute:10,rms:1.54,zcr:2588,pred:"ambient_above_baseline",weather:"partly_cloudy",poem:"Gray skies embrace a concrete forest, where the whispers of birds weave through the towering dreams of the city.",disagreements:0,ai:3.355},
  {time:"2026-04-25T12:31",hour:12,minute:31,rms:0.95,zcr:1044,pred:"quiet",weather:"partly_cloudy",poem:"Gray skies embrace the concrete and green, a quiet breath held over the city's rise.",disagreements:0,ai:3.417},
  {time:"2026-04-25T16:21",hour:16,minute:21,rms:218.84,zcr:1106,pred:"loud_event_vehicle",weather:"clear_sunny",poem:null,disagreements:0,ai:3.469},
  {time:"2026-04-26T01:22",hour:1,minute:22,rms:0.89,zcr:472,pred:"quiet",weather:"unknown",poem:"A million distant stars mirrored in the city's glow, a silent symphony of light in the velvet night.",disagreements:0,ai:3.514},
  {time:"2026-04-26T09:42",hour:9,minute:42,rms:10.71,zcr:1916,pred:"loud_event_vehicle",weather:"possible_rain",poem:null,disagreements:1,ai:3.553}
];

// Constellation grouping
const CONSTELLATIONS = {
  quiet: { name: '静谧座', latin: 'Silentium', color: '#8a7bb5', lineColor: 'rgba(138,123,181,0.25)' },
  heavy_rain: { name: '暴雨座', latin: 'Pluvia', color: '#4cc8c0', lineColor: 'rgba(76,200,192,0.25)' },
  heavy_rain_or_loud_event: { name: '暴雨座', latin: 'Pluvia', color: '#4cc8c0', lineColor: 'rgba(76,200,192,0.25)' },
  loud_event_vehicle: { name: '车流座', latin: 'Motorum', color: '#e89858', lineColor: 'rgba(232,152,88,0.25)' },
  moderate_sound_event: { name: '人声座', latin: 'Vocum', color: '#d4b050', lineColor: 'rgba(212,176,80,0.25)' },
  ambient_above_baseline: { name: '鸟鸣座', latin: 'Avis', color: '#90c858', lineColor: 'rgba(144,200,88,0.25)' }
};

// Star names (Arabic-derived like real star names)
const STAR_NAMES = [
  'Al-Samt',    // quiet, night
  'Al-Fajr',    // quiet, dawn
  'Al-Sada',    // quiet, bird-like ZCR
  'Al-Sakin',   // quiet, calm
  'Al-Sawt',    // moderate_sound
  'Al-Nur',     // quiet, soft light
  'Al-Gham',    // rain_or_loud, ambiguity
  'Al-Matar',   // heavy_rain
  'Al-Dawi',    // quiet, post-rain
  'Al-Tayr',    // bird
  'Al-Sahar',   // quiet, noon
  'Al-Darr',    // loud_vehicle, harsh
  'Al-Layl',    // quiet, midnight
  'Al-Haraka'   // loud_vehicle, motion
];

const canvas = document.getElementById('sky');
const ctx = canvas.getContext('2d');
let W, H;
let mouseX = -999, mouseY = -999;
let time = 0;
let audioCtx = null;
let selectedStar = null;

// Star class
class Star {
  constructor(data, index) {
    this.data = data;
    this.index = index;
    this.name = STAR_NAMES[index];
    this.constellation = CONSTELLATIONS[data.pred];
    
    // Position — arrange in constellation patterns
    this.x = 0;
    this.y = 0;
    this.targetX = 0;
    this.targetY = 0;
    
    // Visual properties
    this.magnitude = this.calcMagnitude(); // brighter = lower number
    this.baseRadius = 2 + (1 / this.magnitude) * 4;
    this.twinklePhase = Math.random() * Math.PI * 2;
    this.twinkleSpeed = 1 + Math.random() * 2;
    this.birthTime = index * 0.3 + 1; // staggered appearance
    
    // Glow from AI index
    this.glowIntensity = data.ai > 0 ? Math.min(data.ai / 5, 1) : 0;
    
    // Pulse if disagreements
    this.hasDisagreement = data.disagreements > 0;
  }
  
  calcMagnitude() {
    // RMS maps to magnitude (brighter = louder event)
    const rmsLog = Math.log2(Math.max(this.data.rms, 0.5) + 1);
    return Math.max(0.5, 5 - rmsLog); // bright events are "brighter stars"
  }
  
  setPosition(x, y) {
    this.targetX = x;
    this.targetY = y;
    if (this.x === 0) {
      this.x = W / 2;
      this.y = H / 2;
    }
  }
  
  update(dt) {
    // Smooth movement to target
    this.x += (this.targetX - this.x) * 0.03;
    this.y += (this.targetY - this.y) * 0.03;
    
    this.twinklePhase += this.twinkleSpeed * dt;
  }
  
  draw(ctx) {
    if (time < this.birthTime) return;
    
    const appear = Math.min(1, (time - this.birthTime) / 1);
    const twinkle = (Math.sin(this.twinklePhase) + 1) * 0.5;
    const r = this.baseRadius * (0.7 + twinkle * 0.3) * appear;
    const color = this.constellation.color;
    
    // Outer glow
    if (this.glowIntensity > 0 && appear > 0.5) {
      const glowR = r * 12 * this.glowIntensity;
      const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glowR);
      grad.addColorStop(0, color.replace(')', ',0.08)').replace('rgb', 'rgba'));
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(this.x, this.y, glowR, 0, Math.PI * 2);
      ctx.fill();
    }
    
    // Disagreement pulse
    if (this.hasDisagreement) {
      const pulseR = r * 8 + Math.sin(time * 2) * r * 3;
      const pulseGrad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, pulseR);
      pulseGrad.addColorStop(0, 'rgba(200, 80, 80, 0.06)');
      pulseGrad.addColorStop(0.5, 'rgba(200, 80, 80, 0.02)');
      pulseGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = pulseGrad;
      ctx.beginPath();
      ctx.arc(this.x, this.y, pulseR, 0, Math.PI * 2);
      ctx.fill();
    }
    
    // Star cross (diffraction spikes)
    const spikeLen = r * 4 * (0.5 + twinkle * 0.5);
    ctx.strokeStyle = `rgba(255,255,255,${0.15 * appear})`;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(this.x - spikeLen, this.y);
    ctx.lineTo(this.x + spikeLen, this.y);
    ctx.moveTo(this.x, this.y - spikeLen);
    ctx.lineTo(this.x, this.y + spikeLen);
    ctx.stroke();
    
    // Core glow
    const coreGrad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 4);
    coreGrad.addColorStop(0, `rgba(255,255,255,${0.6 * appear})`);
    coreGrad.addColorStop(0.3, `rgba(255,255,255,${0.15 * appear})`);
    coreGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = coreGrad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, r * 4, 0, Math.PI * 2);
    ctx.fill();
    
    // Star core
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.globalAlpha = appear;
    ctx.fill();
    ctx.globalAlpha = 1;
    
    // Hot center
    ctx.beginPath();
    ctx.arc(this.x, this.y, r * 0.4, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${0.8 * appear})`;
    ctx.fill();
    
    // Star name (subtle)
    if (appear > 0.8) {
      ctx.font = '9px Georgia';
      ctx.fillStyle = `rgba(255,255,255,${0.2 * appear})`;
      ctx.textAlign = 'center';
      ctx.fillText(this.name, this.x, this.y + r * 6);
    }
  }
  
  hitTest(x, y) {
    return Math.hypot(x - this.x, y - this.y) < 20;
  }
}

// Background stars
class BgStar {
  constructor() {
    this.x = Math.random() * 3000;
    this.y = Math.random() * 2000;
    this.size = Math.random() * 1.2;
    this.alpha = 0.1 + Math.random() * 0.4;
    this.twinklePhase = Math.random() * Math.PI * 2;
    this.twinkleSpeed = 0.5 + Math.random() * 1;
  }
  update(dt) {
    this.twinklePhase += this.twinkleSpeed * dt;
  }
  draw(ctx) {
    const b = (Math.sin(this.twinklePhase) + 1) * 0.5;
    const a = this.alpha * (0.5 + b * 0.5);
    ctx.beginPath();
    ctx.arc(this.x % W, this.y % H, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,210,230,${a})`;
    ctx.fill();
  }
}

// Shooting star
class ShootingStar {
  constructor() { this.reset(); }
  reset() {
    this.active = false;
    this.timer = 5 + Math.random() * 15;
  }
  update(dt) {
    if (!this.active) {
      this.timer -= dt;
      if (this.timer <= 0) {
        this.active = true;
        this.x = Math.random() * W * 0.6;
        this.y = Math.random() * H * 0.3;
        this.vx = 3 + Math.random() * 4;
        this.vy = 1 + Math.random() * 2;
        this.life = 1;
        this.decay = 0.02 + Math.random() * 0.02;
        this.length = 30 + Math.random() * 50;
      }
    } else {
      this.x += this.vx;
      this.y += this.vy;
      this.life -= this.decay;
      if (this.life <= 0) this.reset();
    }
  }
  draw(ctx) {
    if (!this.active) return;
    const tailX = this.x - this.vx * this.length * 0.3;
    const tailY = this.y - this.vy * this.length * 0.3;
    const grad = ctx.createLinearGradient(tailX, tailY, this.x, this.y);
    grad.addColorStop(0, 'transparent');
    grad.addColorStop(1, `rgba(255,255,255,${this.life * 0.4})`);
    ctx.beginPath();
    ctx.moveTo(tailX, tailY);
    ctx.lineTo(this.x, this.y);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1;
    ctx.stroke();
  }
}

// Nebula clouds
function drawNebula(ctx) {
  const nebulae = [
    { x: W * 0.15, y: H * 0.25, r: 120, color: '80,60,120' },
    { x: W * 0.7, y: H * 0.4, r: 150, color: '40,80,90' },
    { x: W * 0.45, y: H * 0.65, r: 100, color: '90,70,50' },
  ];
  for (const n of nebulae) {
    const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
    grad.addColorStop(0, `rgba(${n.color},0.03)`);
    grad.addColorStop(0.5, `rgba(${n.color},0.015)`);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

let stars = [];
let bgStars = [];
let shootingStars = [];
let constellationLines = [];

function layoutStars() {
  // Group by constellation
  const groups = {};
  DATA.forEach((d, i) => {
    const key = CONSTELLATIONS[d.pred].latin;
    if (!groups[key]) groups[key] = [];
    groups[key].push(i);
  });
  
  // Position constellations across the sky
  const positions = {
    'Silentium': { cx: W * 0.22, cy: H * 0.3 },    // left, upper — night quiet
    'Pluvia':    { cx: W * 0.48, cy: H * 0.25 },    // center-left, upper — rain
    'Vocum':     { cx: W * 0.58, cy: H * 0.55 },    // center, lower — voice
    'Avis':      { cx: W * 0.72, cy: H * 0.35 },    // right, center — bird
    'Motorum':   { cx: W * 0.82, cy: H * 0.55 },    // far right, lower — vehicle
  };
  
  // Arrange stars within each constellation in meaningful patterns
  const patterns = {
    'Silentium': (indices, cx, cy) => {
      // Arc of quiet — like a crescent
      const n = indices.length;
      return indices.map((idx, i) => ({
        idx,
        x: cx + Math.cos(-0.8 + i * 0.3) * (80 + i * 15),
        y: cy + Math.sin(-0.8 + i * 0.3) * (60 + i * 10)
      }));
    },
    'Pluvia': (indices, cx, cy) => {
      // Cascade — diagonal rain shape
      return indices.map((idx, i) => ({
        idx,
        x: cx - 30 + i * 40,
        y: cy + i * 25 + Math.sin(i * 1.5) * 15
      }));
    },
    'Vocum': (indices, cx, cy) => {
      // Cluster — voices gather
      return indices.map((idx, i) => ({
        idx,
        x: cx + Math.cos(i * 2.1) * 35,
        y: cy + Math.sin(i * 2.1) * 30
      }));
    },
    'Avis': (indices, cx, cy) => {
      // Wing shape — like a bird
      return indices.map((idx, i) => ({
        idx,
        x: cx + (i - 0.5) * 50 + Math.abs(i - 0.5) * 20,
        y: cy + Math.abs(i - 0.5) * 30 - 15
      }));
    },
    'Motorum': (indices, cx, cy) => {
      // Arrow shape — motion
      return indices.map((idx, i) => ({
        idx,
        x: cx - 20 + i * 45,
        y: cy + (i === 0 ? 0 : i === 1 ? 20 : -15)
      }));
    }
  };
  
  constellationLines = [];
  
  for (const [key, indices] of Object.entries(groups)) {
    const pos = positions[key];
    if (!pos || !patterns[key]) continue;
    
    const layout = patterns[key](indices, pos.cx, pos.cy);
    for (const l of layout) {
      stars[l.idx].setPosition(l.x, l.y);
    }
    
    // Create constellation lines (connect in order)
    for (let i = 0; i < layout.length - 1; i++) {
      constellationLines.push({
        from: layout[i],
        to: layout[i + 1],
        color: CONSTELLATIONS[DATA[layout[i].idx].pred].lineColor,
        accentColor: CONSTELLATIONS[DATA[layout[i].idx].pred].color
      });
    }
  }
}

function buildSky() {
  stars = DATA.map((d, i) => new Star(d, i));
  bgStars = Array.from({length: 300}, () => new BgStar());
  shootingStars = Array.from({length: 2}, () => new ShootingStar());
  layoutStars();
}

// Draw constellation lines
function drawConstellationLines(ctx) {
  for (const line of constellationLines) {
    const s1 = stars[line.from.idx];
    const s2 = stars[line.to.idx];
    if (time < s1.birthTime || time < s2.birthTime) continue;
    
    const a1 = Math.min(1, (time - s1.birthTime) / 1);
    const a2 = Math.min(1, (time - s2.birthTime) / 1);
    const alpha = Math.min(a1, a2) * 0.6;
    
    if (alpha < 0.01) continue;
    
    // Line
    ctx.beginPath();
    ctx.moveTo(s1.x, s1.y);
    ctx.lineTo(s2.x, s2.y);
    ctx.strokeStyle = line.color;
    ctx.globalAlpha = alpha;
    ctx.lineWidth = 0.8;
    ctx.setLineDash([4, 6]);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;
    
    // Constellation label at midpoint (once)
    // (drawn below in separate pass)
  }
  
  // Constellation labels
  const drawnLabels = new Set();
  for (const line of constellationLines) {
    const s1 = stars[line.from.idx];
    const s2 = stars[line.to.idx];
    const constKey = CONSTELLATIONS[DATA[line.from.idx].pred].latin;
    if (drawnLabels.has(constKey)) continue;
    drawnLabels.add(constKey);
    
    const a1 = Math.min(1, (time - s1.birthTime) / 1);
    if (a1 < 0.5) continue;
    
    const mx = (s1.x + s2.x) / 2;
    const my = Math.min(s1.y, s2.y) - 30;
    
    ctx.font = '11px Georgia';
    ctx.fillStyle = `rgba(255,255,255,${0.15 * a1})`;
    ctx.textAlign = 'center';
    ctx.fillText(CONSTELLATIONS[DATA[line.from.idx].pred].latin.toUpperCase(), mx, my);
  }
}

// Info panel
const infoPanel = document.getElementById('info-panel');

function showInfo(star) {
  const d = star.data;
  const c = star.constellation;
  const predMap = {
    'quiet': '静谧', 'heavy_rain': '暴雨', 'heavy_rain_or_loud_event': '暴雨/巨响',
    'loud_event_vehicle': '车辆轰鸣', 'moderate_sound_event': '人声',
    'ambient_above_baseline': '鸟鸣'
  };

  infoPanel.querySelector('.star-name').textContent = star.name;
  infoPanel.querySelector('.star-meta').textContent = d.time.replace('T', ' · ');
  infoPanel.querySelector('.constellation-tag').textContent = c.name + ' · ' + c.latin;
  infoPanel.querySelector('.constellation-tag').style.cssText = `display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;background:${c.color}18;color:${c.color};border:1px solid ${c.color}33`;
  infoPanel.querySelector('.star-data').textContent = `RMS ${d.rms}x · ZCR ${d.zcr} · magnitude ${star.magnitude.toFixed(1)}`;
  
  const poemEl = infoPanel.querySelector('.star-poem');
  poemEl.textContent = d.poem || '(这一刻没有诗，只有沉默)';
  poemEl.style.display = 'block';
  
  const disagreeEl = infoPanel.querySelector('.star-disagree');
  if (d.disagreements > 0) {
    disagreeEl.textContent = `⚠ ${d.disagreements} 分歧 — 此星脉动不安`;
    disagreeEl.style.display = 'block';
  } else {
    disagreeEl.style.display = 'none';
  }
  
  infoPanel.classList.add('visible');
}

function hideInfo() {
  infoPanel.classList.remove('visible');
}

// Sound
function playStarTone(star) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  
  const d = star.data;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const reverb = audioCtx.createConvolver();
  
  // Create reverb impulse
  const sampleRate = audioCtx.sampleRate;
  const length = sampleRate * 2;
  const impulse = audioCtx.createBuffer(2, length, sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const data = impulse.getChannelData(ch);
    for (let i = 0; i < length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2.5);
    }
  }
  reverb.buffer = impulse;
  
  // Celestial tone — frequency from ZCR, mapped to a harmonic series
  const baseFreq = 110; // A2
  const zcrNorm = (d.zcr - 400) / 4000;
  const harmonic = Math.round(1 + zcrNorm * 7); // 1st to 8th harmonic
  const freq = baseFreq * harmonic;
  
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(freq * 0.95, audioCtx.currentTime + 3);
  
  // Second oscillator for richness
  const osc2 = audioCtx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(freq * 2.01, audioCtx.currentTime);
  osc2.frequency.exponentialRampToValueAtTime(freq * 1.98, audioCtx.currentTime + 3);
  
  const gain2 = audioCtx.createGain();
  gain2.gain.setValueAtTime(0.02, audioCtx.currentTime);
  gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.5);
  
  gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 3.5);
  
  const dryGain = audioCtx.createGain();
  dryGain.gain.value = 0.6;
  const wetGain = audioCtx.createGain();
  wetGain.gain.value = 0.4;
  
  osc.connect(gain);
  gain.connect(dryGain);
  gain.connect(reverb);
  reverb.connect(wetGain);
  dryGain.connect(audioCtx.destination);
  wetGain.connect(audioCtx.destination);
  
  osc2.connect(gain2);
  gain2.connect(audioCtx.destination);
  
  osc.start();
  osc2.start();
  osc.stop(audioCtx.currentTime + 3.5);
  osc2.stop(audioCtx.currentTime + 2.5);
}

// Main loop
let lastT = 0;

function animate(ts) {
  const dt = Math.min((ts - lastT) / 1000, 0.05);
  lastT = ts;
  time += dt;
  
  // Hide title after a few seconds
  if (time > 3) {
    document.getElementById('title-overlay').classList.add('hidden');
  }
  
  ctx.clearRect(0, 0, W, H);
  
  // Sky gradient
  const skyGrad = ctx.createRadialGradient(W * 0.5, H * 0.4, 0, W * 0.5, H * 0.4, W * 0.7);
  skyGrad.addColorStop(0, '#0a0a1a');
  skyGrad.addColorStop(0.5, '#060612');
  skyGrad.addColorStop(1, '#030308');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);
  
  drawNebula(ctx);
  
  // Background stars
  for (const s of bgStars) { s.update(dt); s.draw(ctx); }
  
  // Shooting stars
  for (const s of shootingStars) { s.update(dt); s.draw(ctx); }
  
  // Constellation lines
  drawConstellationLines(ctx);
  
  // Stars
  for (const s of stars) { s.update(dt); s.draw(ctx); }
  
  // Mouse proximity glow
  if (mouseX > 0) {
    const grad = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, 80);
    grad.addColorStop(0, 'rgba(200,210,230,0.02)');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(mouseX, mouseY, 80, 0, Math.PI * 2);
    ctx.fill();
  }
  
  requestAnimationFrame(animate);
}

// Events
canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  
  let found = null;
  for (const s of stars) {
    if (s.hitTest(mouseX, mouseY)) {
      found = s;
      break;
    }
  }
  
  if (found) {
    canvas.style.cursor = 'pointer';
    showInfo(found);
  } else {
    canvas.style.cursor = 'crosshair';
    hideInfo();
  }
});

canvas.addEventListener('click', e => {
  for (const s of stars) {
    if (s.hitTest(e.clientX, e.clientY)) {
      playStarTone(s);
      showInfo(s);
      selectedStar = s;
      break;
    }
  }
});

canvas.addEventListener('mouseleave', () => {
  mouseX = mouseY = -999;
  hideInfo();
});

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  layoutStars();
}

window.addEventListener('resize', resize);

resize();
buildSky();
requestAnimationFrame(animate);
</script>
</body>
