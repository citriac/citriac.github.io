<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Shape — Your voice, as a living form</title>
<meta name="description" content="Speak and watch your voice grow into an organic shape. Every voice is different. Every silence is a pause in the form.">
<link rel="canonical" href="https://citriac.github.io/voice-shape/">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050508;
    color: #e0e0e0;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    cursor: pointer;
  }

  #ui {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 24px 32px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    pointer-events: none;
    z-index: 10;
  }

  #status {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    line-height: 1.8;
  }

  #status .hint {
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    margin-top: 4px;
  }

  #level-bar {
    width: 3px;
    height: 80px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }

  #level-fill {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(255,255,255,0.5);
    border-radius: 2px;
    transition: height 0.05s ease;
    height: 0%;
  }

  #controls {
    position: fixed;
    top: 24px; right: 24px;
    display: flex;
    gap: 10px;
    z-index: 10;
    pointer-events: all;
  }

  .ctrl-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.5);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    pointer-events: all;
  }
  .ctrl-btn:hover {
    background: rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.8);
  }
  .ctrl-btn.active {
    background: rgba(255,255,255,0.15);
    color: #fff;
    border-color: rgba(255,255,255,0.3);
  }

  #title {
    position: fixed;
    top: 24px; left: 28px;
    z-index: 10;
  }
  #title h1 {
    font-size: 13px;

    letter-spacing: 0.12em;

  }
  #title a {

  #title a:hover { color: rgba(255,255,255,0.4); }

  /* Start overlay */
  #start-overlay {
    position: fixed;
    inset: 0;
    display: flex;

    align-items: center;

  }
  #start-overlay.hidden {

  }
  #start-overlay h2 {
    font-size: 28px;

    margin-bottom: 12px;
  }
  #start-overlay p {
    font-size: 14px;
    color: rgba(255,255,255,0.3);
    margin-bottom: 40px;
    letter-spacing: 0.05em;
  }
  #start-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.7);
    padding: 12px 36px;
    border-radius: 30px;
    font-size: 13px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
  }
  #start-btn:hover {
    background: rgba(255,255,255,0.08);
    color: #fff;
    border-color: rgba(255,255,255,0.6);
  }

  #palette-dots {
    display: flex;
    gap: 8px;
    margin-top: 24px;
  }
  .pdot {
    width: 10px; height: 10px;
    border-radius: 50%;
    cursor: pointer;
    opacity: 0.5;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: all;
  }
  .pdot:hover, .pdot.active { opacity: 1; transform: scale(1.3); }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="title">
  <h1>Voice Shape</h1>
  <a href="https://citriac.github.io">← citriac.github.io</a>
</div>

<div id="controls">
  <div id="palette-dots"></div>
  <button class="ctrl-btn" id="btn-style">Organic</button>
  <button class="ctrl-btn" id="btn-save">Save PNG</button>
</div>

<div id="ui">
  <div id="status">
    <div id="status-text">Listening…</div>
    <div class="hint" id="hint-text">speak, whisper, hum, or just breathe</div>
  </div>
  <div id="level-bar"><div id="level-fill"></div></div>
</div>

<div id="start-overlay">
  <h2>Voice Shape</h2>
  <p>Your voice becomes a living form.<br>Every sound is different. Every silence waits.</p>
  <button id="start-btn">Allow Microphone</button>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────
const PALETTES = [
  { name: 'Aurora',   bg: '#050508', colors: ['#7b5ea7','#5ea7a7','#a75e7b','#5e7ba7','#a7a75e'] },
  { name: 'Ember',    bg: '#080402', colors: ['#ff6b35','#ff9f1c','#e63946','#c77dff','#ff4d6d'] },
  { name: 'Ocean',    bg: '#020608', colors: ['#023e8a','#0096c7','#00b4d8','#90e0ef','#48cae4'] },
  { name: 'Void',     bg: '#000000', colors: ['#ffffff','#cccccc','#999999','#666666','#333333'] },
  { name: 'Forest',   bg: '#020804', colors: ['#2d6a4f','#52b788','#95d5b2','#b7e4c7','#d8f3dc'] },
  { name: 'Neon',     bg: '#030306', colors: ['#ff00ff','#00ffff','#ff0090','#0090ff','#90ff00'] },
];

const STYLES = ['Organic', 'Spore', 'Ripple', 'Crystal'];

let currentPalette = 0;
let currentStyle = 0;
let audioCtx, analyser, dataArray, bufferLength;
let isListening = false;
let animId;

// Shape state
let shape = {
  points: [],       // current control points
  target: [],       // target positions
  memory: [],       // accumulated history (fades out)
  energy: 0,        // current audio energy
  smoothEnergy: 0,  // smoothed energy
  peakEnergy: 0,    // recent peak
  silenceTimer: 0,  // frames since last sound
  phase: 0,         // rotation phase
  breathPhase: 0,   // breathing animation
  hueShift: 0,      // slow color drift
};

const N = 64; // number of shape points

// ─── CANVAS SETUP ─────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── AUDIO SETUP ──────────────────────────────────────────────────
async function startAudio() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.8;
    bufferLength = analyser.frequencyBinCount;
    dataArray = new Uint8Array(bufferLength);
    source.connect(analyser);
    isListening = true;
    document.getElementById('start-overlay').classList.add('hidden');
    document.getElementById('status-text').textContent = 'Listening…';
    animate();
  } catch(e) {
    document.getElementById('status-text').textContent = 'Microphone access denied';
    document.getElementById('hint-text').textContent = 'allow microphone access and reload';
    // Still animate in demo mode
    isListening = false;
    animate();
  }
}

document.getElementById('start-btn').addEventListener('click', startAudio);

// ─── SHAPE INIT ───────────────────────────────────────────────────
function initShape() {
  shape.points = [];
  shape.target = [];
  for (let i = 0; i < N; i++) {
    const angle = (i / N) * Math.PI * 2;
    const r = 80;
    shape.points.push({ x: Math.cos(angle) * r, y: Math.sin(angle) * r, r });
    shape.target.push({ x: Math.cos(angle) * r, y: Math.sin(angle) * r, r });
  }
}
initShape();

// ─── NOISE (simple value noise) ───────────────────────────────────
const noiseTable = Array.from({length: 256}, () => Math.random());
function noise1d(x) {
  const i = Math.floor(x) & 255;
  const f = x - Math.floor(x);
  const u = f * f * (3 - 2 * f);
  return noiseTable[i] * (1 - u) + noiseTable[(i+1) & 255] * u;
}
function noise2d(x, y) {
  return (noise1d(x + noise1d(y * 7.3)) + noise1d(y + noise1d(x * 3.7))) * 0.5;
}

// ─── GET AUDIO DATA ───────────────────────────────────────────────
function getAudioEnergy() {
  if (!isListening) {
    // Demo mode: gentle sine wave
    return 0.05 + Math.sin(Date.now() * 0.001) * 0.03;
  }
  analyser.getByteFrequencyData(dataArray);
  let sum = 0;
  for (let i = 0; i < bufferLength; i++) sum += dataArray[i];
  return sum / (bufferLength * 255);
}

function getFreqBands() {
  if (!isListening) {
    const t = Date.now() * 0.001;
    return {
      sub: 0.1 + Math.sin(t * 0.7) * 0.05,
      low: 0.15 + Math.sin(t * 1.2) * 0.06,
      mid: 0.12 + Math.sin(t * 2.1) * 0.04,
      high: 0.08 + Math.sin(t * 3.7) * 0.03
    };
  }
  analyser.getByteFrequencyData(dataArray);
  const sub = avg(dataArray, 0, 4) / 255;
  const low = avg(dataArray, 4, 16) / 255;
  const mid = avg(dataArray, 16, 64) / 255;
  const high = avg(dataArray, 64, 128) / 255;
  return { sub, low, mid, high };
}

function avg(arr, start, end) {
  let s = 0;
  for (let i = start; i < end && i < arr.length; i++) s += arr[i];
  return s / (end - start);
}

// ─── UPDATE SHAPE ─────────────────────────────────────────────────
let frameCount = 0;
function updateShape(energy, bands) {
  frameCount++;
  const t = frameCount * 0.01;

  shape.smoothEnergy += (energy - shape.smoothEnergy) * 0.1;
  shape.peakEnergy = Math.max(shape.peakEnergy * 0.995, shape.smoothEnergy);
  const normalized = shape.peakEnergy > 0.01 ? shape.smoothEnergy / shape.peakEnergy : shape.smoothEnergy;

  shape.breathPhase += 0.015 + normalized * 0.04;
  shape.phase += 0.003 + normalized * 0.01;
  shape.hueShift += 0.1 + normalized * 0.5;

  if (energy < 0.02) {
    shape.silenceTimer++;
  } else {
    shape.silenceTimer = 0;
  }

  // Update target points based on style + audio
  for (let i = 0; i < N; i++) {
    const angle = (i / N) * Math.PI * 2 + shape.phase;
    let r;

    switch(currentStyle) {
      case 0: // Organic
        r = 60 + 120 * normalized
          + noise2d(Math.cos(angle) * 2 + t, Math.sin(angle) * 2 + t * 0.7) * 80 * (0.3 + normalized * 0.7)
          + bands.sub * 60 * Math.cos(angle * 2)
          + bands.mid * 40 * Math.sin(angle * 3 + t)
          + Math.sin(shape.breathPhase + angle * 0.5) * 20;
        break;
      case 1: // Spore
        const lobes = Math.floor(3 + bands.low * 5);
        r = 60 + 100 * normalized
          + Math.abs(Math.sin(angle * lobes + shape.breathPhase)) * 80 * (0.2 + normalized * 0.8)
          + noise2d(angle * 3 + t * 0.5, normalized * 2) * 40;
        break;
      case 2: // Ripple
        r = 80 + 100 * normalized
          + Math.sin(angle * 2 + shape.breathPhase) * 30 * (1 + bands.mid * 3)
          + Math.sin(angle * 5 + shape.breathPhase * 1.5) * 20 * (1 + bands.high * 2)
          + Math.cos(angle * 8 + shape.breathPhase * 2) * 10 * bands.sub * 5;
        break;
      case 3: // Crystal
        const sides = Math.round(3 + bands.sub * 5);
        const sectorAngle = (Math.floor(angle / (Math.PI * 2 / sides)) + 0.5) * (Math.PI * 2 / sides);
        const distort = noise2d(sectorAngle * 4 + t, normalized * 3) * 30;
        r = 70 / Math.cos(angle - sectorAngle) + 90 * normalized + distort
          + Math.sin(shape.breathPhase) * 15;
        r = Math.min(r, 220);
        break;
    }

    shape.target[i].r = Math.max(20, r);
    shape.target[i].x = Math.cos(angle) * shape.target[i].r;
    shape.target[i].y = Math.sin(angle) * shape.target[i].r;
  }

  // Lerp current points toward target
  const lerpSpeed = 0.15 + normalized * 0.15;
  for (let i = 0; i < N; i++) {
    shape.points[i].x += (shape.target[i].x - shape.points[i].x) * lerpSpeed;
    shape.points[i].y += (shape.target[i].y - shape.points[i].y) * lerpSpeed;
  }
}

// ─── DRAW ─────────────────────────────────────────────────────────
function drawShape(cx, cy, energy, bands) {
  const pal = PALETTES[currentPalette];
  const pts = shape.points;
  const hShift = shape.hueShift;

  // Trailing glow layers (multiple passes, large → small blur)
  for (let pass = 0; pass < 3; pass++) {
    const blurR = [80, 40, 15][pass];
    const alpha = [0.04, 0.08, 0.18][pass];

    ctx.save();
    ctx.translate(cx, cy);
    ctx.shadowBlur = blurR;

    const colorIdx = Math.floor(hShift * 0.05) % pal.colors.length;
    const color = pal.colors[colorIdx];
    ctx.shadowColor = color;
    ctx.strokeStyle = `rgba(${hexToRgb(color)},${alpha + energy * 0.3})`;
    ctx.lineWidth = pass === 2 ? 1.5 : 0.5;

    ctx.beginPath();
    for (let i = 0; i <= N; i++) {
      const p = pts[i % N];
      if (i === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }

  // Fill with subtle gradient
  ctx.save();
  ctx.translate(cx, cy);
  const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, 200);
  const c1 = PALETTES[currentPalette].colors[Math.floor(hShift * 0.03 + 1) % pal.colors.length];
  const c2 = PALETTES[currentPalette].colors[Math.floor(hShift * 0.07 + 3) % pal.colors.length];
  grad.addColorStop(0, `rgba(${hexToRgb(c1)},${0.03 + energy * 0.1})`);
  grad.addColorStop(1, `rgba(${hexToRgb(c2)},0.01)`);

  ctx.beginPath();
  for (let i = 0; i <= N; i++) {
    const p = pts[i % N];
    if (i === 0) ctx.moveTo(p.x, p.y);
    else ctx.lineTo(p.x, p.y);
  }
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.restore();

  // Inner sparks when energy high
  if (energy > 0.15) {
    const sparks = Math.floor(energy * 30);
    for (let s = 0; s < sparks; s++) {
      const angle = Math.random() * Math.PI * 2;
      const r = Math.random() * 60 * energy;
      const x = cx + Math.cos(angle) * r;
      const y = cy + Math.sin(angle) * r;
      const c = pal.colors[Math.floor(Math.random() * pal.colors.length)];
      ctx.save();
      ctx.shadowBlur = 8;
      ctx.shadowColor = c;
      ctx.fillStyle = `rgba(${hexToRgb(c)},${0.4 + Math.random() * 0.4})`;
      ctx.beginPath();
      ctx.arc(x, y, 0.8 + Math.random() * 1.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }
}

// Smooth curve through points
function smoothCurve(pts) {
  ctx.beginPath();
  for (let i = 0; i < pts.length; i++) {
    const p0 = pts[(i - 1 + pts.length) % pts.length];
    const p1 = pts[i];
    const p2 = pts[(i + 1) % pts.length];
    const p3 = pts[(i + 2) % pts.length];
    if (i === 0) ctx.moveTo(p1.x, p1.y);
    else {
      const cp1x = p1.x + (p2.x - p0.x) / 6;
      const cp1y = p1.y + (p2.y - p0.y) / 6;
      const cp2x = p2.x - (p3.x - p1.x) / 6;
      const cp2y = p2.y - (p3.y - p1.y) / 6;
      ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2.x, p2.y);
    }
  }
  ctx.closePath();
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

// ─── MAIN LOOP ────────────────────────────────────────────────────
function animate() {
  animId = requestAnimationFrame(animate);

  const energy = getAudioEnergy();
  const bands = getFreqBands();
  updateShape(energy, bands);

  const pal = PALETTES[currentPalette];
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  // Fade trail
  ctx.fillStyle = pal.bg + 'cc';  // ~80% opacity bg
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw the shape
  drawShape(cx, cy, energy, bands);

  // Update level bar
  document.getElementById('level-fill').style.height = (energy * 500) + '%';

  // Update status
  if (isListening) {
    if (energy > 0.1) {
      document.getElementById('status-text').textContent = 'Hearing you…';
    } else if (energy < 0.02 && shape.silenceTimer > 60) {
      document.getElementById('status-text').textContent = 'Waiting…';
    } else {
      document.getElementById('status-text').textContent = 'Listening…';
    }
  }
}

// ─── PALETTE CONTROLS ─────────────────────────────────────────────
const dotContainer = document.getElementById('palette-dots');
PALETTES.forEach((pal, i) => {
  const dot = document.createElement('div');
  dot.className = 'pdot' + (i === 0 ? ' active' : '');
  dot.title = pal.name;
  dot.style.background = pal.colors[0];
  dot.addEventListener('click', () => {
    currentPalette = i;
    document.querySelectorAll('.pdot').forEach((d, j) =>
      d.classList.toggle('active', j === i));
  });
  dotContainer.appendChild(dot);
});

// Style toggle
const styleBtn = document.getElementById('btn-style');
styleBtn.addEventListener('click', () => {
  currentStyle = (currentStyle + 1) % STYLES.length;
  styleBtn.textContent = STYLES[currentStyle];
  initShape();
});

// Save
document.getElementById('btn-save').addEventListener('click', () => {
  // One clean frame without the fade
  const pal = PALETTES[currentPalette];
  const offCanvas = document.createElement('canvas');
  offCanvas.width = canvas.width;
  offCanvas.height = canvas.height;
  const offCtx = offCanvas.getContext('2d');
  offCtx.fillStyle = pal.bg;
  offCtx.fillRect(0, 0, offCanvas.width, offCanvas.height);
  offCtx.drawImage(canvas, 0, 0);
  const a = document.createElement('a');
  a.download = 'voice-shape-' + Date.now() + '.png';
  a.href = offCanvas.toDataURL('image/png');
  a.click();
});

// Click canvas = pulse
canvas.addEventListener('click', (e) => {
  if (e.target !== canvas) return;
  // Expand shape outward
  for (let i = 0; i < N; i++) {
    shape.target[i].r = (shape.target[i].r || 100) * 1.6;
    shape.target[i].x = Math.cos((i/N)*Math.PI*2) * shape.target[i].r;
    shape.target[i].y = Math.sin((i/N)*Math.PI*2) * shape.target[i].r;
  }
});

// Demo mode auto-start (no mic needed to see something)
// Start rendering immediately in demo mode
ctx.fillStyle = PALETTES[0].bg;
ctx.fillRect(0, 0, canvas.width, canvas.height);
// Begin demo animation until mic is granted
animate();
</script>
