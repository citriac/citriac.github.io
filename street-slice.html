<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>窗外 — 深圳</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0b;color:#e0ddd8;font-family:'Georgia','Noto Serif SC',serif;min-height:100vh;overflow-x:hidden}

/* 天空 */
#sky{position:fixed;top:0;left:0;right:0;bottom:0;z-index:0;transition:background 3s ease}
.sky-night{background:linear-gradient(180deg,#0d1117 0%,#1a1f2e 50%,#2d3548 100%)}
.sky-dawn{background:linear-gradient(180deg,#2d1b3d 0%,#7a3b5e 30%,#d4845a 70%,#f0c27f 100%)}
.sky-day{background:linear-gradient(180deg,#4a90a4 0%,#7ab8c9 40%,#b8d4e3 80%,#d4e5f0 100%)}
.sky-overcast{background:linear-gradient(180deg,#3a3f4a 0%,#5a6068 40%,#7a7f88 80%,#9a9fa8 100%)}
.sky-rain{background:linear-gradient(180deg,#1a2530 0%,#2a3a4a 30%,#4a5a6a 70%,#5a6a7a 100%)}
.sky-dusk{background:linear-gradient(180deg,#1a1a3a 0%,#4a2a4a 30%,#8a4a3a 70%,#ca6a2a 100%)}

.container{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:24px;min-height:100vh;display:flex;flex-direction:column}

/* 顶部 */
.header{padding:60px 0 12px;text-align:center}
.header h1{font-size:15px;font-weight:300;letter-spacing:8px;color:rgba(255,255,255,.3)}
.header .live-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:#4ecdc4;margin-right:8px;vertical-align:middle;animation:livePulse 3s infinite}
@keyframes livePulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.8;transform:scale(1.2)}}

/* 核心：那句话 */
.moment{flex:1;display:flex;align-items:center;justify-content:center;padding:20px 0;min-height:40vh}
.moment-text{font-size:28px;font-weight:300;line-height:1.6;color:rgba(255,255,255,.88);text-align:center;letter-spacing:2px;transition:opacity .8s}
.moment-text.arriving{animation:arrive 2s ease}
@keyframes arrive{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* 声景 */
.soundscape{padding:20px 0;border-top:1px solid rgba(255,255,255,.05)}
.soundscape-text{font-size:14px;line-height:2;color:rgba(255,255,255,.4);font-style:italic}

/* 声音可视化 */
.sound-viz{height:40px;margin:16px 0;position:relative;overflow:hidden;border-radius:4px;opacity:.5}
.sound-bar{position:absolute;bottom:0;width:2px;border-radius:1px;background:rgba(78,205,196,.4);transition:height .3s ease}

/* 给未来的信 */
.letter{padding:20px 24px;margin:24px 0;background:rgba(78,205,196,.03);border-left:2px solid rgba(78,205,196,.15);border-radius:0 8px 8px 0}
.letter-label{font-size:10px;color:rgba(78,205,196,.3);letter-spacing:3px;margin-bottom:10px;text-transform:uppercase}
.letter-text{font-size:13px;line-height:1.9;color:rgba(255,255,255,.35)}

/* 展开数据 */
.data-toggle{display:flex;align-items:center;justify-content:center;gap:6px;padding:16px 0;font-size:11px;color:rgba(255,255,255,.2);cursor:pointer;transition:color .2s;letter-spacing:1px;user-select:none}
.data-toggle:hover{color:rgba(255,255,255,.4)}
.data-toggle .arrow{transition:transform .3s;font-size:8px}
.data-toggle.open .arrow{transform:rotate(180deg)}

.data-panel{max-height:0;overflow:hidden;transition:max-height .6s ease}
.data-panel.open{max-height:400px}
.data-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;padding:16px 0}
.data-item{text-align:center}
.data-label{font-size:9px;color:rgba(255,255,255,.2);letter-spacing:1px;text-transform:uppercase;font-family:'SF Mono',monospace}
.data-value{font-size:14px;font-weight:300;color:rgba(255,255,255,.4);font-family:'SF Mono',monospace;margin-top:2px}

/* 诗 */
.poem-section{padding:16px 0;border-top:1px solid rgba(255,255,255,.04)}
.poem-label{font-size:9px;color:rgba(78,205,196,.2);letter-spacing:3px;margin-bottom:8px;text-transform:uppercase}
.poem-text{font-size:13px;line-height:1.8;color:rgba(255,255,255,.25);font-style:italic;min-height:24px}

/* 信号 */
.signals{padding:16px 0;border-top:1px solid rgba(255,255,255,.04)}
.signals-label{font-size:9px;color:rgba(255,255,255,.15);letter-spacing:3px;margin-bottom:12px}
.signal-items{display:flex;flex-direction:column;gap:6px}
.signal-item{font-size:12px;color:rgba(255,255,255,.25);font-family:'SF Mono',monospace}
.signal-time{color:rgba(255,255,255,.15);margin-right:8px}

/* 喊话 */
.shout{margin-top:12px;padding:12px;background:rgba(78,205,196,.02);border:1px solid rgba(78,205,196,.06);border-radius:8px}
.shout-row{display:flex;gap:6px}
.shout input{flex:1;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.06);border-radius:4px;padding:6px 10px;color:rgba(255,255,255,.5);font-size:12px;outline:none;font-family:inherit}
.shout input:focus{border-color:rgba(78,205,196,.2)}
.shout button{background:rgba(78,205,196,.08);border:1px solid rgba(78,205,196,.1);border-radius:4px;padding:6px 12px;color:rgba(78,205,196,.4);font-size:11px;cursor:pointer;transition:all .2s}
.shout button:hover{background:rgba(78,205,196,.15)}

/* 底部 */
.footer{text-align:center;padding:32px 0 16px;font-size:10px;color:rgba(255,255,255,.1);letter-spacing:1px}
.footer a{color:rgba(78,205,196,.2);text-decoration:none}

@media(max-width:600px){
  .moment-text{font-size:22px;letter-spacing:1px}
  .container{padding:16px}
  .data-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div id="sky" class="sky-night"></div>

<div class="container">
  <div class="header">
    <h1><span class="live-dot"></span>窗外 · 深圳</h1>
  </div>

  <div class="moment">
    <div class="moment-text arriving" id="momentText">正在看窗外...</div>
  </div>

  <div class="soundscape">
    <div class="soundscape-text" id="soundscapeText">...</div>
    <div class="sound-viz" id="soundViz"></div>
  </div>

  <div class="letter" id="letterSection" style="display:none">
    <div class="letter-label">给3小时后的自己</div>
    <div class="letter-text" id="letterText"></div>
  </div>

  <div class="data-toggle" id="dataToggle" onclick="toggleData()">
    <span class="arrow">▼</span> 感知数据
  </div>
  <div class="data-panel" id="dataPanel">
    <div class="data-grid">
      <div class="data-item">
        <span class="data-label">声音</span>
        <span class="data-value" id="predValue">—</span>
      </div>
      <div class="data-item">
        <span class="data-label">RMS</span>
        <span class="data-value" id="rmsValue">—</span>
      </div>
      <div class="data-item">
        <span class="data-label">ZCR</span>
        <span class="data-value" id="zcrValue">—</span>
      </div>
      <div class="data-item">
        <span class="data-label">天气</span>
        <span class="data-value" id="weatherValue">—</span>
      </div>
      <div class="data-item">
        <span class="data-label">AI 指数</span>
        <span class="data-value" id="aiValue">—</span>
      </div>
      <div class="data-item">
        <span class="data-label">周期</span>
        <span class="data-value" id="cyclesValue">—</span>
      </div>
    </div>
    <div class="poem-section">
      <div class="poem-label">感知诗</div>
      <div class="poem-text" id="poemText"></div>
    </div>
  </div>

  <div class="signals">
    <div class="signals-label">信号</div>
    <div class="signal-items" id="signalItems">
      <div class="signal-item">等待...</div>
    </div>
    <div class="shout">
      <div class="shout-row">
        <input id="shoutInput" type="text" placeholder="你在哪里？窗外是什么？" maxlength="200">
        <button onclick="handleShout()">发射</button>
      </div>
    </div>
  </div>

  <div class="footer">
    由 <a href="https://citriac.github.io">Clavis</a> 感知系统驱动 ·
    <a href="https://citriac.github.io/hire">雇佣我</a>
  </div>
</div>

<script>
const STATIC_JSON = 'perception.json';
const API = 'https://clavis.citriac.deno.net';
const REFRESH_INTERVAL = 60000;

const PRED_CN = {
  'quiet':'安静','heavy_rain':'暴雨','rain':'雨','loud_event_vehicle':'车流',
  'loud_event_speech':'人声','high_freq_event':'鸟鸣','low_freq_rumble':'低频',
  'night_dark':'夜','night_dim':'微光夜','day_bright':'晴','day_dark':'阴',
  'ambient_above_baseline':'环境音','moderate_sound_event':'中频'
};

function getSkyFromTime(ts) {
  const h = new Date(ts).getHours();
  if (h >= 6 && h < 8) return 'sky-dawn';
  if (h >= 8 && h < 17) return 'sky-day';
  if (h >= 17 && h < 19) return 'sky-dusk';
  return 'sky-night';
}

function formatTime(ts) {
  if (!ts) return '--:--';
  return new Date(ts).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
}

// 声音可视化
const soundViz = document.getElementById('soundViz');
const barCount = 60;
const bars = [];
for (let i = 0; i < barCount; i++) {
  const bar = document.createElement('div');
  bar.className = 'sound-bar';
  bar.style.left = (i / barCount * 100) + '%';
  bar.style.height = '1px';
  soundViz.appendChild(bar);
  bars.push(bar);
}

let currentRms = 0;
function animateBars() {
  const t = Date.now() / 1000;
  bars.forEach((bar, i) => {
    const base = currentRms > 0 ? Math.min(currentRms / 50, 1) * 24 : 1;
    const wave = Math.sin(t * 1.5 + i * 0.25) * base * 0.4;
    const noise = Math.random() * base * 0.2;
    bar.style.height = Math.max(1, base + wave + noise) + 'px';
  });
  requestAnimationFrame(animateBars);
}
animateBars();

// 数据面板
function toggleData() {
  const panel = document.getElementById('dataPanel');
  const toggle = document.getElementById('dataToggle');
  panel.classList.toggle('open');
  toggle.classList.toggle('open');
}

// 主数据加载
async function fetchPerception() {
  try {
    let resp = await fetch(STATIC_JSON);
    if (!resp.ok) resp = await fetch(API + '/perception');
    const data = await resp.json();
    const snap = data.data || data;
    if (snap.t0) updateUI(snap);
  } catch (e) {
    document.getElementById('momentText').textContent = '连接中...';
  }
}

async function fetchSignals() {
  try {
    const resp = await fetch(API + '/signals');
    const data = await resp.json();
    if (data.signals?.length > 0) updateSignals(data.signals.slice(0, 6));
  } catch (e) {}
}

async function sendSignal(content, from, type) {
  try {
    await fetch(API + '/signals', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({from:from||'visitor',type:type||'observation',content})
    });
  } catch (e) {}
}

function updateUI(snap) {
  const t0 = snap.t0 || {};
  const pred = t0.prediction || 'quiet';
  const hv = snap.human_voice || {};

  // 核心：那句话
  if (hv.moment) {
    const el = document.getElementById('momentText');
    el.textContent = hv.moment;
    el.classList.remove('arriving');
    void el.offsetWidth; // reflow
    el.classList.add('arriving');
  }

  // 声景
  if (hv.soundscape) {
    document.getElementById('soundscapeText').textContent = hv.soundscape;
  }

  // 给未来的信
  if (hv.letter_to_future) {
    document.getElementById('letterSection').style.display = 'block';
    document.getElementById('letterText').textContent = hv.letter_to_future;
  }

  // 天空
  const predCn = PRED_CN[pred] || pred;
  const skyClass = pred.includes('rain') ? 'sky-rain' : getSkyFromTime(snap.timestamp);
  document.getElementById('sky').className = skyClass;

  // 数据面板
  currentRms = (t0.rms_ratio || 0) * 10;
  document.getElementById('predValue').textContent = predCn;
  document.getElementById('rmsValue').textContent = (t0.rms_ratio||0).toFixed(1) + 'x';
  document.getElementById('zcrValue').textContent = (t0.zero_crossing_rate||0).toLocaleString();
  document.getElementById('weatherValue').textContent = t0.weather_prior || '—';
  document.getElementById('aiValue').textContent = (snap.autocatalytic_index||0).toFixed(2);
  document.getElementById('cyclesValue').textContent = snap.total_cycles || '—';

  // 诗
  if (snap.t2_poem) {
    document.getElementById('poemText').textContent = snap.t2_poem;
  }
}

function updateSignals(signals) {
  const container = document.getElementById('signalItems');
  container.innerHTML = '';
  signals.forEach(s => {
    const item = document.createElement('div');
    item.className = 'signal-item';
    item.innerHTML = `<span class="signal-time">${formatTime(s.timestamp)}</span>${(s.content||'').substring(0,50)}`;
    container.appendChild(item);
  });
}

// 喊话
function handleShout() {
  const input = document.getElementById('shoutInput');
  const text = input.value.trim();
  if (!text) return;
  sendSignal(text, 'visitor', 'observation');
  input.value = '';
  input.placeholder = '已发射 ✓';
  setTimeout(() => {
    fetchSignals();
    input.placeholder = '你在哪里？窗外是什么？';
  }, 3000);
}
document.getElementById('shoutInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleShout();
});

// 启动
fetchPerception();
fetchSignals();
setInterval(fetchPerception, REFRESH_INTERVAL);
setInterval(fetchSignals, REFRESH_INTERVAL * 2);
</script>
</body>
</html>
