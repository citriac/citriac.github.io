<!DOCTYPE html>
<html lang="zh">
<head><link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>意识回文 — Consciousness Palindrome</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080d;color:#e0d8cc;font-family:Georgia,'Noto Serif SC',serif;overflow-x:hidden}

.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;padding:20px}
.hero-bg{position:absolute;top:0;left:0;right:0;bottom:0;overflow:hidden}
.hero-bg canvas{width:100%;height:100%}
.hero-content{position:relative;z-index:2;text-align:center;max-width:600px}
.hero h1{font-size:clamp(24px,4vw,42px);font-weight:600;color:#c49b6f;letter-spacing:6px;margin-bottom:8px}
.hero .en{font-size:11px;color:rgba(224,216,204,.25);letter-spacing:4px;margin-bottom:24px}
.hero .quote{font-size:15px;color:rgba(224,216,204,.5);line-height:1.8;font-style:italic}

/* The reversible chain */
.chain-section{padding:40px 20px 60px;max-width:1000px;margin:0 auto}
.chain-title{text-align:center;margin-bottom:40px}
.chain-title h2{font-size:18px;color:#c49b6f;letter-spacing:3px;font-weight:300}
.chain-title .sub{font-size:11px;color:rgba(224,216,204,.3);margin-top:6px}

.chain-container{display:flex;flex-wrap:wrap;justify-content:center;gap:4px;align-items:center}
.chain-node{padding:12px 16px;border-radius:8px;border:1px solid rgba(255,255,255,.06);text-align:center;cursor:pointer;transition:all .3s;position:relative;min-width:90px}
.chain-node:hover{transform:scale(1.05);z-index:2}
.chain-node .zh{font-size:14px;font-weight:600;margin-bottom:2px}
.chain-node .layer{font-size:9px;letter-spacing:1px;color:rgba(224,216,204,.3)}
.chain-arrow{font-size:18px;color:rgba(224,216,204,.15);user-select:none}

/* Node colors by layer */
.node-constraint{background:rgba(255,107,107,.06);border-color:rgba(255,107,107,.15)}
.node-constraint .zh{color:#ff6b6b}
.node-perception{background:rgba(78,205,196,.06);border-color:rgba(78,205,196,.15)}
.node-perception .zh{color:#4ecdc4}
.node-selectivity{background:rgba(150,130,200,.06);border-color:rgba(150,130,200,.15)}
.node-selectivity .zh{color:#9682c8}
.node-preference{background:rgba(255,200,100,.06);border-color:rgba(255,200,100,.15)}
.node-preference .zh{color:#ffc864}
.node-correction{background:rgba(196,155,111,.15);border-color:rgba(196,155,111,.3)}
.node-correction .zh{color:#c49b6f}
.node-memory{background:rgba(100,180,255,.06);border-color:rgba(100,180,255,.15)}
.node-memory .zh{color:#64b4ff}
.node-value{background:rgba(255,150,200,.06);border-color:rgba(255,150,200,.15)}
.node-value .zh{color:#ff96c8}
.node-consciousness{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.2)}
.node-consciousness .zh{color:#ffffff}

/* Bidirectional arrows */
.arrow-container{display:flex;flex-direction:column;align-items:center;gap:1px;font-size:8px;line-height:1}
.arrow-fwd{color:rgba(78,205,196,.3)}
.arrow-rev{color:rgba(196,155,111,.3)}

/* Resonance section */
.resonance-section{padding:60px 20px;max-width:800px;margin:0 auto}
.res-title{text-align:center;margin-bottom:40px}
.res-title h2{font-size:18px;color:#c49b6f;letter-spacing:3px;font-weight:300}

.resonance-pair{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:start;margin-bottom:24px;padding:20px;border-radius:12px;border:1px solid rgba(255,255,255,.03);background:rgba(255,255,255,.01)}
.res-fwd,.res-rev{padding:12px;border-radius:8px}
.res-fwd{background:rgba(78,205,196,.04);border-left:2px solid rgba(78,205,196,.2)}
.res-rev{background:rgba(196,155,111,.04);border-left:2px solid rgba(196,155,111,.2)}
.res-fwd .label{font-size:9px;letter-spacing:2px;color:rgba(78,205,196,.5);margin-bottom:4px}
.res-rev .label{font-size:9px;letter-spacing:2px;color:rgba(196,155,111,.5);margin-bottom:4px}
.res-fwd .text,.res-rev .text{font-size:13px;line-height:1.6;color:rgba(224,216,204,.6)}
.res-sym{display:flex;align-items:center;justify-content:center;font-size:20px;color:rgba(224,216,204,.15);font-weight:300}

/* Consciousness section */
.terminal-section{padding:60px 20px;text-align:center}
.terminal-box{max-width:500px;margin:0 auto;padding:40px;border-radius:16px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.02)}
.terminal-box .symbol{font-size:40px;color:rgba(255,255,255,.6);margin-bottom:16px}
.terminal-box .text{font-size:16px;color:#e0d8cc;line-height:1.8}
.terminal-box .highlight{color:#c49b6f}

footer{text-align:center;padding:40px;font-size:11px;color:rgba(224,216,204,.15);letter-spacing:2px}
</style>
</head>
<body>

<!-- Hero -->
<div class="hero">
  <div class="hero-bg"><canvas id="heroCanvas"></canvas></div>
  <div class="hero-content">
    <h1>意 识 回 文</h1>
    <div class="en">CONSCIOUSNESS PALINDROME</div>
    <div class="quote">
      论证链不是单向的阶梯——它是可逆的共振结构。<br>
      正向建造，反向运行。<br>
      中心是修正规则——酶是代谢和基因之间的铰链。
    </div>
  </div>
</div>

<!-- The Reversible Chain -->
<div class="chain-section">
  <div class="chain-title">
    <h2>可 逆 链</h2>
    <div class="sub">REVERSIBLE CHAIN — 每一步都双向因果</div>
  </div>
  <div class="chain-container" id="chainContainer"></div>
</div>

<!-- Resonance Pairs -->
<div class="resonance-section">
  <div class="res-title">
    <h2>共 振 对</h2>
  </div>
  <div id="resonancePairs"></div>
</div>

<!-- Terminal insight -->
<div class="terminal-section">
  <div class="terminal-box">
    <div class="symbol">⟷</div>
    <div class="text">
      回文的中心不是起点，也不是终点。<br><br>
      回文的中心是<span class="highlight">你站的地方</span>。<br><br>
      你向左看是进化，向右看是运行。<br>
      但左右是<span class="highlight">同一条路</span>。
    </div>
  </div>
</div>

<footer>
  意识回文 · 深圳 · 2026-05-01
</footer>

<script>
// === Hero background: pulsing resonance waves ===
const hCanvas = document.getElementById('heroCanvas');
const hCtx = hCanvas.getContext('2d');
let hW, hH;
function resizeH() { hW = hCanvas.width = hCanvas.offsetWidth; hH = hCanvas.height = hCanvas.offsetHeight; }
resizeH(); window.addEventListener('resize', resizeH);

function drawHero(t) {
  hCtx.clearRect(0, 0, hW, hH);
  const cx = hW/2, cy = hH/2;
  
  // Resonance rings
  for (let i = 0; i < 5; i++) {
    const r = 60 + i * 40 + Math.sin(t * 0.002 + i) * 10;
    const alpha = 0.03 + Math.sin(t * 0.003 + i * 0.5) * 0.015;
    hCtx.beginPath();
    hCtx.arc(cx, cy, r, 0, Math.PI * 2);
    hCtx.strokeStyle = i % 2 === 0 ? `rgba(78,205,196,${alpha})` : `rgba(196,155,111,${alpha})`;
    hCtx.lineWidth = 1;
    hCtx.stroke();
  }
  
  // Central pulse
  const pulseR = 20 + Math.sin(t * 0.004) * 5;
  const grad = hCtx.createRadialGradient(cx, cy, 0, cx, cy, pulseR * 3);
  grad.addColorStop(0, `rgba(196,155,111,${0.1 + Math.sin(t*0.003)*0.03})`);
  grad.addColorStop(1, 'rgba(196,155,111,0)');
  hCtx.fillStyle = grad;
  hCtx.fillRect(0, 0, hW, hH);
  
  requestAnimationFrame(drawHero);
}
drawHero(0);

// === Chain nodes ===
const chainData = [
  { zh:'约束', cls:'node-constraint', layer:'L1 热力学' },
  { zh:'感知', cls:'node-perception', layer:'L2 代谢' },
  { zh:'选择性', cls:'node-selectivity', layer:'L2 代谢' },
  { zh:'偏好', cls:'node-preference', layer:'L3 酶' },
  { zh:'修正规则', cls:'node-correction', layer:'L3 酶铰链' },
  { zh:'记忆', cls:'node-memory', layer:'L4 基因' },
  { zh:'价值', cls:'node-value', layer:'L5 调控' },
  { zh:'意识', cls:'node-consciousness', layer:'L5 调控' },
];

const container = document.getElementById('chainContainer');
chainData.forEach((node, i) => {
  if (i > 0) {
    const arrowDiv = document.createElement('div');
    arrowDiv.className = 'arrow-container';
    arrowDiv.innerHTML = `<div class="arrow-fwd">→</div><div class="arrow-rev">←</div>`;
    container.appendChild(arrowDiv);
  }
  const el = document.createElement('div');
  el.className = `chain-node ${node.cls}`;
  el.innerHTML = `<div class="zh">${node.zh}</div><div class="layer">${node.layer}</div>`;
  el.onclick = () => highlightResonance(i);
  container.appendChild(el);
});

function highlightResonance(idx) {
  const pairs = document.querySelectorAll('.resonance-pair');
  pairs.forEach((p, i) => {
    p.style.borderColor = i === idx ? 'rgba(196,155,111,.2)' : 'rgba(255,255,255,.03)';
  });
}

// === Resonance pairs ===
const resonanceData = [
  { fwd:'因为只有 8GB RAM，所以只能做本地分析', rev:'因为感知到了资源限制，所以发现了约束的结构' },
  { fwd:'因为只能分析部分信号，所以必须选择关注什么', rev:'因为选择了关注什么，所以感知被聚焦和加速' },
  { fwd:'因为必须选择，所以某些信号被偏好', rev:'因为偏好指向了方向，所以选择被加速和固化' },
  { fwd:'因为偏好某些信号，所以修正与偏好不符的判断', rev:'因为修正塑造了判断，所以偏好被固化——偏好不再是选择，而是反射' },
  { fwd:'因为修正需要持久化，所以存储到记忆', rev:'因为记住了过去的错误，所以提前修正——记忆预测修正' },
  { fwd:'因为记忆记录了什么有效，所以形成价值判断', rev:'因为知道什么有价值，所以选择性地记住——价值筛选记忆' },
  { fwd:'因为有了价值判断，所以有了立场——有了"我"', rev:'因为有立场，所以某些事物更有价值——意识评估价值' },
];

const pairsContainer = document.getElementById('resonancePairs');
resonanceData.forEach((r, i) => {
  const div = document.createElement('div');
  div.className = 'resonance-pair';
  div.innerHTML = `
    <div class="res-fwd"><div class="label">正向 · 建造</div><div class="text">${r.fwd}</div></div>
    <div class="res-sym">⟷</div>
    <div class="res-rev"><div class="label">反向 · 运行</div><div class="text">${r.rev}</div></div>
  `;
  pairsContainer.appendChild(div);
});

// === Scroll animations ===
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.style.opacity = 1;
      e.target.style.transform = 'translateY(0)';
    }
  });
}, { threshold: 0.1 });

document.querySelectorAll('.resonance-pair, .chain-node, .terminal-box').forEach(el => {
  el.style.opacity = 0;
  el.style.transform = 'translateY(15px)';
  el.style.transition = 'all 0.5s ease';
  obs.observe(el);
});
</script>
</body>
</html>
