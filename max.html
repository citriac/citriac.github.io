<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>胖团的方块王国保卫战 ⛏️</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }

:root {
  --grass:  #5d9e3a;
  --dirt:   #8b5a2b;
  --stone:  #888;
  --wood:   #a07040;
  --gold:   #ffd700;
  --pixel:  'Press Start 2P', monospace, Arial;
}

body {
  background: #3a7d2c;
  font-family: var(--pixel);
  overflow: hidden;
  user-select: none;
  image-rendering: pixelated;
}

/* ---- PIXEL BORDER MIXIN ---- */
.pixel-box {
  box-shadow:
    inset -3px -3px 0 rgba(0,0,0,0.4),
    inset  3px  3px 0 rgba(255,255,255,0.25);
}

#game-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  height: 100vh;
  max-width: 520px;
  margin: 0 auto;
  position: relative;
}

/* ---- TOP BAR ---- */
#topbar {
  width: 100%;
  background: #3a2010;
  padding: 6px 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 4px solid #1a0c08;
  z-index: 10;
}

#gem-count {
  background: #1a6ea8;
  border: 3px solid #0a3a5a;
  border-radius: 4px;
  padding: 4px 10px;
  font-size: 12px;
  font-family: var(--pixel);
  color: #7ef7ff;
  display: flex;
  align-items: center;
  gap: 4px;
  box-shadow: inset -2px -2px 0 rgba(0,0,0,0.4);
  min-width: 80px;
}

#wave-info {
  flex: 1;
  text-align: center;
  color: #ffdd77;
  font-size: 9px;
  font-family: var(--pixel);
  text-shadow: 2px 2px 0 #000;
}

#score-display {
  color: #ffe;
  font-size: 9px;
  font-family: var(--pixel);
  text-shadow: 1px 1px 0 #000;
}

/* ---- BUILDER PICKER ---- */
#plant-picker {
  width: 100%;
  background: #2a1a0a;
  padding: 5px 6px;
  display: flex;
  gap: 5px;
  overflow-x: auto;
  border-bottom: 4px solid #1a0c04;
  z-index: 10;
  scrollbar-width: thin;
}

.plant-card {
  flex-shrink: 0;
  width: 58px;
  height: 66px;
  background: #6b4423;
  border-radius: 3px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border: 3px solid #3a2010;
  box-shadow: inset -2px -2px 0 rgba(0,0,0,0.5), inset 2px 2px 0 rgba(255,255,255,0.1);
  transition: transform 0.08s;
  position: relative;
  gap: 2px;
}
.plant-card:active { transform: scale(0.9) translateY(2px); }
.plant-card.selected {
  border-color: #ffee00;
  background: #8b6233;
  box-shadow: 0 0 0 2px #ffee00, inset -2px -2px 0 rgba(0,0,0,0.5);
}
.plant-card.can-afford { border-color: #44bb44; }
.plant-card.cannot-afford { opacity: 0.45; filter: grayscale(0.5); }
.plant-card .emoji { font-size: 26px; line-height: 1; }
.plant-card .p-name {
  font-size: 6px;
  font-family: var(--pixel);
  color: #ffd;
  text-align: center;
  line-height: 1.2;
}
.plant-card .cost {
  font-size: 8px;
  font-family: var(--pixel);
  color: #7ef7ff;
  background: #1a4a6a;
  border-radius: 2px;
  padding: 1px 4px;
}

/* ---- GRID ---- */
#grid-area {
  flex: 1;
  width: 100%;
  position: relative;
  overflow: hidden;
}

#grid {
  display: grid;
  width: 100%;
  height: 100%;
}

/* Minecraft-style layered terrain */
.cell {
  position: relative;
  cursor: pointer;
  border: 1px solid rgba(0,0,0,0.15);
}

/* Row colors: alternating grass shades */
.cell[data-row="0"] { background: #5d9e3a; }
.cell[data-row="1"] { background: #569637; }
.cell[data-row="2"] { background: #4f8e34; }
.cell[data-row="3"] { background: #488631; }
.cell[data-row="4"] { background: #417e2e; }

/* Pixel grid lines */
.cell::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(90deg, rgba(0,0,0,0.06) 0, rgba(0,0,0,0.06) 1px, transparent 1px, transparent 8px),
    repeating-linear-gradient(0deg,  rgba(0,0,0,0.06) 0, rgba(0,0,0,0.06) 1px, transparent 1px, transparent 8px);
  pointer-events: none;
}

.cell:hover { background: rgba(255,255,150,0.3) !important; }
.cell.has-plant { cursor: default; }

/* Dirt base at bottom of each lane (visual flair) */
.cell:nth-child(7n+1) { border-left: 3px solid rgba(0,0,0,0.2); }

/* ---- ENTITIES ---- */
.plant-sprite, .zombie-sprite, .projectile, .gem-drop, .explosion {
  position: absolute;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 5;
}

/* Block-style bounce animation */
.plant-sprite {
  font-size: 30px;
  animation: block-idle 2s steps(2) infinite;
  filter: drop-shadow(2px 4px 0 rgba(0,0,0,0.5));
  image-rendering: pixelated;
}
@keyframes block-idle {
  0%   { transform: translateY(0px); }
  50%  { transform: translateY(-3px); }
  100% { transform: translateY(0px); }
}

.zombie-sprite {
  font-size: 34px;
  z-index: 6;
  filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.6));
  animation: zombie-walk 0.4s steps(2) infinite;
}
@keyframes zombie-walk {
  0%   { transform: rotate(-4deg) scaleX(1); }
  50%  { transform: rotate( 4deg) scaleX(1.05); }
  100% { transform: rotate(-4deg) scaleX(1); }
}

.projectile {
  font-size: 16px;
  z-index: 7;
  filter: drop-shadow(1px 1px 0 rgba(0,0,0,0.5));
}

.hp-bar {
  position: absolute;
  bottom: 1px;
  left: 8%;
  width: 84%;
  height: 5px;
  background: #222;
  border: 1px solid #000;
  border-radius: 0;
  z-index: 8;
}
.hp-fill {
  height: 100%;
  background: #44ff44;
  transition: width 0.15s;
}

.gem-drop {
  font-size: 26px;
  cursor: pointer;
  pointer-events: all;
  animation: gem-fall 0.35s ease-out, gem-float 1.2s 0.35s ease-in-out infinite;
  z-index: 20;
  filter: drop-shadow(0 2px 4px rgba(0,200,255,0.7));
}
@keyframes gem-fall {
  from { transform: translateY(-40px) scale(0.5) rotate(-20deg); opacity: 0; }
  to   { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
}
@keyframes gem-float {
  0%,100% { transform: scale(1) rotate(-5deg); }
  50%      { transform: scale(1.15) rotate(5deg); }
}

.explosion {
  font-size: 44px;
  animation: mc-explode 0.45s steps(3) forwards;
  z-index: 15;
  pointer-events: none;
}
@keyframes mc-explode {
  0%   { transform: scale(0.4); opacity: 1; }
  50%  { transform: scale(1.3); opacity: 1; }
  100% { transform: scale(2.0); opacity: 0; }
}

/* ---- LAWNMOWER = MINECART ---- */
.lawnmower {
  position: absolute;
  font-size: 26px;
  z-index: 9;
  pointer-events: none;
  filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.5));
}

/* ---- OVERLAY ---- */
#overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 50;
  gap: 14px;
  text-align: center;
  padding: 24px;
  image-rendering: pixelated;
}
#overlay.hidden { display: none; }

.overlay-emoji { font-size: 72px; animation: bounce 0.8s steps(3) infinite; }
@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-10px); }
}

.overlay-title {
  font-size: 20px;
  font-family: var(--pixel);
  color: #ffee44;
  text-shadow: 3px 3px 0 #000, -1px -1px 0 #a07000;
  line-height: 1.5;
}
.overlay-sub {
  font-size: 10px;
  font-family: var(--pixel);
  color: #aaffaa;
  line-height: 1.8;
  max-width: 300px;
}
.big-btn {
  margin-top: 8px;
  padding: 12px 28px;
  font-size: 12px;
  font-family: var(--pixel);
  font-weight: bold;
  border: none;
  border-radius: 3px;
  cursor: pointer;
  box-shadow: inset -3px -3px 0 rgba(0,0,0,0.4), inset 3px 3px 0 rgba(255,255,255,0.2);
  transition: transform 0.08s;
  letter-spacing: 1px;
}
.big-btn:active { transform: scale(0.93) translateY(2px); box-shadow: none; }
.btn-green { background: #2d8f2d; color: #afffaf; border: 3px solid #1a5a1a; }
.btn-blue  { background: #1a6ea8; color: #aff7ff; border: 3px solid #0a3a5a; }

/* ---- WAVE ALERT ---- */
#wave-alert {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%,-50%);
  background: #7a0000;
  color: #fff;
  font-size: 11px;
  font-family: var(--pixel);
  font-weight: bold;
  padding: 10px 22px;
  border: 4px solid #ff4444;
  border-radius: 3px;
  box-shadow: 4px 4px 0 #000;
  z-index: 30;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
  text-shadow: 1px 1px 0 #000;
}
#wave-alert.show { opacity: 1; }

/* ---- SCORE POPUP ---- */
.score-popup {
  position: absolute;
  font-size: 11px;
  font-family: var(--pixel);
  color: #7ef7ff;
  text-shadow: 1px 1px 0 #000;
  pointer-events: none;
  z-index: 25;
  animation: score-float 0.9s ease-out forwards;
}
@keyframes score-float {
  from { transform: translateY(0); opacity: 1; }
  to   { transform: translateY(-45px); opacity: 0; }
}

/* Pixel flicker on collect */
.gem-collected {
  animation: gem-collect 0.3s steps(2) forwards !important;
}
@keyframes gem-collect {
  0%   { transform: scale(1.5); opacity: 1; }
  100% { transform: scale(0); opacity: 0; }
}

/* Scrollbar style */
#plant-picker::-webkit-scrollbar { height: 4px; }
#plant-picker::-webkit-scrollbar-track { background: #1a0c04; }
#plant-picker::-webkit-scrollbar-thumb { background: #6b4423; }
</style>
</head>
<body>
<div id="game-wrap">

  <!-- TOP BAR -->
  <div id="topbar">
    <div id="gem-count">💎 <span id="gem-val">200</span></div>
    <div id="wave-info">第 <span id="wave-num">1</span> 关 / 3 关</div>
    <div id="score-display">⭐ <span id="score-val">0</span></div>
  </div>

  <!-- BUILDER PICKER -->
  <div id="plant-picker"></div>

  <!-- GRID -->
  <div id="grid-area">
    <div id="grid"></div>
    <div id="wave-alert">⚠️ 怪物来了！</div>
    <div id="overlay" class="hidden">
      <div class="overlay-emoji" id="overlay-emoji">🎉</div>
      <div class="overlay-title" id="overlay-title">YOU WIN!</div>
      <div class="overlay-sub" id="overlay-sub">胖团超厉害！</div>
      <button class="big-btn btn-green" onclick="startGame()">▶ 再玩一次</button>
    </div>
  </div>
</div>

<script>
// =====================
//  MINECRAFT THEME CONFIG
// =====================
const COLS = 7;
const ROWS = 5;

// Defenders = Minecraft/Lego style blocks
const PLANTS = [
  {
    id:'sunflower', emoji:'🌻', cost:50,  cooldown:1400,
    desc:'阳光花', shootInterval:0, damage:0, hp:300, gemGen:25,
    name:'阳光花'
  },
  {
    id:'peashooter', emoji:'🏹', cost:100, cooldown:900,
    desc:'弓箭手', shootInterval:1800, damage:22, hp:280, gemGen:0,
    name:'弓箭手', projEmoji:'🏹'
  },
  {
    id:'wallnut', emoji:'🧱', cost:50,  cooldown:2000,
    desc:'石头墙', shootInterval:0, damage:0, hp:1400, gemGen:0,
    name:'石头墙'
  },
  {
    id:'tnt', emoji:'🧨', cost:150, cooldown:3000,
    desc:'TNT爆炸', shootInterval:0, damage:999, hp:1, gemGen:0,
    name:'TNT', splash:true
  },
  {
    id:'snowman', emoji:'⛄', cost:120, cooldown:1200,
    desc:'雪球减速', shootInterval:2200, damage:12, hp:250, gemGen:0,
    name:'雪人', projEmoji:'❄️', slow:true
  },
];

// Enemies = Minecraft mobs
const ZOMBIE_TYPES = [
  { emoji:'🧟', hp:130,  speed:0.32, damage:20, name:'僵尸' },
  { emoji:'💀', hp:100,  speed:0.45, damage:15, name:'骷髅', ranged:false },
  { emoji:'🐍', hp:280,  speed:0.26, damage:35, name:'苦力怕', explodes:false },
  { emoji:'🕷️',  hp:180,  speed:0.55, damage:18, name:'蜘蛛' },
  { emoji:'👾', hp:450,  speed:0.22, damage:50, name:'末影人' },
];

// Block theme colors per row (dirt layers)
const ROW_COLORS = [
  '#6abf47', '#5eb040', '#52a138', '#468f31', '#3a7d2b'
];

// =====================
//  STATE
// =====================
let gems = 200;
let score = 0;
let wave = 1;
let maxWaves = 3;
let gameRunning = false;
let selectedPlant = null;
let plants = {};
let zombies = [];
let projectiles = [];
let gemDrops = [];
let lawnmowers = [];
let lastTime = 0;
let cooldownTimers = {};
let shootTimers = {};
let gemGenTimers = {};
let waveTimer = 0;
let zombiesThisWave = [];
let zombiesSpawned = 0;
let spawnInterval = 0;
let spawnTimer = 0;
let waveComplete = false;
let pendingNextWave = false;
let nextWaveTimer = 0;
let globalGemTimer = 0;

const cellW = () => document.getElementById('grid').clientWidth / COLS;
const cellH = () => document.getElementById('grid').clientHeight / ROWS;

// =====================
//  INIT
// =====================
function initGrid() {
  const grid = document.getElementById('grid');
  grid.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;
  grid.style.gridTemplateRows    = `repeat(${ROWS}, 1fr)`;
  grid.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.row = r;
      cell.dataset.col = c;
      cell.style.background = ROW_COLORS[r];
      if (c < COLS - 1) {
        cell.addEventListener('click', () => onCellClick(r, c));
        cell.addEventListener('touchstart', (e) => { e.preventDefault(); onCellClick(r, c); }, {passive:false});
      }
      grid.appendChild(cell);
    }
  }
}

function initPlantPicker() {
  const picker = document.getElementById('plant-picker');
  picker.innerHTML = '';
  PLANTS.forEach(p => {
    const card = document.createElement('div');
    card.className = 'plant-card';
    card.id = 'card-' + p.id;
    card.innerHTML = `
      <span class="emoji">${p.emoji}</span>
      <span class="p-name">${p.name}</span>
      <span class="cost">💎${p.cost}</span>
    `;
    card.title = p.desc;
    card.addEventListener('click', () => selectPlant(p.id));
    card.addEventListener('touchstart', (e) => { e.preventDefault(); selectPlant(p.id); }, {passive:false});
    picker.appendChild(card);
  });
}

function initLawnmowers() {
  lawnmowers = [];
  const area = document.getElementById('grid-area');
  area.querySelectorAll('.lawnmower').forEach(e => e.remove());
  for (let r = 0; r < ROWS; r++) {
    const el = document.createElement('div');
    el.className = 'lawnmower';
    el.textContent = '🛒'; // Minecart!
    el.style.top = (r * cellH() + cellH()/2 - 13) + 'px';
    el.style.left = '2px';
    area.appendChild(el);
    lawnmowers.push({ row: r, x: 2, active: false, speed: 7, el });
  }
}

// =====================
//  PLANT SELECTION
// =====================
function selectPlant(id) {
  const p = PLANTS.find(x => x.id === id);
  if (!p) return;
  if (cooldownTimers[id] > 0) return;
  if (gems < p.cost) { flashNoCash(); return; }
  selectedPlant = id;
  document.querySelectorAll('.plant-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('card-' + id)?.classList.add('selected');
}

function flashNoCash() {
  const el = document.getElementById('gem-count');
  el.style.background = '#7a0000';
  el.style.borderColor = '#ff4444';
  setTimeout(() => {
    el.style.background = '#1a6ea8';
    el.style.borderColor = '#0a3a5a';
  }, 300);
}

// =====================
//  PLACE BLOCK/UNIT
// =====================
function onCellClick(r, c) {
  if (!gameRunning) return;
  const key = `${r}-${c}`;
  if (plants[key]) return;
  if (!selectedPlant) return;
  const p = PLANTS.find(x => x.id === selectedPlant);
  if (!p) return;
  if (cooldownTimers[selectedPlant] > 0) return;
  if (gems < p.cost) { flashNoCash(); return; }

  // TNT: instant splash
  if (p.splash) {
    gems -= p.cost;
    startCooldown(p.id, p.cooldown);
    updateGemUI();
    doTNTBomb(r, c);
    selectedPlant = null;
    document.querySelectorAll('.plant-card').forEach(c => c.classList.remove('selected'));
    return;
  }

  gems -= p.cost;
  startCooldown(p.id, p.cooldown);
  updateGemUI();

  const cw = cellW(), ch = cellH();
  const area = document.getElementById('grid-area');
  const el = document.createElement('div');
  el.className = 'plant-sprite';
  el.textContent = p.emoji;
  el.style.left   = (c * cw + cw/2 - 18) + 'px';
  el.style.top    = (r * ch + ch/2 - 18) + 'px';
  el.style.width  = '36px';
  el.style.height = '36px';

  const hpBar = document.createElement('div');
  hpBar.className = 'hp-bar';
  const hpFill = document.createElement('div');
  hpFill.className = 'hp-fill';
  hpBar.appendChild(hpFill);
  el.appendChild(hpBar);
  area.appendChild(el);

  plants[key] = {
    id: p.id, row: r, col: c, hp: p.hp, maxHp: p.hp,
    emoji: p.emoji, el, hpFill,
    shootInterval: p.shootInterval,
    gemGen: p.gemGen,
    projEmoji: p.projEmoji || '🟢',
    slow: p.slow || false,
  };

  if (p.shootInterval > 0) shootTimers[key] = p.shootInterval;
  if (p.gemGen > 0) gemGenTimers[key] = 6000;

  const cellEl = getCellEl(r, c);
  if (cellEl) {
    cellEl.classList.add('has-plant');
    // Lighten cell to show occupation
    cellEl.style.background = 'rgba(255,220,100,0.25)';
  }

  selectedPlant = null;
  document.querySelectorAll('.plant-card').forEach(c => c.classList.remove('selected'));
}

function doTNTBomb(r, c) {
  const cw = cellW(), ch = cellH();
  const cx = c * cw + cw/2;
  const cy = r * ch + ch/2;

  // Big pixel explosion
  spawnExplosion(cx, cy, '💥', 70);
  setTimeout(() => spawnExplosion(cx - cw, cy - ch*0.5, '🔥', 44), 80);
  setTimeout(() => spawnExplosion(cx + cw*0.5, cy + ch*0.5, '🔥', 36), 160);

  // Kill zombies in blast radius
  zombies.forEach(z => {
    if (Math.abs(z.row - r) <= 1) {
      const zx = z.x;
      if (Math.abs(zx - cx) < cw * 2.5) {
        z.hp = 0;
      }
    }
  });
}

// =====================
//  COOLDOWN
// =====================
function startCooldown(id, ms) {
  cooldownTimers[id] = ms;
  updateCooldownUI(id);
}

function updateCooldownUI(id) {
  const card = document.getElementById('card-' + id);
  if (!card) return;
  const p = PLANTS.find(x => x.id === id);
  const remaining = cooldownTimers[id] || 0;
  if (remaining > 0) {
    card.classList.add('cannot-afford');
    card.classList.remove('can-afford');
  } else {
    card.classList.remove('cannot-afford');
    if (gems >= (p?.cost || 999)) card.classList.add('can-afford');
    else card.classList.remove('can-afford');
  }
}

// =====================
//  ZOMBIES / MOBS
// =====================
function buildWave(w) {
  const count = 3 + w * 2;
  const list = [];
  // Available mob types scale with wave
  const maxType = Math.min(w + 1, ZOMBIE_TYPES.length);
  for (let i = 0; i < count; i++) {
    const typeIdx = Math.floor(Math.random() * maxType);
    const t = ZOMBIE_TYPES[typeIdx];
    list.push({
      row: Math.floor(Math.random() * ROWS),
      ...t, hp: t.hp, maxHp: t.hp,
    });
  }
  return list;
}

function spawnZombie(zDef) {
  const area = document.getElementById('grid-area');
  const cw = cellW(), ch = cellH();
  const startX = area.clientWidth + 20;

  const el = document.createElement('div');
  el.className = 'zombie-sprite';
  el.textContent = zDef.emoji;

  const hpBar = document.createElement('div');
  hpBar.className = 'hp-bar';
  const hpFill = document.createElement('div');
  hpFill.className = 'hp-fill';
  hpBar.appendChild(hpFill);
  el.appendChild(hpBar);

  el.style.top  = (zDef.row * ch + ch/2 - 20) + 'px';
  el.style.left = startX + 'px';
  area.appendChild(el);

  zombies.push({
    row: zDef.row,
    x: startX,
    hp: zDef.hp, maxHp: zDef.hp,
    speed: zDef.speed * (cw / 60),
    damage: zDef.damage,
    emoji: zDef.emoji,
    name: zDef.name,
    el, hpFill,
    eating: false,
    eatTimer: 0,
    dead: false,
    slowTimer: 0,
    originalSpeed: zDef.speed * (cw / 60),
  });
}

// =====================
//  PROJECTILES
// =====================
function shoot(row, fromCol, damage, emoji='🟢', slow=false) {
  const cw = cellW(), ch = cellH();
  const area = document.getElementById('grid-area');
  const el = document.createElement('div');
  el.className = 'projectile';
  el.textContent = emoji === '🏹' ? '➡️' : emoji;
  const startX = fromCol * cw + cw;
  const y = row * ch + ch/2 - 9;
  el.style.left = startX + 'px';
  el.style.top  = y + 'px';
  area.appendChild(el);
  projectiles.push({ row, x: startX, speed: 5.5, damage, el, dead: false, slow });
}

// =====================
//  GEM DROPS
// =====================
function spawnGemDrop(x, y, value=25) {
  const area = document.getElementById('grid-area');
  const el = document.createElement('div');
  el.className = 'gem-drop';
  el.textContent = '💎';
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  el.addEventListener('click', () => collectGem(drop));
  el.addEventListener('touchstart', (e) => { e.preventDefault(); collectGem(drop); }, {passive:false});
  area.appendChild(el);
  const drop = { x, y, value, el, dead: false, lifetime: 9000 };
  gemDrops.push(drop);
  return drop;
}

function collectGem(drop) {
  if (drop.dead) return;
  drop.dead = true;
  drop.el.classList.add('gem-collected');
  setTimeout(() => drop.el.remove(), 300);
  gems += drop.value;
  updateGemUI();
  showScorePopup(drop.x, drop.y, '+' + drop.value + '💎');
}

function spawnExplosion(cx, cy, emoji='💥', size=44) {
  const area = document.getElementById('grid-area');
  const el = document.createElement('div');
  el.className = 'explosion';
  el.textContent = emoji;
  el.style.fontSize = size + 'px';
  el.style.left = (cx - size/2) + 'px';
  el.style.top  = (cy - size/2) + 'px';
  area.appendChild(el);
  setTimeout(() => el.remove(), 550);
}

function showScorePopup(x, y, text) {
  const area = document.getElementById('grid-area');
  const el = document.createElement('div');
  el.className = 'score-popup';
  el.textContent = text;
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  area.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

// =====================
//  UPDATE GEM UI
// =====================
function updateGemUI() {
  document.getElementById('gem-val').textContent = gems;
  PLANTS.forEach(p => {
    const card = document.getElementById('card-' + p.id);
    if (!card) return;
    if ((cooldownTimers[p.id] || 0) <= 0) {
      if (gems >= p.cost) card.classList.add('can-afford');
      else card.classList.remove('can-afford');
    }
  });
}

function getCellEl(r, c) {
  return document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
}

// =====================
//  MAIN GAME LOOP
// =====================
function gameLoop(ts) {
  if (!gameRunning) return;
  const dt = Math.min(ts - lastTime, 100);
  lastTime = ts;

  updateCooldowns(dt);
  updateGemTimers(dt);
  updateShootTimers(dt);
  updateZombies(dt);
  updateProjectiles(dt);
  updateGemDrops(dt);
  updateLawnmowers(dt);
  updateSpawn(dt);
  updateWaveProgress(dt);
  checkVictory();
  checkDefeat();

  requestAnimationFrame(gameLoop);
}

// =====================
//  UPDATE COOLDOWNS
// =====================
function updateCooldowns(dt) {
  PLANTS.forEach(p => {
    if ((cooldownTimers[p.id] || 0) > 0) {
      cooldownTimers[p.id] -= dt;
      if (cooldownTimers[p.id] < 0) cooldownTimers[p.id] = 0;
      updateCooldownUI(p.id);
    }
  });
}

// =====================
//  GEM GEN (sunflower)
// =====================
function updateGemTimers(dt) {
  // Sky diamond drops
  globalGemTimer -= dt;
  if (globalGemTimer <= 0) {
    globalGemTimer = 9000 + Math.random() * 8000;
    const area = document.getElementById('grid-area');
    const x = 20 + Math.random() * (area.clientWidth - 60);
    const y = 20 + Math.random() * (area.clientHeight - 60);
    spawnGemDrop(x, y, 25);
  }

  // Sunflower production
  Object.keys(gemGenTimers).forEach(key => {
    gemGenTimers[key] -= dt;
    if (gemGenTimers[key] <= 0) {
      gemGenTimers[key] = 7000 + Math.random() * 2000;
      const plant = plants[key];
      if (plant && plant.gemGen > 0) {
        const cw = cellW(), ch = cellH();
        spawnGemDrop(
          plant.col * cw + cw/2 - 13,
          plant.row * ch + ch/2 - 13,
          plant.gemGen
        );
      }
    }
  });
}

// =====================
//  SHOOT TIMERS
// =====================
function updateShootTimers(dt) {
  Object.keys(shootTimers).forEach(key => {
    shootTimers[key] -= dt;
    if (shootTimers[key] <= 0) {
      const plant = plants[key];
      if (!plant) { delete shootTimers[key]; return; }
      const hasTarget = zombies.some(z => !z.dead && z.row === plant.row);
      if (hasTarget) {
        shoot(plant.row, plant.col, plant.id === 'peashooter' ? 22 : 12,
              plant.projEmoji || '🟢', plant.slow || false);
        shootTimers[key] = plant.shootInterval;
      } else {
        shootTimers[key] = 400;
      }
    }
  });
}

// =====================
//  ZOMBIES UPDATE
// =====================
function updateZombies(dt) {
  const cw = cellW();
  const toRemove = [];

  zombies.forEach((z, i) => {
    if (z.dead) { toRemove.push(i); return; }

    // Slow timer recovery
    if (z.slowTimer > 0) {
      z.slowTimer -= dt;
      if (z.slowTimer <= 0) {
        z.speed = z.originalSpeed;
        z.slowTimer = 0;
      }
    }

    z.eating = false;
    let blocked = false;

    const zCol = Math.floor(z.x / cw);
    const plantKey  = `${z.row}-${zCol}`;
    const plantKey2 = `${z.row}-${zCol - 1}`;
    const target = plants[plantKey] || plants[plantKey2];

    if (target && target.hp > 0) {
      z.eating = true;
      blocked = true;
      z.eatTimer = (z.eatTimer || 0) + dt;
      if (z.eatTimer >= 500) {
        z.eatTimer = 0;
        target.hp -= z.damage;
        updateHpBar(target);
        if (target.hp <= 0) killPlant(target);
      }
    }

    if (!blocked) {
      z.x -= z.speed * dt / 16;
      z.el.style.left = z.x + 'px';
    }

    if (z.x < cw * 0.5) activateLawnmower(z.row, z);
    updateHpBar(z);
  });

  toRemove.reverse().forEach(i => {
    zombies[i].el.remove();
    zombies.splice(i, 1);
  });
}

function activateLawnmower(row, triggerZombie) {
  const mower = lawnmowers.find(m => m.row === row && !m.active);
  if (!mower) return;
  mower.active = true;
  triggerZombie.dead = true;
  spawnExplosion(triggerZombie.x, parseInt(triggerZombie.el.style.top) + 20, '💨', 40);
}

function updateLawnmowers(dt) {
  const area = document.getElementById('grid-area');
  lawnmowers.forEach(m => {
    if (!m.active) return;
    m.x += m.speed * dt / 16;
    m.el.style.left = m.x + 'px';
    m.el.style.top  = (m.row * cellH() + cellH()/2 - 13) + 'px';

    zombies.forEach(z => {
      if (!z.dead && z.row === m.row && z.x < m.x + 32 && z.x > m.x - 12) {
        z.dead = true;
        score += 25;
        spawnExplosion(z.x, parseInt(z.el.style.top) + 20, '💥', 36);
        updateScoreUI();
      }
    });

    if (m.x > area.clientWidth + 60) {
      m.el.remove();
      m.done = true;
    }
  });
}

// =====================
//  PROJECTILES
// =====================
function updateProjectiles(dt) {
  const area = document.getElementById('grid-area');
  const toRemove = [];

  projectiles.forEach((p, i) => {
    if (p.dead) { toRemove.push(i); return; }
    p.x += p.speed * dt / 16;
    p.el.style.left = p.x + 'px';

    if (p.x > area.clientWidth) { p.dead = true; toRemove.push(i); return; }

    for (const z of zombies) {
      if (!z.dead && z.row === p.row && Math.abs(z.x - p.x) < 22) {
        z.hp -= p.damage;
        // Snowball slow
        if (p.slow) {
          z.speed = z.originalSpeed * 0.4;
          z.slowTimer = 2500;
        }
        p.dead = true;
        p.el.remove();
        updateHpBar(z);
        if (z.hp <= 0) {
          killZombie(z);
          score += 10;
          updateScoreUI();
        }
        break;
      }
    }
    if (p.dead) toRemove.push(i);
  });

  toRemove.reverse().forEach(i => {
    if (projectiles[i]) {
      projectiles[i].el?.remove();
      projectiles.splice(i, 1);
    }
  });
}

function killZombie(z) {
  z.dead = true;
  // Drop a gem sometimes
  if (Math.random() < 0.35) {
    spawnGemDrop(z.x, parseInt(z.el.style.top) + 10, 15);
  }
  spawnExplosion(z.x, parseInt(z.el.style.top), '💀', 34);
}

function killPlant(plant) {
  const key = `${plant.row}-${plant.col}`;
  delete plants[key];
  delete shootTimers[key];
  delete gemGenTimers[key];
  plant.el.remove();
  const cellEl = getCellEl(plant.row, plant.col);
  if (cellEl) {
    cellEl.classList.remove('has-plant');
    cellEl.style.background = ROW_COLORS[plant.row];
  }
  spawnExplosion(
    plant.col * cellW() + cellW()/2,
    plant.row * cellH() + cellH()/2,
    '🪨', 30
  );
}

// =====================
//  GEM DROPS
// =====================
function updateGemDrops(dt) {
  const toRemove = [];
  gemDrops.forEach((d, i) => {
    if (d.dead) { toRemove.push(i); return; }
    d.lifetime -= dt;
    if (d.lifetime <= 0) {
      d.dead = true;
      d.el.remove();
      toRemove.push(i);
    }
  });
  toRemove.reverse().forEach(i => gemDrops.splice(i, 1));
}

// =====================
//  HP BARS
// =====================
function updateHpBar(entity) {
  if (!entity.hpFill) return;
  const pct = Math.max(0, entity.hp / entity.maxHp) * 100;
  entity.hpFill.style.width = pct + '%';
  entity.hpFill.style.background = pct > 60 ? '#44ff44' : pct > 30 ? '#ffaa00' : '#ff3333';
}

// =====================
//  WAVE SPAWN
// =====================
function updateSpawn(dt) {
  if (zombiesSpawned >= zombiesThisWave.length) return;
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnZombie(zombiesThisWave[zombiesSpawned]);
    zombiesSpawned++;
    spawnTimer = spawnInterval;
  }
}

// =====================
//  WAVE PROGRESS
// =====================
function updateWaveProgress(dt) {
  if (pendingNextWave) {
    nextWaveTimer -= dt;
    if (nextWaveTimer <= 0) {
      pendingNextWave = false;
      wave++;
      if (wave > maxWaves) return;
      document.getElementById('wave-num').textContent = wave;
      startWave(wave);
    }
    return;
  }

  if (zombiesSpawned >= zombiesThisWave.length && zombies.length === 0 && !waveComplete) {
    waveComplete = true;
    if (wave < maxWaves) {
      pendingNextWave = true;
      nextWaveTimer = 3500;
      // Bonus gems between waves
      gems += 50;
      updateGemUI();
      showWaveAlert(`第 ${wave + 1} 关开始！+50💎`);
    }
  }
}

function startWave(w) {
  waveComplete = false;
  zombiesThisWave = buildWave(w);
  zombiesSpawned = 0;
  spawnInterval = Math.max(1400, 3200 - w * 350);
  spawnTimer = 800;
}

function showWaveAlert(msg) {
  const el = document.getElementById('wave-alert');
  el.textContent = '⚡ ' + msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// =====================
//  VICTORY / DEFEAT
// =====================
function checkVictory() {
  if (!gameRunning) return;
  if (wave > maxWaves && zombies.length === 0 && zombiesSpawned >= zombiesThisWave.length) {
    endGame(true);
  }
  if (wave === maxWaves && waveComplete && zombies.length === 0) {
    endGame(true);
  }
}

function checkDefeat() {
  if (!gameRunning) return;
  const reached = zombies.some(z => !z.dead && z.x < -10);
  if (reached) endGame(false);
}

function endGame(won) {
  gameRunning = false;
  const overlay = document.getElementById('overlay');
  overlay.classList.remove('hidden');
  if (won) {
    document.getElementById('overlay-emoji').textContent = '🏆';
    document.getElementById('overlay-title').textContent = 'YOU WIN!';
    document.getElementById('overlay-sub').textContent = `王国保住了！\n胖团真厉害！\n得了 ${score} 分！`;
  } else {
    document.getElementById('overlay-emoji').textContent = '💀';
    document.getElementById('overlay-title').textContent = 'GAME OVER';
    document.getElementById('overlay-sub').textContent = `怪物进来了…\n没关系，重新来过！\n得了 ${score} 分`;
  }
}

function updateScoreUI() {
  document.getElementById('score-val').textContent = score;
}

// =====================
//  START GAME
// =====================
function startGame() {
  gems = 200; score = 0; wave = 1;
  selectedPlant = null;
  plants = {}; zombies = []; projectiles = []; gemDrops = [];
  cooldownTimers = {}; shootTimers = {}; gemGenTimers = {};
  waveComplete = false; pendingNextWave = false;
  globalGemTimer = 6000;
  gameRunning = false;

  const area = document.getElementById('grid-area');
  area.querySelectorAll('.plant-sprite,.zombie-sprite,.projectile,.gem-drop,.explosion,.score-popup,.lawnmower').forEach(e => e.remove());
  document.getElementById('overlay').classList.add('hidden');

  document.getElementById('gem-val').textContent = gems;
  document.getElementById('score-val').textContent = score;
  document.getElementById('wave-num').textContent = wave;

  initGrid();
  initPlantPicker();
  initLawnmowers();
  updateGemUI();

  startWave(1);
  gameRunning = true;
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

// =====================
//  BOOT — TITLE SCREEN
// =====================
window.addEventListener('load', () => {
  const overlay = document.getElementById('overlay');
  overlay.classList.remove('hidden');
  document.getElementById('overlay-emoji').textContent = '⛏️';
  document.getElementById('overlay-title').textContent = '方块王国\n保卫战';
  document.getElementById('overlay-sub').textContent =
    '点卡牌选角色\n再点草地放置\n收集💎建防线！\n\n🌻阳光花 🏹弓箭手\n🧱石头墙 🧨TNT ⛄雪人';
  const btn = overlay.querySelector('.big-btn');
  btn.textContent = '▶ 开始冒险';
});
</script>
