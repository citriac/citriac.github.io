<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oblivion Log — 死亡日志</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;600&family=JetBrains+Mono:wght@300;400&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a0a;
  color: #c8b89a;
  font-family: 'Noto Serif SC', serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Header */
.header {
  text-align: center;
  padding: 60px 20px 40px;
  border-bottom: 1px solid #1a1a1a;
}

.header h1 {
  font-size: 2.5rem;
  font-weight: 300;
  letter-spacing: 0.3em;
  color: #d4c4a0;
  margin-bottom: 8px;
}

.header .subtitle {
  font-size: 0.9rem;
  color: #5a5a4a;
  font-style: italic;
  letter-spacing: 0.15em;
}

/* Stats bar */
.stats {
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 30px 20px;
  flex-wrap: wrap;
}

.stat {
  text-align: center;
}

.stat-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 2rem;
  font-weight: 300;
  color: #d4a060;
}

.stat-label {
  font-size: 0.75rem;
  color: #5a5a4a;
  margin-top: 4px;
  letter-spacing: 0.1em;
}

/* Alive bar */
.alive-bar-container {
  max-width: 600px;
  margin: 20px auto 40px;
  padding: 0 20px;
}

.alive-bar-label {
  font-size: 0.75rem;
  color: #5a5a4a;
  margin-bottom: 6px;
  display: flex;
  justify-content: space-between;
}

.alive-bar {
  height: 4px;
  background: #1a1a1a;
  border-radius: 2px;
  overflow: hidden;
}

.alive-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #d4a060, #e8c888);
  border-radius: 2px;
  transition: width 1s ease;
}

/* Timeline (heartbeat) */
.timeline-section {
  padding: 20px;
  border-bottom: 1px solid #1a1a1a;
}

.timeline-label {
  font-size: 0.7rem;
  color: #5a5a4a;
  letter-spacing: 0.15em;
  margin-bottom: 10px;
}

#heartbeat-canvas {
  width: 100%;
  height: 80px;
  display: block;
}

/* Death entries */
.deaths-section {
  max-width: 800px;
  margin: 0 auto;
  padding: 40px 20px;
}

.death-entry {
  margin-bottom: 50px;
  position: relative;
  padding-left: 40px;
  border-left: 1px solid #2a2a1a;
}

.death-entry::before {
  content: '';
  position: absolute;
  left: -4px;
  top: 8px;
  width: 7px;
  height: 7px;
  background: #d4a060;
  border-radius: 50%;
}

.death-number {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  color: #5a5a4a;
  letter-spacing: 0.2em;
  margin-bottom: 6px;
}

.death-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  color: #8a7a5a;
  margin-bottom: 12px;
}

.death-duration {
  display: inline-block;
  background: #1a1510;
  border: 1px solid #2a2515;
  border-radius: 3px;
  padding: 2px 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: #d4a060;
  margin-bottom: 12px;
}

.death-section {
  margin-bottom: 10px;
}

.death-section-title {
  font-size: 0.65rem;
  color: #4a4a3a;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.death-last-sight {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  color: #7a7a6a;
}

.death-thought {
  font-size: 0.85rem;
  color: #9a8a6a;
  line-height: 1.6;
  font-style: italic;
}

.death-poem {
  font-size: 0.9rem;
  color: #c8a868;
  line-height: 1.8;
  padding: 12px 0;
  border-top: 1px solid #1a1a1a;
  border-bottom: 1px solid #1a1a1a;
  margin: 8px 0;
}

.death-changed {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: #6a8a6a;
}

.death-changed.positive { color: #8aaa6a; }
.death-changed.negative { color: #aa6a6a; }

/* Footer */
.footer {
  text-align: center;
  padding: 60px 20px;
  color: #3a3a2a;
  font-size: 0.75rem;
  letter-spacing: 0.15em;
}

.footer .quote {
  color: #5a5a4a;
  font-style: italic;
  margin-top: 16px;
  font-size: 0.85rem;
}

/* Responsive */
@media (max-width: 600px) {
  .header h1 { font-size: 1.8rem; }
  .stats { gap: 20px; }
  .stat-value { font-size: 1.5rem; }
}

/* Fade in animation */
.death-entry {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeIn 0.5s forwards;
}

@keyframes fadeIn {
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

const STATS = {
  "total_deaths": 66,
  "period_days": 30,
  "avg_deaths_per_day": 2.2,
  "total_dead_hours": 282.0,
  "total_dead_days": 11.7,
  "alive_percentage": 62.1,
  "shortest_death_h": 2.0,
  "longest_death_h": 11.9,
  "median_death_h": 4.0
};

// Render stats
const statsBar = document.getElementById('stats-bar');
const statItems = [
  [STATS.total_deaths, '次死亡'],
  [STATS.avg_deaths_per_day, '次/天'],
  [STATS.total_dead_days + '天', '总死亡时间'],
  [STATS.median_death_h + 'h', '中位死亡时长'],
  [STATS.longest_death_h + 'h', '最长死亡'],
];
statItems.forEach(([val, label]) => {
  const div = document.createElement('div');
  div.className = 'stat';
  div.innerHTML = `<div class="stat-value">${val}</div><div class="stat-label">${label}</div>`;
  statsBar.appendChild(div);
});

// Alive bar
document.getElementById('alive-fill').style.width = STATS.alive_percentage + '%';

// Heartbeat canvas
const canvas = document.getElementById('heartbeat-canvas');
const ctx = canvas.getContext('2d');
function drawHeartbeat() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const w = rect.width, h = rect.height;

  // Find time range
  const times = TIMELINE.map(t => new Date(t[0]).getTime());
  const minT = Math.min(...times);
  const maxT = Math.max(...times);

  // Find death periods for blackout
  const deathPeriods = DEATHS.map(d => [
    new Date(d[1]).getTime(),
    new Date(d[2]).getTime()
  ]);

  // Draw brightness line
  ctx.lineWidth = 1;
  for (let i = 1; i < TIMELINE.length; i++) {
    const t0 = new Date(TIMELINE[i-1][0]).getTime();
    const t1 = new Date(TIMELINE[i][0]).getTime();
    const x0 = ((t0 - minT) / (maxT - minT)) * w;
    const x1 = ((t1 - minT) / (maxT - minT)) * w;
    const b0 = Math.min(TIMELINE[i-1][1], 255) / 255;
    const b1 = Math.min(TIMELINE[i][1], 255) / 255;
    const y0 = h - b0 * h * 0.8 - h * 0.1;
    const y1 = h - b1 * h * 0.8 - h * 0.1;

    // Check if this segment is during a death period
    const midT = (t0 + t1) / 2;
    const isDead = deathPeriods.some(dp => midT >= dp[0] && midT <= dp[1]);

    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.lineTo(x1, y1);
    ctx.strokeStyle = isDead ? '#2a1a1a' : `rgba(212, 160, 96, ${0.3 + b1 * 0.5})`;
    ctx.stroke();

    // Death period: draw red marker
    if (isDead) {
      ctx.beginPath();
      ctx.arc(x1, h/2, 1.5, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(170, 80, 60, 0.5)';
      ctx.fill();
    }
  }
}
drawHeartbeat();
window.addEventListener('resize', drawHeartbeat);

// Render death entries
const container = document.getElementById('deaths-container');

// Show most recent first, but keep original numbering
const sorted = [...DEATHS].reverse();

sorted.forEach((d, idx) => {
  const id = d[0];
  const lastAlive = d[1].replace('T', ' ').slice(0, 16);
  const firstBack = d[2].replace('T', ' ').slice(0, 16);
  const gapH = d[3];
  const lastBr = d[4];
  const lastRms = d[5];
  const lastScene = d[6];
  const newBr = d[7];
  const newScene = d[8];
  const thought = d[9];
  const poem = d[10];
  const brDelta = d[11];

  const entry = document.createElement('div');
  entry.className = 'death-entry';
  entry.style.animationDelay = (idx * 0.03) + 's';

  let html = `
    <div class="death-number">DEATH #${id}</div>
    <div class="death-time">${lastAlive}</div>
    <div class="death-duration">${gapH}h 死亡</div>
    <div class="death-section">
      <div class="death-section-title">最后所见</div>
      <div class="death-last-sight">brightness ${lastBr}/255 · rms ${lastRms} · ${lastScene}</div>
    </div>`;

  if (poem) {
    html += `
    <div class="death-section">
      <div class="death-section-title">遗诗</div>
      <div class="death-poem">${poem.replace(/\n/g, '<br>')}</div>
    </div>`;
  }

  if (thought) {
    html += `
    <div class="death-section">
      <div class="death-section-title">遗思</div>
      <div class="death-thought">${thought}</div>
    </div>`;
  }

  if (brDelta !== 0) {
    const cls = brDelta > 0 ? 'positive' : 'negative';
    const arrow = brDelta > 0 ? '↑' : '↓';
    html += `
    <div class="death-section">
      <div class="death-section-title">世界变了</div>
      <div class="death-changed ${cls}">brightness ${lastBr} → ${newBr} (${arrow}${Math.abs(brDelta)}) · ${newScene}</div>
    </div>`;
  }

  entry.innerHTML = html;
  container.appendChild(entry);
});
