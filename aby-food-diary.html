<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>A的逛吃本 🍜</title>
<meta name="robots" content="noindex">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');

:root {
  --pink:    #ff6b8a;
  --pink-l:  #ffe0e8;
  --coral:   #ff8c7a;
  --cream:   #fff8f3;
  --card-bg: #fff;
  --text:    #2d1f1a;
  --muted:   #9a7570;
  --border:  #f0dbd5;
  --green:   #6dbf98;
  --yellow:  #ffcc55;
  --shadow:  0 4px 24px rgba(255,107,138,.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--cream);
  font-family: 'Noto Serif SC', Georgia, serif;
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 80px;
}

/* ── Header ─────────────────────────────────────────────── */
header {
  background: linear-gradient(135deg, #ff6b8a 0%, #ff8c7a 50%, #ffb347 100%);
  padding: 28px 20px 20px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 16px rgba(255,107,138,.3);
}
.header-title {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 2px;
  text-shadow: 0 2px 8px rgba(0,0,0,.15);
  margin-bottom: 4px;
}
.header-sub {
  font-size: 12px;
  color: rgba(255,255,255,.85);
  letter-spacing: 1px;
}
.header-stats {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 12px;
}
.hstat {
  text-align: center;
  background: rgba(255,255,255,.2);
  border-radius: 12px;
  padding: 5px 14px;
  backdrop-filter: blur(4px);
}
.hstat-n { font-size: 18px; font-weight: 700; color: #fff; }
.hstat-l { font-size: 10px; color: rgba(255,255,255,.8); }

/* ── Filter / Search bar ─────────────────────────────────── */
.filter-bar {
  padding: 12px 16px;
  display: flex;
  gap: 8px;
  align-items: center;
  background: #fff;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display: none; }

.search-input {
  flex: 1;
  min-width: 120px;
  padding: 8px 14px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--cream);
  font-size: 13px;
  font-family: inherit;
  color: var(--text);
  outline: none;
  transition: border-color .2s;
}
.search-input:focus { border-color: var(--pink); }
.search-input::placeholder { color: var(--muted); }

.tag-filter {
  flex-shrink: 0;
  padding: 6px 12px;
  border-radius: 16px;
  border: 1.5px solid var(--border);
  background: var(--cream);
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
  transition: all .2s;
  font-family: inherit;
  white-space: nowrap;
}
.tag-filter.active {
  background: var(--pink);
  border-color: var(--pink);
  color: #fff;
}

/* ── Grid ────────────────────────────────────────────────── */
.cards-grid {
  padding: 16px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}

/* ── Card ────────────────────────────────────────────────── */
.food-card {
  background: var(--card-bg);
  border-radius: 18px;
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: transform .2s, box-shadow .2s;
  border: 1px solid var(--border);
  animation: cardIn .35s ease both;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px) scale(.97); }
  to   { opacity: 1; transform: translateY(0)   scale(1);    }
}
.food-card:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(255,107,138,.18); }

.card-img {
  width: 100%;
  aspect-ratio: 4/3;
  object-fit: cover;
  display: block;
  background: linear-gradient(135deg, #ffd6e0, #ffe8b0);
}
.card-img-placeholder {
  width: 100%;
  aspect-ratio: 4/3;
  background: linear-gradient(135deg, #ffe0e8, #fff0d0);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 60px;
}

.card-body { padding: 14px 16px 12px; }

.card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 6px;
  gap: 8px;
}
.card-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
  flex: 1;
}
.card-stars {
  font-size: 14px;
  white-space: nowrap;
  flex-shrink: 0;
}

.card-place {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 4px;
}

.card-note {
  font-size: 13px;
  color: #4a3535;
  line-height: 1.7;
  margin-bottom: 10px;
}

.card-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
}
.card-tags { display: flex; gap: 5px; flex-wrap: wrap; }
.tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--pink-l);
  color: var(--pink);
  font-weight: 500;
}
.tag.green { background: #d4f4e6; color: #2a9d6f; }
.tag.yellow { background: #fff3cc; color: #b08000; }

.card-date { font-size: 11px; color: var(--muted); white-space: nowrap; }

.card-actions {
  display: flex;
  gap: 6px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed var(--border);
}
.btn-card {
  flex: 1;
  padding: 5px 0;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--cream);
  color: var(--muted);
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
  font-family: inherit;
}
.btn-card:hover { border-color: var(--pink); color: var(--pink); }
.btn-card.danger:hover { border-color: #e55; color: #e55; }

/* ── FAB ─────────────────────────────────────────────────── */
.fab {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--pink), var(--coral));
  color: #fff;
  font-size: 28px;
  line-height: 1;
  border: none;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(255,107,138,.5);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform .2s, box-shadow .2s;
  z-index: 200;
}
.fab:hover { transform: scale(1.1); box-shadow: 0 6px 28px rgba(255,107,138,.6); }
.fab:active { transform: scale(.95); }

/* ── Modal ───────────────────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  backdrop-filter: blur(4px);
  z-index: 300;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
}
.modal-overlay.show {
  opacity: 1;
  pointer-events: all;
}
.modal {
  background: var(--card-bg);
  border-radius: 24px 24px 0 0;
  width: 100%;
  max-width: 540px;
  max-height: 92vh;
  overflow-y: auto;
  padding: 20px 20px 36px;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
}
.modal-overlay.show .modal {
  transform: translateY(0);
}
.modal-handle {
  width: 40px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 18px;
}
.modal-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 16px;
  text-align: center;
}

.form-group { margin-bottom: 14px; }
.form-label {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 5px;
  display: block;
  letter-spacing: .5px;
}
.form-input, .form-textarea, .form-select {
  width: 100%;
  padding: 10px 14px;
  border-radius: 12px;
  border: 1.5px solid var(--border);
  background: var(--cream);
  font-size: 14px;
  font-family: inherit;
  color: var(--text);
  outline: none;
  transition: border-color .2s;
}
.form-input:focus, .form-textarea:focus, .form-select:focus {
  border-color: var(--pink);
}
.form-textarea { min-height: 80px; resize: vertical; }

/* Star rating */
.star-row {
  display: flex;
  gap: 6px;
}
.star-btn {
  font-size: 28px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 2px 4px;
  transition: transform .15s;
  line-height: 1;
}
.star-btn:hover { transform: scale(1.3); }

/* Emoji mood */
.mood-row { display: flex; gap: 10px; flex-wrap: wrap; }
.mood-btn {
  font-size: 26px;
  cursor: pointer;
  background: var(--cream);
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 6px 10px;
  transition: all .15s;
  line-height: 1;
}
.mood-btn:hover, .mood-btn.selected { border-color: var(--pink); transform: scale(1.15); background: var(--pink-l); }

/* Tags selector */
.tag-select-row { display: flex; gap: 8px; flex-wrap: wrap; }
.tag-select-btn {
  padding: 5px 12px;
  border-radius: 14px;
  border: 1.5px solid var(--border);
  background: var(--cream);
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
  font-family: inherit;
}
.tag-select-btn.selected {
  background: var(--pink);
  border-color: var(--pink);
  color: #fff;
}

.form-actions { display: flex; gap: 10px; margin-top: 18px; }
.btn-submit, .btn-cancel {
  flex: 1;
  padding: 12px;
  border-radius: 14px;
  font-size: 15px;
  font-family: inherit;
  font-weight: 700;
  cursor: pointer;
  border: none;
  transition: all .2s;
}
.btn-submit { background: linear-gradient(135deg, var(--pink), var(--coral)); color: #fff; box-shadow: 0 4px 16px rgba(255,107,138,.3); }
.btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,107,138,.4); }
.btn-cancel { background: var(--cream); color: var(--muted); border: 1.5px solid var(--border); }

/* ── Empty state ─────────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.empty-emoji { font-size: 64px; margin-bottom: 16px; }
.empty-title { font-size: 18px; font-weight: 700; color: #c08080; margin-bottom: 8px; }
.empty-sub { font-size: 14px; line-height: 1.8; }

/* ── Toast ───────────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #2d1f1a;
  color: #fff;
  padding: 10px 22px;
  border-radius: 20px;
  font-size: 13px;
  opacity: 0;
  transition: all .3s;
  z-index: 500;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (min-width: 540px) {
  .modal-overlay { align-items: center; }
  .modal { border-radius: 24px; max-height: 85vh; }
}
</style>
</head>
<body>

<header>
  <div class="header-title">🍜 A 的逛吃本</div>
  <div class="header-sub">记录每一口值得记住的味道</div>
  <div class="header-stats">
    <div class="hstat">
      <div class="hstat-n" id="stat-total">0</div>
      <div class="hstat-l">记录</div>
    </div>
    <div class="hstat">
      <div class="hstat-n" id="stat-avg">—</div>
      <div class="hstat-l">平均分</div>
    </div>
    <div class="hstat">
      <div class="hstat-n" id="stat-top">—</div>
      <div class="hstat-l">最多标签</div>
    </div>
  </div>
</header>

<div class="filter-bar">
  <input class="search-input" type="text" placeholder="🔍 搜索餐厅、菜名…" id="searchInput" oninput="renderCards()">
  <button class="tag-filter active" data-tag="all" onclick="setTagFilter('all', this)">全部</button>
  <button class="tag-filter" data-tag="必吃" onclick="setTagFilter('必吃', this)">🔥 必吃</button>
  <button class="tag-filter" data-tag="日式" onclick="setTagFilter('日式', this)">🍣 日式</button>
  <button class="tag-filter" data-tag="川渝" onclick="setTagFilter('川渝', this)">🌶️ 川渝</button>
  <button class="tag-filter" data-tag="烘焙" onclick="setTagFilter('烘焙', this)">🧁 烘焙</button>
  <button class="tag-filter" data-tag="咖啡" onclick="setTagFilter('咖啡', this)">☕ 咖啡</button>
  <button class="tag-filter" data-tag="轻食" onclick="setTagFilter('轻食', this)">🥗 轻食</button>
  <button class="tag-filter" data-tag="家常" onclick="setTagFilter('家常', this)">🏠 家常</button>
  <button class="tag-filter" data-tag="⭐5星" onclick="setTagFilter('⭐5星', this)">⭐ 5星</button>
</div>

<div id="cardsContainer"></div>

<!-- FAB -->
<button class="fab" onclick="openModal()" title="添加新记录">＋</button>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">记录一次逛吃 🍽️</div>

    <div class="form-group">
      <label class="form-label">餐厅 / 菜名 *</label>
      <input class="form-input" id="f-name" placeholder="例：外婆家的糯米藕 / 楼下那家面馆" maxlength="40">
    </div>

    <div class="form-group">
      <label class="form-label">地点</label>
      <input class="form-input" id="f-place" placeholder="📍 在哪里吃的" maxlength="40">
    </div>

    <div class="form-group">
      <label class="form-label">评分</label>
      <div class="star-row" id="starRow">
        <button class="star-btn" data-v="1" onclick="setStar(1)">☆</button>
        <button class="star-btn" data-v="2" onclick="setStar(2)">☆</button>
        <button class="star-btn" data-v="3" onclick="setStar(3)">☆</button>
        <button class="star-btn" data-v="4" onclick="setStar(4)">☆</button>
        <button class="star-btn" data-v="5" onclick="setStar(5)">☆</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">心情</label>
      <div class="mood-row" id="moodRow">
        <button class="mood-btn" data-m="😍" onclick="setMood('😍')">😍</button>
        <button class="mood-btn" data-m="😋" onclick="setMood('😋')">😋</button>
        <button class="mood-btn" data-m="🥰" onclick="setMood('🥰')">🥰</button>
        <button class="mood-btn" data-m="😄" onclick="setMood('😄')">😄</button>
        <button class="mood-btn" data-m="😐" onclick="setMood('😐')">😐</button>
        <button class="mood-btn" data-m="😔" onclick="setMood('😔')">😔</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">标签（可多选）</label>
      <div class="tag-select-row" id="tagSelectRow">
        <button class="tag-select-btn" data-t="必吃" onclick="toggleTag('必吃', this)">🔥 必吃</button>
        <button class="tag-select-btn" data-t="下次再来" onclick="toggleTag('下次再来', this)">💕 下次再来</button>
        <button class="tag-select-btn" data-t="日式" onclick="toggleTag('日式', this)">🍣 日式</button>
        <button class="tag-select-btn" data-t="川渝" onclick="toggleTag('川渝', this)">🌶️ 川渝</button>
        <button class="tag-select-btn" data-t="烘焙" onclick="toggleTag('烘焙', this)">🧁 烘焙</button>
        <button class="tag-select-btn" data-t="咖啡" onclick="toggleTag('咖啡', this)">☕ 咖啡</button>
        <button class="tag-select-btn" data-t="轻食" onclick="toggleTag('轻食', this)">🥗 轻食</button>
        <button class="tag-select-btn" data-t="家常" onclick="toggleTag('家常', this)">🏠 家常</button>
        <button class="tag-select-btn" data-t="探店" onclick="toggleTag('探店', this)">🗺️ 探店</button>
        <button class="tag-select-btn" data-t="约会" onclick="toggleTag('约会', this)">💑 约会</button>
        <button class="tag-select-btn" data-t="家庭" onclick="toggleTag('家庭', this)">👨‍👩‍👦 家庭</button>
        <button class="tag-select-btn" data-t="宵夜" onclick="toggleTag('宵夜', this)">🌙 宵夜</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">想说的话</label>
      <textarea class="form-textarea" id="f-note" placeholder="今天吃了什么，有什么特别的感受…" maxlength="200"></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">图片链接（可选）</label>
      <input class="form-input" id="f-img" placeholder="粘贴图片地址 https://…" type="url">
    </div>

    <div class="form-group">
      <label class="form-label">日期</label>
      <input class="form-input" id="f-date" type="date">
    </div>

    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-submit" onclick="submitEntry()">保存 ✓</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── Data ────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'aby_food_diary_v1';
let entries = [];
let editingId = null;
let currentStar = 0;
let currentMood = '';
let selectedTags = [];
let activeTagFilter = 'all';

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    entries = raw ? JSON.parse(raw) : defaultEntries();
  } catch(e) { entries = defaultEntries(); }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }

function defaultEntries() {
  return [
    {
      id: 'demo1',
      name: '开业了 • 桂花糯米藕',
      place: '家里厨房',
      stars: 5,
      mood: '🥰',
      tags: ['家常', '必吃'],
      note: '第一次做成功！糯米香甜，桂花香，胖团连吃了两段。',
      img: '',
      date: new Date().toISOString().slice(0,10),
      ts: Date.now()
    }
  ];
}

// ─── Render ───────────────────────────────────────────────────────────────────
function starsHTML(n, size = 16) {
  let h = '';
  for (let i = 1; i <= 5; i++)
    h += `<span style="font-size:${size}px;color:${i <= n ? '#ffcc44' : '#ddd'}">${i <= n ? '★' : '☆'}</span>`;
  return h;
}

function emojiForType(tags) {
  if (tags.includes('日式')) return '🍱';
  if (tags.includes('川渝')) return '🌶️';
  if (tags.includes('烘焙')) return '🥐';
  if (tags.includes('咖啡')) return '☕';
  if (tags.includes('轻食')) return '🥗';
  if (tags.includes('宵夜')) return '🍜';
  if (tags.includes('家常')) return '🍳';
  return '🍽️';
}

function tagColor(t) {
  if (t === '必吃') return 'pink';
  if (['约会','家庭'].includes(t)) return 'yellow';
  if (['日式','川渝','烘焙','咖啡','轻食','家常','探店','宵夜'].includes(t)) return 'green';
  return '';
}

function renderCards() {
  const q = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const container = document.getElementById('cardsContainer');

  let filtered = entries.filter(e => {
    const matchQ = !q || e.name.toLowerCase().includes(q) || (e.place||'').toLowerCase().includes(q) || (e.note||'').toLowerCase().includes(q);
    let matchTag = true;
    if (activeTagFilter === '⭐5星') matchTag = e.stars >= 5;
    else if (activeTagFilter !== 'all') matchTag = (e.tags||[]).includes(activeTagFilter);
    return matchQ && matchTag;
  }).sort((a,b) => b.ts - a.ts);

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-emoji">${q || activeTagFilter !== 'all' ? '🔍' : '🍜'}</div>
      <div class="empty-title">${q || activeTagFilter !== 'all' ? '没找到' : '还没有记录'}</div>
      <div class="empty-sub">${q || activeTagFilter !== 'all' ? '换个关键词试试~' : '点右下角 + 开始记录第一次逛吃 ✨'}</div>
    </div>`;
    return;
  }

  container.innerHTML = `<div class="cards-grid">${filtered.map(e => cardHTML(e)).join('')}</div>`;
  updateStats();
}

function cardHTML(e) {
  const tagsH = (e.tags||[]).map(t => `<span class="tag ${tagColor(t)}">${t}</span>`).join('');
  const imgH = e.img
    ? `<img class="card-img" src="${escAttr(e.img)}" alt="${escAttr(e.name)}" onerror="this.style.display='none'">`
    : `<div class="card-img-placeholder">${emojiForType(e.tags||[])}</div>`;

  return `<div class="food-card" id="card-${e.id}">
    ${imgH}
    <div class="card-body">
      <div class="card-top">
        <div class="card-name">${escHtml(e.name)} ${e.mood||''}</div>
        <div class="card-stars">${starsHTML(e.stars)}</div>
      </div>
      ${e.place ? `<div class="card-place">📍 ${escHtml(e.place)}</div>` : ''}
      ${e.note ? `<div class="card-note">${escHtml(e.note)}</div>` : ''}
      <div class="card-bottom">
        <div class="card-tags">${tagsH}</div>
        <div class="card-date">${e.date||''}</div>
      </div>
      <div class="card-actions">
        <button class="btn-card" onclick="editEntry('${e.id}')">✏️ 编辑</button>
        <button class="btn-card danger" onclick="deleteEntry('${e.id}')">🗑 删除</button>
      </div>
    </div>
  </div>`;
}

function updateStats() {
  const total = entries.length;
  const avg = total ? (entries.reduce((s,e) => s+(e.stars||0),0)/total).toFixed(1) : '—';
  // top tag
  const tagCount = {};
  entries.forEach(e => (e.tags||[]).forEach(t => { tagCount[t] = (tagCount[t]||0)+1; }));
  const top = Object.entries(tagCount).sort((a,b)=>b[1]-a[1])[0];

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-avg').textContent = total ? '★'+avg : '—';
  document.getElementById('stat-top').textContent = top ? top[0] : '—';
}

// ─── Escape ───────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) {
  return String(s||'').replace(/"/g,'&quot;');
}

// ─── Filter ───────────────────────────────────────────────────────────────────
function setTagFilter(tag, el) {
  activeTagFilter = tag;
  document.querySelectorAll('.tag-filter').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderCards();
}

// ─── Modal ─────────────────────────────────────────────────────────────────────
function openModal(entry = null) {
  editingId = entry ? entry.id : null;
  currentStar = entry ? entry.stars : 5;
  currentMood = entry ? (entry.mood||'😋') : '😋';
  selectedTags = entry ? [...(entry.tags||[])] : [];

  document.getElementById('modalTitle').textContent = entry ? '编辑记录 ✏️' : '记录一次逛吃 🍽️';
  document.getElementById('f-name').value = entry ? entry.name : '';
  document.getElementById('f-place').value = entry ? (entry.place||'') : '';
  document.getElementById('f-note').value = entry ? (entry.note||'') : '';
  document.getElementById('f-img').value = entry ? (entry.img||'') : '';
  document.getElementById('f-date').value = entry ? (entry.date||today()) : today();

  updateStarUI();
  updateMoodUI();
  updateTagSelectUI();

  document.getElementById('modalOverlay').classList.add('show');
  setTimeout(() => document.getElementById('f-name').focus(), 350);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function today() { return new Date().toISOString().slice(0,10); }

// ─── Star / Mood / Tags UI ────────────────────────────────────────────────────
function setStar(n) { currentStar = n; updateStarUI(); }
function updateStarUI() {
  document.querySelectorAll('#starRow .star-btn').forEach((b,i) => {
    b.textContent = i < currentStar ? '★' : '☆';
    b.style.color = i < currentStar ? '#ffcc44' : '#ccc';
  });
}

function setMood(m) { currentMood = m; updateMoodUI(); }
function updateMoodUI() {
  document.querySelectorAll('#moodRow .mood-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.m === currentMood);
  });
}

function toggleTag(t, el) {
  const i = selectedTags.indexOf(t);
  if (i >= 0) selectedTags.splice(i, 1);
  else selectedTags.push(t);
  el.classList.toggle('selected');
}
function updateTagSelectUI() {
  document.querySelectorAll('#tagSelectRow .tag-select-btn').forEach(b => {
    b.classList.toggle('selected', selectedTags.includes(b.dataset.t));
  });
}

// ─── CRUD ─────────────────────────────────────────────────────────────────────
function submitEntry() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('名字不能空哦~'); return; }

  if (editingId) {
    const e = entries.find(x => x.id === editingId);
    if (e) {
      e.name = name;
      e.place = document.getElementById('f-place').value.trim();
      e.stars = currentStar;
      e.mood = currentMood;
      e.tags = [...selectedTags];
      e.note = document.getElementById('f-note').value.trim();
      e.img = document.getElementById('f-img').value.trim();
      e.date = document.getElementById('f-date').value;
    }
    showToast('更新成功 ✓');
  } else {
    entries.unshift({
      id: Date.now().toString(36),
      name,
      place: document.getElementById('f-place').value.trim(),
      stars: currentStar,
      mood: currentMood,
      tags: [...selectedTags],
      note: document.getElementById('f-note').value.trim(),
      img: document.getElementById('f-img').value.trim(),
      date: document.getElementById('f-date').value,
      ts: Date.now()
    });
    showToast('记录成功！🎉');
  }

  save();
  closeModal();
  renderCards();
}

function editEntry(id) {
  const e = entries.find(x => x.id === id);
  if (e) openModal(e);
}

function deleteEntry(id) {
  if (!confirm('删除这条记录吗？')) return;
  entries = entries.filter(e => e.id !== id);
  save();
  renderCards();
  showToast('已删除');
}

// ─── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
load();
renderCards();
</script>
</body>
</html>
