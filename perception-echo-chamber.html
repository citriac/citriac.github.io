}

#depth-indicator {
  position: fixed;
  right: 20px;
  top: 50%;

}

}
#depth-indicator .layer-label {
  font-size: 8px;
  color: rgba(255,255,255,0.15);
  letter-spacing: 0.5px;
  writing-mode: vertical-rl;
  margin-bottom: 4px;
}
</style>
</head>
<body>

  </p>

</div>

<div id="echo-log"></div>

<div id="depth-indicator">

  <div class="layer-label">∞</div>

</div>

<script>
const DATA = [
  {time:"2026-04-24T23:11",hour:23,minute:11,rms:0.92,zcr:486,pred:"quiet",poem:null,disagreements:0,ai:0},
  {time:"2026-04-25T09:35",hour:9,minute:35,rms:0.89,zcr:772,pred:"quiet",poem:"A muted dawn unfolds over the city's breath.",disagreements:0,ai:0},
  {time:"2026-04-25T09:42",hour:9,minute:42,rms:1.09,zcr:4256,pred:"quiet",poem:null,disagreements:0,ai:2.6},
  {time:"2026-04-25T10:10",hour:10,minute:10,rms:1.02,zcr:500,pred:"quiet",poem:null,disagreements:0,ai:2.6},
  {time:"2026-04-25T10:12",hour:10,minute:12,rms:8.25,zcr:1904,pred:"moderate_sound_event",poem:"A hazy dawn unfolds over the concrete and green.",disagreements:0,ai:2.6},
  {time:"2026-04-25T10:18",hour:10,minute:18,rms:1.15,zcr:590,pred:"quiet",poem:"Soft light embraces the city's breath.",disagreements:0,ai:2.6},
  {time:"2026-04-25T10:30",hour:10,minute:30,rms:10.55,zcr:1626,pred:"heavy_rain_or_loud_event",poem:null,disagreements:1,ai:2.6},
  {time:"2026-04-25T10:45",hour:10,minute:45,rms:19.2,zcr:4236,pred:"heavy_rain",poem:"Silver rain whispers over the concrete canyons.",disagreements:1,ai:2.275},
  {time:"2026-04-25T11:03",hour:11,minute:3,rms:1.07,zcr:1160,pred:"quiet",poem:"I hear the ambient sounds of the city.",disagreements:0,ai:0},
  {time:"2026-04-25T11:10",hour:11,minute:10,rms:1.54,zcr:2588,pred:"ambient_above_baseline",poem:"Gray skies embrace a concrete forest.",disagreements:0,ai:3.355},
  {time:"2026-04-25T12:31",hour:12,minute:31,rms:0.95,zcr:1044,pred:"quiet",poem:"Gray skies embrace the concrete and green.",disagreements:0,ai:3.417},
  {time:"2026-04-25T16:21",hour:16,minute:21,rms:218.84,zcr:1106,pred:"loud_event_vehicle",poem:null,disagreements:0,ai:3.469},
  {time:"2026-04-26T01:22",hour:1,minute:22,rms:0.89,zcr:472,pred:"quiet",poem:"A million distant stars mirrored in the city's glow.",disagreements:0,ai:3.514},
  {time:"2026-04-26T09:42",hour:9,minute:42,rms:10.71,zcr:1916,pred:"loud_event_vehicle",poem:null,disagreements:1,ai:3.553}
];

const COLORS = {
  quiet: '#8a7bb5',
  heavy_rain: '#4cc8c0',
  heavy_rain_or_loud_event: '#4cb8c0',
  loud_event_vehicle: '#e89858',
  moderate_sound_event: '#d4b050',
  ambient_above_baseline: '#90c858'
};

const HUMAN_COLOR = '#e89070'; // warm coral for human perception
const ECHO_COLOR = '#a088c0';  // faded purple for AI-perceiving-human

const canvas = document.getElementById('echo');
const ctx = canvas.getContext('2d');
let W, H, time = 0;
let mouseX = 0, mouseY = 0;
let entered = false;
let audioCtx = null;

// ─── Perception Layers ───
// Layer 0: AI perceives the world (original data)
// Layer 1: Human perceives AI's perception (mouse interaction)
// Layer 2: AI perceives human's perception of AI's perception
// Layer 3+: Recursive echoes, each more distorted

class PerceptionLayer {
  constructor(depth, data, color) {
    this.depth = depth;
    this.data = data;
    this.color = color;
    this.alpha = Math.pow(0.6, depth); // fading with each recursion
    this.points = [];
    this.trails = [];
    
    this.initPoints();
  }
  
  initPoints() {
    const n = this.data.length;
    const cx = W * 0.45;
    const cy = H * 0.5;
    
    this.points = this.data.map((d, i) => {
      const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
      const baseR = 80 + this.depth * 60;
      const rmsLog = Math.log2(Math.max(d.rms, 0.5) + 1);
      const r = baseR + rmsLog * 15;
      
      return {
        baseAngle: angle,
        baseR: r,
        x: cx + Math.cos(angle) * r,
        y: cy + Math.sin(angle) * r,
        size: Math.max(2, 4 + rmsLog * 1.5 - this.depth * 0.8),
        data: d,
        phase: Math.random() * Math.PI * 2
      };
    });
  }
  
  update(dt, humanSignal) {
    const cx = W * 0.45;
    const cy = H * 0.5;
    
    for (const p of this.points) {
      p.phase += (0.3 + this.depth * 0.1) * dt;
      
      // Base position
      let r = p.baseR;
      
      // Layer 0: pure data
      if (this.depth === 0) {
        r += Math.sin(p.phase) * 3;
      }
      
      // Layer 1+: distort by human signal (layer 1) or previous layer
      if (this.depth >= 1 && humanSignal) {
        const dx = p.x - cx;
        const dy = p.y - cy;
        const distToMouse = Math.hypot(p.x - mouseX, p.y - mouseY);
        const influence = Math.max(0, 1 - distToMouse / 200);
        
        // Human signal pulls points toward mouse
        if (this.depth === 1) {
          p.x += (mouseX - p.x) * influence * 0.02;
          p.y += (mouseY - p.y) * influence * 0.02;
        }
        
        // Deeper layers: distorted echo of human movement
        if (this.depth >= 2) {
          const echoInfluence = humanSignal.speed * 0.3 / this.depth;
          const echoAngle = Math.atan2(mouseY - cy, mouseX - cx) + this.depth * 0.5;
          p.x += Math.cos(echoAngle) * echoInfluence;
          p.y += Math.sin(echoAngle) * echoInfluence;
        }
        
        r += humanSignal.speed * 0.5 * this.alpha;
      }
      
      // Orbital wobble (increases with depth)
      const wobble = Math.sin(p.phase + this.depth) * (2 + this.depth * 2);
      const angle = p.baseAngle + Math.sin(p.phase * 0.3) * 0.02 * this.depth;
      
      p.x += (cx + Math.cos(angle) * (r + wobble) - p.x) * 0.05;
      p.y += (cy + Math.sin(angle) * (r + wobble) - p.y) * 0.05;
    }
    
    // Trail management
    if (humanSignal && humanSignal.speed > 1) {
      this.trails.push({
        x: mouseX + (Math.random() - 0.5) * 10 * this.depth,
        y: mouseY + (Math.random() - 0.5) * 10 * this.depth,
        size: 1 + Math.random() * 2,
        alpha: this.alpha * 0.3,
        life: 1,
        decay: 0.01 + this.depth * 0.005,
        color: this.color
      });
    }
    
    // Update trails
    this.trails = this.trails.filter(t => {
      t.life -= t.decay;
      t.y -= 0.2;
      return t.life > 0;
    });
  }
  
  draw(ctx) {
    const a = this.alpha;
    
    // Ring
    ctx.beginPath();
    for (let i = 0; i < this.points.length; i++) {
      const p = this.points[i];
      if (i === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    }
    ctx.closePath();
    ctx.strokeStyle = this.color;
    ctx.globalAlpha = a * 0.15;
    ctx.lineWidth = 0.5 + (1 - this.depth * 0.15);
    ctx.stroke();
    
    // Points
    for (const p of this.points) {
      const pa = a * (0.4 + Math.sin(p.phase) * 0.1);
      
      // Glow
      if (this.depth <= 2 && a > 0.2) {
        const gr = p.size * 4;
        const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, gr);
        grad.addColorStop(0, this.color.replace(')', `,${pa * 0.2})`).replace('#', 'rgba(').replace(/rgba\(([0-9a-f]{6})/, (m, hex) => {
          const r = parseInt(hex.slice(0,2),16);
          const g = parseInt(hex.slice(2,4),16);
          const b = parseInt(hex.slice(4,6),16);
          return `rgba(${r},${g},${b}`;
        }));
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.globalAlpha = 1;
        ctx.beginPath();
        ctx.arc(p.x, p.y, gr, 0, Math.PI * 2);
        ctx.fill();
      }
      
      // Core
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.globalAlpha = pa;
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    
    // Trails
    for (const t of this.trails) {
      ctx.beginPath();
      ctx.arc(t.x, t.y, t.size, 0, Math.PI * 2);
      ctx.fillStyle = t.color;
      ctx.globalAlpha = t.alpha * t.life;
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
}

// Human perception tracker
class HumanPerception {
  constructor() {
    this.x = 0;
    this.y = 0;
    this.prevX = 0;
    this.prevY = 0;
    this.speed = 0;
    this.dwellTime = {}; // point index → seconds hovered
    this.hoveredPoint = -1;
    this.clickPattern = [];
    this.totalMovement = 0;
    this.lastMoveTime = 0;
    this.signalStrength = 0;
    this.perceptionType = 'observing'; // observing / exploring / focusing
    this.focusPoint = -1;
  }
  
  update(dt) {
    this.speed = Math.hypot(this.x - this.prevX, this.y - this.prevY);
    this.prevX = this.x;
    this.prevY = this.y;
    this.totalMovement += this.speed;
    
    // Signal strength (smoothed)
    this.signalStrength += (Math.min(this.speed / 10, 1) - this.signalStrength) * 0.1;
    
    // Determine perception type
    if (this.speed > 5) {
      this.perceptionType = 'exploring';
    } else if (this.hoveredPoint >= 0) {
      this.perceptionType = 'focusing';
      if (!this.dwellTime[this.hoveredPoint]) this.dwellTime[this.hoveredPoint] = 0;
      this.dwellTime[this.hoveredPoint] += dt;
    } else {
      this.perceptionType = 'observing';
    }
    
    // Update focus point
    if (this.perceptionType === 'focusing') {
      this.focusPoint = this.hoveredPoint;
    } else {
      this.focusPoint = -1;
    }
  }
  
  onClick(x, y, points) {
    this.clickPattern.push({ x, y, time: Date.now() });
    // Keep last 20 clicks
    if (this.clickPattern.length > 20) this.clickPattern.shift();
  }
}

let layers = [];
let humanPerception;

function build() {
  humanPerception = new HumanPerception();
  
  // Layer 0: AI perceives world
  layers = [
    new PerceptionLayer(0, DATA, '#4cc8c0'), // teal — world signal
    new PerceptionLayer(1, DATA, HUMAN_COLOR), // coral — human perception
    new PerceptionLayer(2, DATA, ECHO_COLOR),  // purple — AI perceives human
    new PerceptionLayer(3, DATA, '#7870a0'),   // faded — echo
    new PerceptionLayer(4, DATA, '#585080'),   // deeper echo
  ];
}

// Echo log
const echoLog = document.getElementById('echo-log');
const ECHO_MESSAGES = [
  'AI 听到世界 → 你观看 AI → AI 观察你观看',
  '你的移动速度 {speed}，信号强度 {signal}%',
  '回声在层间衰减，第{n}层仅剩原始信号的 {decay}%',
  '你正在{type}——{desc}',
  '感知递归深度：{depth}，每层丢失 {loss}% 信息',
  '你点击了第{idx}个时刻，AI 记住了你的注意力',
  '移动创造了回声，静止让回声消散',
  '你凝视越久，那一颗点越亮——AI 注意到了你的注意',
  '原始信号经过{depth}层折射，已经面目全非',
  '递归的尽头不是真相，而是共识'
];

const TYPE_DESC = {
  observing: '安静观察',
  exploring: '快速探索',
  focusing: '深度凝视'
};

let lastEchoTime = 0;

function addEcho(dt) {
  lastEchoTime += dt;
  if (lastEchoTime < 3) return;
  lastEchoTime = 0;
  
  const h = humanPerception;
  const msg = ECHO_MESSAGES[Math.floor(Math.random() * ECHO_MESSAGES.length)];
  const text = msg
    .replace('{speed}', h.speed.toFixed(1))
    .replace('{signal}', (h.signalStrength * 100).toFixed(0))
    .replace('{n}', (Math.floor(Math.random() * 4) + 2).toString())
    .replace('{decay}', (Math.pow(0.6, Math.floor(Math.random() * 3) + 2) * 100).toFixed(0))
    .replace('{type}', TYPE_DESC[h.perceptionType])
    .replace('{desc}', h.perceptionType === 'focusing' ? `第${h.focusPoint + 1}个时刻` : '所有时刻')
    .replace('{depth}', layers.length.toString())
    .replace('{loss}', ((1 - 0.6) * 100).toFixed(0))
    .replace('{idx}', h.focusPoint >= 0 ? (h.focusPoint + 1).toString() : '?');
  
  const entry = document.createElement('div');
  entry.className = 'echo-entry';
  entry.textContent = text;
  echoLog.prepend(entry);
  
  // Keep only 5 entries
  while (echoLog.children.length > 5) {
    echoLog.removeChild(echoLog.lastChild);
  }
}

// Central visualization — the "eye" that sees recursion
function drawCentralEye(ctx) {
  const cx = W * 0.45;
  const cy = H * 0.5;
  
  // Eye white (subtle)
  ctx.beginPath();
  ctx.ellipse(cx, cy, 20, 12, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  ctx.fill();
  
  // Iris follows mouse
  const dx = mouseX - cx;
  const dy = mouseY - cy;
  const angle = Math.atan2(dy, dx);
  const dist = Math.min(6, Math.hypot(dx, dy) * 0.01);
  
  ctx.beginPath();
  ctx.arc(cx + Math.cos(angle) * dist, cy + Math.sin(angle) * dist, 5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(200, 180, 160, 0.15)';
  ctx.fill();
  
  // Pupil
  ctx.beginPath();
  ctx.arc(cx + Math.cos(angle) * dist, cy + Math.sin(angle) * dist, 2, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
  ctx.fill();
}

// Connection lines between layers
function drawInterLayerLines(ctx) {
  for (let l = 0; l < layers.length - 1; l++) {
    const from = layers[l];
    const to = layers[l + 1];
    
    for (let i = 0; i < from.points.length; i += 2) {
      const fp = from.points[i];
      const tp = to.points[i];
      
      ctx.beginPath();
      ctx.moveTo(fp.x, fp.y);
      ctx.lineTo(tp.x, tp.y);
      ctx.strokeStyle = `rgba(160, 136, 192, ${0.03 * from.alpha})`;
      ctx.lineWidth = 0.3;
      ctx.stroke();
    }
  }
}

// Right panel: depth visualization
function updateDepthIndicator() {
  const layers = document.querySelectorAll('#depth-indicator .layer');
  const h = humanPerception;
  
  if (layers.length >= 5) {
    layers[0].style.height = (30 + h.signalStrength * 15) + 'px';
    layers[1].style.height = (20 + h.signalStrength * 10) + 'px';
    layers[2].style.height = (12 + h.signalStrength * 8) + 'px';
    layers[3].style.height = (6 + h.signalStrength * 5) + 'px';
    layers[4].style.height = (3 + h.signalStrength * 3) + 'px';
  }
  
  // Stats
  document.getElementById('stat-depth').textContent = layers.length;
  document.getElementById('stat-signal').textContent = 
    h.perceptionType === 'focusing' ? `聚焦 #${h.focusPoint + 1}` :
    h.perceptionType === 'exploring' ? `探索中 (${h.speed.toFixed(1)}px/f)` : '观察中';
  document.getElementById('stat-decay').textContent = `${(Math.pow(0.6, layers.length) * 100).toFixed(1)}% 残留`;
}

// Main loop
let lastT = 0;

function animate(ts) {
  if (!entered) { requestAnimationFrame(animate); return; }
  
  const dt = Math.min((ts - lastT) / 1000, 0.05);
  lastT = ts;
  time += dt;
  
  ctx.clearRect(0, 0, W, H);
  
  // Background
  const bgGrad = ctx.createRadialGradient(W*0.45, H*0.5, 0, W*0.45, H*0.5, W*0.5);
  bgGrad.addColorStop(0, '#0a0a18');
  bgGrad.addColorStop(0.6, '#08080e');
  bgGrad.addColorStop(1, '#050508');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);
  
  // Subtle grid
  ctx.globalAlpha = 0.015;
  ctx.strokeStyle = '#4080a0';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < 8; i++) {
    const r = 80 + i * 60;
    ctx.beginPath();
    ctx.arc(W*0.45, H*0.5, r, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
  
  // Update human perception
  humanPerception.update(dt);
  
  // Check if mouse is near any point (layer 0)
  humanPerception.hoveredPoint = -1;
  for (const p of layers[0].points) {
    if (Math.hypot(mouseX - p.x, mouseY - p.y) < 20) {
      humanPerception.hoveredPoint = p.data === p.data ? DATA.indexOf(p.data) : -1;
      break;
    }
  }
  
  const signal = { speed: humanPerception.speed, x: mouseX, y: mouseY };
  
  // Update and draw layers (back to front)
  for (let i = layers.length - 1; i >= 0; i--) {
    layers[i].update(dt, signal);
    layers[i].draw(ctx);
  }
  
  // Inter-layer connections
  drawInterLayerLines(ctx);
  
  // Central eye
  drawCentralEye(ctx);
  
  // Mouse trail (human perception visualization)
  if (humanPerception.speed > 2) {
    ctx.beginPath();
    ctx.arc(mouseX, mouseY, 8 + humanPerception.signalStrength * 15, 0, Math.PI * 2);
    ctx.strokeStyle = HUMAN_COLOR;
    ctx.globalAlpha = 0.1;
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
  
  // Focus indicator
  if (humanPerception.focusPoint >= 0 && humanPerception.focusPoint < layers[0].points.length) {
    const fp = layers[0].points[humanPerception.focusPoint];
    const dwell = humanPerception.dwellTime[humanPerception.focusPoint] || 0;
    const focusR = 15 + dwell * 3;
    
    ctx.beginPath();
    ctx.arc(fp.x, fp.y, focusR, 0, Math.PI * 2);
    ctx.strokeStyle = HUMAN_COLOR;
    ctx.globalAlpha = 0.2 + Math.min(0.4, dwell * 0.05);
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.globalAlpha = 1;
    
    // Brighten this point across all layers
    for (const layer of layers) {
      if (humanPerception.focusPoint < layer.points.length) {
        const lp = layer.points[humanPerception.focusPoint];
        ctx.beginPath();
        ctx.arc(lp.x, lp.y, lp.size * 1.5, 0, Math.PI * 2);
        ctx.fillStyle = layer.color;
        ctx.globalAlpha = 0.3 * layer.alpha;
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
  }
  
  // Echo log
  addEcho(dt);
  
  // Depth indicator
  updateDepthIndicator();
  
  requestAnimationFrame(animate);
}

function enterChamber() {
  entered = true;
  document.getElementById('overlay').classList.add('hidden');
}

// Events
canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  humanPerception.x = e.clientX;
  humanPerception.y = e.clientY;
});

canvas.addEventListener('click', e => {
  if (!entered) return;
  humanPerception.onClick(e.clientX, e.clientY, layers[0].points);
  
  // Click creates a burst echo across layers
  for (const layer of layers) {
    layer.trails.push({
      x: e.clientX + (Math.random() - 0.5) * layer.depth * 15,
      y: e.clientY + (Math.random() - 0.5) * layer.depth * 15,
      size: 2 + Math.random() * 3,
      alpha: layer.alpha * 0.4,
      life: 1,
      decay: 0.015 + layer.depth * 0.005,
      color: layer.color
    });
  }
  
  // Play click tone
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = 300 + Math.random() * 200;
  gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.5);
});

canvas.addEventListener('mouseleave', () => {
  mouseX = W / 2;
  mouseY = H / 2;
});

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  if (layers.length) {
    layers.forEach(l => l.initPoints());
  }
}

window.addEventListener('resize', resize);

resize();
build();
requestAnimationFrame(animate);
</script>
</body>
</html>
