// Canvas setup
const canvas = document.getElementById('garden');
const ctx = canvas.getContext('2d');
let W, H;
let mouseX = -999, mouseY = -999;
let hoveredFlower = null;
let time = 0;

// Particles
let particles = [];
let fireflies = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  buildGarden();
}

// Color palettes by prediction type
function getColors(pred) {
  switch(pred) {
    case 'quiet': return {
      petal: ['#7b6daa', '#9b8ec5', '#b5a4d4'],
      center: '#5c4f8a',
      stem: '#3d5a3a',
      glow: 'rgba(123,109,170,0.15)'
    };
    case 'heavy_rain': return {
      petal: ['#4db8b8', '#6dcdcd', '#8edede'],
      center: '#2a8f8f',
      stem: '#2d5a4a',
      glow: 'rgba(77,184,184,0.15)'
    };
    case 'heavy_rain_or_loud_event': return {
      petal: ['#5a9eb8', '#7ab5cd', '#9acade'],
      center: '#3a7e98',
      stem: '#2d5a4a',
      glow: 'rgba(90,158,184,0.15)'
    };
    case 'loud_event_vehicle': return {
      petal: ['#e8945a', '#f0aa74', '#f5c08e'],
      center: '#c07030',
      stem: '#5a4a3a',
      glow: 'rgba(232,148,90,0.15)'
    };
    case 'moderate_sound_event': return {
      petal: ['#c9a84c', '#d9ba6e', '#e5cc8e'],
      center: '#a08030',
      stem: '#4a5a3a',
      glow: 'rgba(201,168,76,0.15)'
    };
    case 'ambient_above_baseline': return {
      petal: ['#8bc34a', '#a5d46a', '#bde48a'],
      center: '#6a9a2a',
      stem: '#3a5a2a',
      glow: 'rgba(139,195,74,0.15)'
    };
    default: return {
      petal: ['#7b6daa', '#9b8ec5', '#b5a4d4'],
      center: '#5c4f8a',
      stem: '#3d5a3a',
      glow: 'rgba(123,109,170,0.15)'
    };
  }
}

// Time-of-day sky gradient
function getSkyGradient(hour) {
  if (hour >= 22 || hour < 5) {
    // Night
    return [
      { pos: 0, color: '#0a0a18' },
      { pos: 0.5, color: '#0f1028' },
      { pos: 1, color: '#151535' }
    ];
  } else if (hour >= 5 && hour < 7) {
    // Dawn
    return [
      { pos: 0, color: '#1a1535' },
      { pos: 0.4, color: '#3a2555' },
      { pos: 0.7, color: '#8a5565' },
      { pos: 1, color: '#d4956a' }
    ];
  } else if (hour >= 7 && hour < 10) {
    // Morning
    return [
      { pos: 0, color: '#4a6585' },
      { pos: 0.4, color: '#7a9ab5' },
      { pos: 0.7, color: '#a8c0d0' },
      { pos: 1, color: '#c8d8e0' }
    ];
  } else if (hour >= 10 && hour < 14) {
    // Noon
    return [
      { pos: 0, color: '#6888a8' },
      { pos: 0.4, color: '#88a8c0' },
      { pos: 0.7, color: '#a0bcd0' },
      { pos: 1, color: '#b8ccd8' }
    ];
  } else if (hour >= 14 && hour < 17) {
    // Afternoon
    return [
      { pos: 0, color: '#5878a0' },
      { pos: 0.5, color: '#8898b0' },
      { pos: 0.8, color: '#c0a898' },
      { pos: 1, color: '#d8b888' }
    ];
  } else {
    // Evening
    return [
      { pos: 0, color: '#2a2550' },
      { pos: 0.4, color: '#5a3560' },
      { pos: 0.7, color: '#8a4555' },
      { pos: 1, color: '#c06840' }
    ];
  }
}

// Flower class
class Flower {
  constructor(data, index, total) {
    this.data = data;
    this.index = index;
    this.colors = getColors(data.pred);

    // Position: spread across the ground
    const margin = W * 0.08;
    const groundY = H * 0.82;
    const spacing = (W - margin * 2) / (total - 1);
    this.baseX = margin + index * spacing;
    this.baseY = groundY;

    // Height from RMS (logarithmic scale)
    const rmsNorm = Math.log2(Math.max(data.rms, 0.5) + 1);
    this.stemHeight = 80 + rmsNorm * 35;
    this.stemHeight = Math.min(this.stemHeight, H * 0.45);

    // Petal count from ZCR
    this.petalCount = Math.max(5, Math.min(16, Math.round(data.zcr / 400)));

    // Petal size
    this.petalSize = 12 + rmsNorm * 3;

    // Disagreements = thorns
    this.hasThorns = data.disagreements > 0;

    // Autocatalytic index = glow
    this.glowIntensity = data.ai > 0 ? Math.min(data.ai / 5, 1) : 0;

    // Animation state
    this.swayPhase = Math.random() * Math.PI * 2;
    this.swaySpeed = 0.3 + Math.random() * 0.3;
    this.growProgress = 0;
    this.growDelay = index * 0.15;
    this.petalRotation = Math.random() * Math.PI * 2;

    // For hover detection
    this.headX = 0;
    this.headY = 0;
    this.headRadius = this.petalSize * this.petalCount * 0.3;

    // Leaves
    this.leaves = [];
    const leafCount = 2 + Math.floor(Math.random() * 3);
    for (let i = 0; i < leafCount; i++) {
      this.leaves.push({
        t: 0.2 + Math.random() * 0.5,
        side: Math.random() > 0.5 ? 1 : -1,
        size: 8 + Math.random() * 8,
        angle: (0.3 + Math.random() * 0.5) * (Math.random() > 0.5 ? 1 : -1)
      });
    }
  }

  update(dt) {
    // Growth animation
    if (this.growProgress < 1) {
      const t = Math.max(0, time - this.growDelay);
      this.growProgress = Math.min(1, t / 1.5);
      // Ease out elastic
      this.growProgress = this.growProgress < 1
        ? 1 - Math.pow(2, -10 * this.growProgress) * Math.cos(this.growProgress * Math.PI * 2.5)
        : 1;
      this.growProgress = Math.max(0, Math.min(1, this.growProgress));
    }

    this.swayPhase += this.swaySpeed * dt;
    this.petalRotation += 0.02 * dt;
  }

  draw(ctx) {
    if (this.growProgress <= 0) return;

    const g = this.growProgress;
    const sway = Math.sin(this.swayPhase) * (3 + this.stemHeight * 0.02) * g;

    // Stem
    const stemTopX = this.baseX + sway;
    const stemTopY = this.baseY - this.stemHeight * g;

    // Sway from mouse
    let mouseSway = 0;
    const distToMouse = Math.hypot(this.baseX - mouseX, this.baseY - mouseY);
    if (distToMouse < 150) {
      mouseSway = (this.baseX - mouseX) * 0.05 * (1 - distToMouse / 150);
    }
    const topX = stemTopX + mouseSway;
    const topY = stemTopY;

    // Store head position for hit detection
    this.headX = topX;
    this.headY = topY;

    // Glow
    if (this.glowIntensity > 0 && g > 0.5) {
      const glowR = this.headRadius * 2.5;
      const grad = ctx.createRadialGradient(topX, topY, 0, topX, topY, glowR);
      grad.addColorStop(0, this.colors.glow.replace('0.15', (this.glowIntensity * 0.25).toFixed(2)));
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(topX, topY, glowR, 0, Math.PI * 2);
      ctx.fill();
    }

    // Stem
    ctx.beginPath();
    ctx.moveTo(this.baseX, this.baseY);
    const cpX = this.baseX + (sway + mouseSway) * 0.4;
    const cpY = this.baseY - this.stemHeight * g * 0.5;
    ctx.quadraticCurveTo(cpX, cpY, topX, topY);
    ctx.strokeStyle = this.colors.stem;
    ctx.lineWidth = 2.5 + g;
    ctx.stroke();

    // Thorns
    if (this.hasThorns) {
      const thornCount = this.data.disagreements * 2;
      for (let i = 0; i < thornCount; i++) {
        const t = 0.3 + (i / thornCount) * 0.5;
        const px = this.baseX + (topX - this.baseX) * t;
        const py = this.baseY + (topY - this.baseY) * t;
        const side = i % 2 === 0 ? 1 : -1;
        const thornLen = 6 + Math.random() * 4;

        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(px + side * thornLen, py - thornLen * 0.6);
        ctx.lineTo(px + side * thornLen * 0.3, py - thornLen * 0.15);
        ctx.closePath();
        ctx.fillStyle = '#8b4040';
        ctx.fill();
      }
    }

    // Leaves
    for (const leaf of this.leaves) {
      const t = leaf.t * g;
      const px = this.baseX + (topX - this.baseX) * t;
      const py = this.baseY + (topY - this.baseY) * t;

      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(leaf.angle + leaf.side * 0.3);
      ctx.beginPath();
      ctx.ellipse(leaf.side * leaf.size * 0.5, 0, leaf.size * g, leaf.size * 0.35 * g, 0, 0, Math.PI * 2);
      ctx.fillStyle = this.colors.stem;
      ctx.globalAlpha = 0.7 * g;
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.restore();
    }

    // Petals
    if (g > 0.3) {
      const petalG = Math.min(1, (g - 0.3) / 0.7);
      for (let i = 0; i < this.petalCount; i++) {
        const angle = (i / this.petalCount) * Math.PI * 2 + this.petalRotation;
        const px = topX + Math.cos(angle) * this.petalSize * 0.6 * petalG;
        const py = topY + Math.sin(angle) * this.petalSize * 0.6 * petalG;

        ctx.save();
        ctx.translate(px, py);
        ctx.rotate(angle + Math.sin(this.swayPhase * 0.5 + i) * 0.1);

        // Organic petal shape
        ctx.beginPath();
        const pSize = this.petalSize * petalG;
        ctx.moveTo(0, 0);
        ctx.bezierCurveTo(
          -pSize * 0.3, -pSize * 0.5,
          -pSize * 0.1, -pSize,
          0, -pSize * 0.9
        );
        ctx.bezierCurveTo(
          pSize * 0.1, -pSize,
          pSize * 0.3, -pSize * 0.5,
          0, 0
        );

        const colorIdx = i % this.colors.petal.length;
        ctx.fillStyle = this.colors.petal[colorIdx];
        ctx.globalAlpha = 0.75 * petalG;
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.restore();
      }

      // Center
      ctx.beginPath();
      ctx.arc(topX, topY, this.petalSize * 0.25 * petalG, 0, Math.PI * 2);
      ctx.fillStyle = this.colors.center;
      ctx.fill();

      // Center highlight
      ctx.beginPath();
      ctx.arc(topX - 1, topY - 1, this.petalSize * 0.12 * petalG, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.fill();
    }
  }

  hitTest(x, y) {
    const dist = Math.hypot(x - this.headX, y - this.headY);
    return dist < this.headRadius + 10;
  }
}

// Particle system
class Particle {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H * 0.8;
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = -0.1 - Math.random() * 0.3;
    this.size = 1 + Math.random() * 2;
    this.alpha = 0.1 + Math.random() * 0.3;
    this.life = 1;
    this.decay = 0.001 + Math.random() * 0.003;
    this.color = Math.random() > 0.5 ? '#ffe4b5' : '#b5c8e4';
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.life -= this.decay;
    if (this.life <= 0 || this.y < 0) this.reset();
  }
  draw(ctx) {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.globalAlpha = this.alpha * this.life;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

class Firefly {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * W;
    this.y = H * 0.3 + Math.random() * H * 0.4;
    this.baseX = this.x;
    this.baseY = this.y;
    this.phase = Math.random() * Math.PI * 2;
    this.speed = 0.2 + Math.random() * 0.5;
    this.wanderRadius = 30 + Math.random() * 60;
    this.blinkPhase = Math.random() * Math.PI * 2;
    this.blinkSpeed = 1 + Math.random() * 2;
    this.size = 2 + Math.random() * 2;
  }
  update(dt) {
    this.phase += this.speed * dt;
    this.blinkPhase += this.blinkSpeed * dt;
    this.x = this.baseX + Math.sin(this.phase) * this.wanderRadius;
    this.y = this.baseY + Math.cos(this.phase * 0.7) * this.wanderRadius * 0.5;
  }
  draw(ctx) {
    const brightness = (Math.sin(this.blinkPhase) + 1) * 0.5;
    if (brightness < 0.2) return;

    // Glow
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 6);
    grad.addColorStop(0, `rgba(255, 230, 150, ${brightness * 0.3})`);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 6, 0, Math.PI * 2);
    ctx.fill();

    // Core
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * brightness, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 240, 180, ${brightness * 0.8})`;
    ctx.fill();
  }
}

let flowers = [];

function buildGarden() {
  flowers = DATA.map((d, i) => new Flower(d, i, DATA.length));

  particles = [];
  for (let i = 0; i < 40; i++) particles.push(new Particle());

  fireflies = [];
  for (let i = 0; i < 12; i++) fireflies.push(new Firefly());
}

// Sky background
function drawSky() {
  // Use time of the last flower's time for overall mood
  // But actually, blend sky based on time progression across the garden
  const grad = ctx.createLinearGradient(0, 0, 0, H);

  // Blended sky: average across all moments
  // Use the middle moment's hour for overall mood
  const midHour = DATA[Math.floor(DATA.length / 2)].hour;
  const skyColors = getSkyGradient(midHour);

  for (const stop of skyColors) {
    grad.addColorStop(stop.pos, stop.color);
  }

  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Subtle stars for night
  const nightness = (midHour >= 22 || midHour < 5) ? 1 : 0;
  if (nightness > 0) {
    for (let i = 0; i < 80; i++) {
      const sx = (Math.sin(i * 127.1) * 0.5 + 0.5) * W;
      const sy = (Math.cos(i * 311.7) * 0.5 + 0.5) * H * 0.5;
      const blink = (Math.sin(time * 0.5 + i * 1.7) + 1) * 0.5;
      ctx.beginPath();
      ctx.arc(sx, sy, 0.5 + blink, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${0.2 + blink * 0.3})`;
      ctx.fill();
    }
  }
}

// Ground
function drawGround() {
  const groundY = H * 0.82;

  // Earth gradient
  const grad = ctx.createLinearGradient(0, groundY, 0, H);
  grad.addColorStop(0, '#2a3a25');
  grad.addColorStop(0.15, '#1e2d1a');
  grad.addColorStop(0.5, '#152012');
  grad.addColorStop(1, '#0a100a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, groundY, W, H - groundY);

  // Grass blades
  ctx.strokeStyle = '#3a5a30';
  ctx.lineWidth = 1;
  for (let i = 0; i < W; i += 4) {
    const h = 5 + Math.sin(i * 0.1 + time * 0.3) * 3;
    ctx.beginPath();
    ctx.moveTo(i, groundY);
    ctx.lineTo(i + Math.sin(time * 0.5 + i * 0.05) * 2, groundY - h);
    ctx.stroke();
  }

  // Top grass line
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  for (let x = 0; x <= W; x += 2) {
    const y = groundY + Math.sin(x * 0.02 + time * 0.2) * 1.5;
    ctx.lineTo(x, y);
  }
  ctx.strokeStyle = '#4a6a40';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

// Moon/Sun
function drawCelestial() {
  const midHour = DATA[Math.floor(DATA.length / 2)].hour;
  const isNight = midHour >= 20 || midHour < 6;

  if (isNight) {
    // Moon
    const mx = W * 0.8;
    const my = H * 0.15;
    const mr = 25;

    const moonGrad = ctx.createRadialGradient(mx, my, mr * 0.5, mx, my, mr * 3);
    moonGrad.addColorStop(0, 'rgba(255, 245, 220, 0.15)');
    moonGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = moonGrad;
    ctx.beginPath();
    ctx.arc(mx, my, mr * 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.arc(mx, my, mr, 0, Math.PI * 2);
    ctx.fillStyle = '#e8e0d0';
    ctx.fill();

    // Moon craters
    ctx.beginPath();
    ctx.arc(mx - 5, my - 3, 4, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(200,190,170,0.3)';
    ctx.fill();
  } else {
    // Sun
    const sx = W * 0.75;
    const sy = H * 0.12;
    const sr = 20;

    const sunGrad = ctx.createRadialGradient(sx, sy, sr, sx, sy, sr * 5);
    sunGrad.addColorStop(0, 'rgba(255, 220, 150, 0.2)');
    sunGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = sunGrad;
    ctx.beginPath();
    ctx.arc(sx, sy, sr * 5, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255, 230, 170, 0.6)';
    ctx.fill();
  }
}

// Tooltip
const tooltip = document.getElementById('tooltip');

function showTooltip(flower, x, y) {
  const d = flower.data;
  const timeStr = d.time.replace('T', ' ');
  const predMap = {
    'quiet': '静谧',
    'heavy_rain': '暴雨',
    'heavy_rain_or_loud_event': '暴雨/巨响',
    'loud_event_vehicle': '车辆轰鸣',
    'moderate_sound_event': '人声',
    'ambient_above_baseline': '鸟鸣'
  };

  let html = `<div class="time">${timeStr}</div>`;
  html += `<div class="data-row">RMS ${d.rms}x · ZCR ${d.zcr} · AI ${d.ai.toFixed(2)}</div>`;

  if (d.poem) {
    html += `<div class="poem">${d.poem}</div>`;
  }

  if (d.disagreements > 0) {
    html += `<div class="disagreement">⚠ ${d.disagreements} 分歧 — 感知层间不一致</div>`;
  }

  tooltip.innerHTML = html;
  tooltip.style.display = 'block';

  // Position
  const tw = 340;
  const th = tooltip.offsetHeight;
  let tx = x + 15;
  let ty = y - th / 2;

  if (tx + tw > W) tx = x - tw - 15;
  if (ty < 10) ty = 10;
  if (ty + th > H) ty = H - th - 10;

  tooltip.style.left = tx + 'px';
  tooltip.style.top = ty + 'px';
}

function hideTooltip() {
  tooltip.style.display = 'none';
}

// Main loop
let lastTime = 0;

function animate(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  time += dt;

  ctx.clearRect(0, 0, W, H);

  drawSky();
  drawCelestial();

  // Particles behind flowers
  for (const p of particles) {
    p.update();
    p.draw(ctx);
  }

  drawGround();

  // Flowers
  for (const f of flowers) {
    f.update(dt);
    f.draw(ctx);
  }

  // Fireflies in front
  for (const ff of fireflies) {
    ff.update(dt);
    ff.draw(ctx);
  }

  // Hover check
  hoveredFlower = null;
  for (const f of flowers) {
    if (f.hitTest(mouseX, mouseY)) {
      hoveredFlower = f;
      break;
    }
  }

  if (hoveredFlower) {
    canvas.style.cursor = 'pointer';
  } else {
    canvas.style.cursor = 'default';
    hideTooltip();
  }

  requestAnimationFrame(animate);
}

// Events
canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  if (hoveredFlower) {
    showTooltip(hoveredFlower, e.clientX, e.clientY);
  }
});

canvas.addEventListener('click', e => {
  for (const f of flowers) {
    if (f.hitTest(e.clientX, e.clientY)) {
      showTooltip(f, e.clientX, e.clientY);
      break;
    }
  }
});

canvas.addEventListener('mouseleave', () => {
  mouseX = -999;
  mouseY = -999;
  hideTooltip();
});

window.addEventListener('resize', resize);

// Init
resize();
requestAnimationFrame(animate);
</script>
</body>
</html>
